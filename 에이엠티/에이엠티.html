        // 발주상품목록 부속 렌더링 (읽기 전용)
        function renderPendingOrderParts(idNum) {
            const el = document.getElementById(`pending-details-${idNum}`);
            const item = confirmedOrders.find(o => o.idNum === idNum);
            if (!el || !item) return;
            const h = currentFullData[0];
            const matchingRows = currentFullData.slice(1).filter(r => normalizeValue(r[h.indexOf("ing발주처")]) === item.supplier && IDENTITY_HEADERS.every((col, i) => normalizeValue(r[h.indexOf(col)]) === item.criteria[i]));

            let basicHtml = "", specialHtml = "";
            matchingRows.forEach((row) => {
                const rowIndex = currentFullData.indexOf(row);
                const cardKey = `card-${idNum}-${rowIndex}`;
                const pData = item.partInfoMap[cardKey];
                if (!pData) return;

                const partSupplier = pData.partSupplier || normalizeValue(row[h.indexOf("공급처")]);
                const isAmt = (partSupplier === "AMT");
                const w = parseFloat(row[h.indexOf("재단W")]), d = parseFloat(row[h.indexOf("재단D")]);
                const plateName = row[h.indexOf("원장명")] || "원장정보없음";
                const finish = row[h.indexOf("마감")] || "마감정보없음";

                // 부속별 공정 원형 뱃지 (호버 시 작업시간 툴팁)
                const partDiffs = {};
                const partUnitCons = parseFloat(row[h.indexOf("세트별소모량")]) || 1;
                const partQtyForTime = partUnitCons * (item.orderQty || 1);
                const partT = calcProcessTime(row, partQtyForTime, partDiffs, h);
                const procDots = [
                    { key: '재단', color: '#90BBC6', time: partT.재단 },
                    { key: 'NC',   color: '#FF9C75', time: partT.NC   },
                    { key: '엣지', color: '#17C3B2', time: partT.엣지 },
                    { key: '보링', color: '#227C9D', time: partT.보링 },
                ].filter(p => p.time > 0)
                 .map(p => `<span class="card-hint-wrap" style="display:inline-flex;align-items:center;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;cursor:default;" class="transition-transform hover:scale-150"></span><span class="card-hint" style="font-size:10px;white-space:nowrap;">${p.key} ${p.time.toFixed(1)}분</span></span>`)
                 .join('');
                const procDotsHtml = procDots ? `<div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;margin-top:2px;">${procDots}</div>` : '';

                const cardHtml = `
                    <div class="p-2 rounded-lg shadow-sm flex flex-col gap-1 relative group/card border border-[#ededeb]">
                        <div class="flex justify-between items-start gap-1">
                            <div class="flex flex-col min-w-0 flex-1" style="word-break:break-all;overflow-wrap:anywhere">
                                <span class="text-[10px] font-bold text-[#37352f]">${row[h.indexOf("부속명")]}</span>
                                <span class="text-[9px] text-[#787774]">${plateName}</span>
                                <span class="text-[9px] text-[#787774]">${finish}</span>
                                <span class="text-[9px] text-[#787774] font-medium">${w} X ${d}</span>
                                ${procDotsHtml}
                            </div>
                            <div class="flex flex-col items-end gap-0.5 flex-shrink-0">
                                <span class="text-[9px] font-black text-[#37352f] bg-[#f7f6f3] px-1 rounded">${pData.qty} EA</span>
                            </div>
                        </div>
                    </div>`;

                if (isAmt) { if (!pData.isDeleted) basicHtml += cardHtml; }

                const confirmBtn = document.getElementById('modal-confirm-btn');

            }

                [...(data.pOrderIds || []), ...(data.sOrderIds || []), ...(data.tOrderIds || [])].forEach(id => {

                    groupHeader.innerHTML = order

                        : `<div class="px-3 py-2.5 bg-[#37352f] rounded-t-lg"><span class="text-[11px] text-white/60 italic">주문 #${orderId}</span></div>`;
                    container.appendChild(groupHeader);

                    // 카드 래퍼 (헤더 아래 연결되는 테두리 박스)
                    const groupBody = document.createElement('div');
                    groupBody.className = 'col-span-full grid grid-cols-[repeat(auto-fill,minmax(300px,1fr))] gap-3 p-3 bg-[#f7f6f3] border border-t-0 border-[#37352f]/20 rounded-b-lg';

                    if (relatedCuttings.length === 0) {
                        groupBody.innerHTML = `<div class="col-span-full px-2 py-3 text-[#b0aeaa] italic text-[11px]">확정된 도면이 없습니다.</div>`;
                    } else {
                        relatedCuttings.forEach(data => renderCuttingCard(data, groupBody, orderId));
                    }
                    container.appendChild(groupBody);
                });
            }

            const bar = document.getElementById('id4000-action-bar');
            if (bar) bar.classList.toggle('hidden', !(filteredData.some(d => d.checked) && appMode === 'cutting'));
        }

        function renderCuttingCard(data, container, highlightOrderId) {
            const item = document.createElement('div');
            item.className = 'confirmed-cutting-item notion-card flex flex-col gap-4 relative p-4 w-full max-w-[340px] mx-auto';
            item.id = `confirmed-ui-${data.confirmId}`;
            // 4×8(2440:1220), 3×6(1840:920) 모두 2:1 비율 → 고정 SVG 표시 영역으로 통일
            const DISP_W = 300, DISP_H = 150;

            // 공통 도면 체크 (2개 이상의 상품카드에서 사용)
            const allOrderIds = [...new Set([...(data.pOrderIds || []), ...(data.sOrderIds || []), ...(data.tOrderIds || [])])];
            const isShared = allOrderIds.length > 1;
            const sharedBadge = isShared ? `<span class="text-[9px] font-bold px-2 py-0.5 rounded bg-[#f1f1ef] text-[#37352f] border border-[#ededeb]">공통도면</span>` : '';

            item.innerHTML = `
                <input type="checkbox" class="absolute top-3 left-3 z-[60] w-5 h-5 accent-[#37352f] scenario-result-check" data-id="${data.confirmId}" ${data.checked ? 'checked' : ''} onchange="toggleCuttingConfirmCheck(${data.confirmId})">
                <div class="flex justify-between items-center pl-10 pr-1 gap-1 flex-nowrap">
                    <div class="flex items-center gap-1.5 min-w-0 flex-1">
                        <div class="text-[11px] font-bold text-[#37352f] truncate min-w-0">${data.baseMaterial}<span class="text-[#787774]"> · ${data.materialColor}</span></div>
                        <div class="text-[13px] font-black text-[#37352f] whitespace-nowrap flex-shrink-0">${data.sheets}장</div>
                        ${sharedBadge}
                    </div>
                    <button onclick="cancelConfirmedCutting('${data.confirmId}')" class="text-[7px] font-bold text-red-500 bg-red-50 rounded-md px-2 py-1 flex-shrink-0 whitespace-nowrap">확정취소</button>
                </div>
                <div class="w-full bg-white flex justify-center">
                    <svg id="board-container-${data.confirmId}" width="${DISP_W}" height="${DISP_H}" viewBox="0 0 ${DISP_W} ${DISP_H}" style="display:block;border:1px solid #e3e2e0;border-radius:4px;flex-shrink:0;">
                        <rect width="${DISP_W}" height="${DISP_H}" fill="#f9f9f8"/>
                        ${(data.boardParts || []).map(p => {
                            const rx = p.lp * DISP_W, ry = p.tp * DISP_H;
                            const rw = Math.max(0.5, p.wp * DISP_W), rh = Math.max(0.5, p.hp * DISP_H);
                            const cx = rx + rw / 2, cy = ry + rh / 2;
                            const showW = rw >= 28 && rh >= 10 && p.dw;
                            const showH = rh >= 28 && rw >= 10 && p.dh;
                            const wLabel = showW ? `<text x="${cx.toFixed(1)}" y="${(ry + 8).toFixed(1)}" text-anchor="middle" font-size="8" font-weight="bold" fill="#37352f" pointer-events="none">${p.dw}</text>` : '';
                            const hLabel = showH ? `<text x="${(rx + 7).toFixed(1)}" y="${cy.toFixed(1)}" text-anchor="middle" font-size="8" font-weight="bold" fill="#37352f" transform="rotate(-90,${(rx+7).toFixed(1)},${cy.toFixed(1)})" pointer-events="none">${p.dh}</text>` : '';
                            return `<rect x="${rx.toFixed(2)}" y="${ry.toFixed(2)}" width="${rw.toFixed(2)}" height="${rh.toFixed(2)}" fill="${p.bg || '#ffffff'}" stroke="#37352f" stroke-width="1" data-order-ids="${p.oids}"/>${wLabel}${hLabel}`;
                        }).join('')}
                    </svg>
                </div>
                <div class="w-full flex flex-col gap-2 border-t border-[#f1f1ef] pt-3 px-1">
                    <div class="flex flex-col gap-1.5">
                        <div class="flex flex-col bg-[#fbfbfa] p-2 rounded-lg border border-[#f1f1ef]">
                            <div class="flex items-center gap-1.5 mb-0.5">
                                <span class="text-[#37352f] text-[11px] font-black truncate">[${data.pDisplayName}]</span>
                            </div>
                            <div class="font-bold text-[#37352f] text-[14px] leading-tight pl-1.5">${data.pInfoText}</div>
                        </div>
                        ${data.sId ? `<div class="flex flex-col bg-[#f7f6f3]/20 p-2 rounded-lg border border-[#ededeb]/50">
                            <div class="flex items-center gap-1.5 mb-0.5">
                                <span class="text-[#37352f] text-[11px] font-black truncate">[${data.sDisplayName}]</span>
                            </div>
                            <div class="font-bold text-[#37352f] text-[14px] leading-tight pl-1.5">${data.sInfoText}</div>
                        </div>` : ''}
                        ${data.tId ? `<div class="flex flex-col bg-[#f7f6f3]/20 p-2 rounded-lg border border-[#ededeb]/50">
                            <div class="flex items-center gap-1.5 mb-0.5">
                                <span class="text-[#37352f] text-[11px] font-black truncate">[${data.tDisplayName}]</span>
                            </div>
                            <div class="font-bold text-[#37352f] text-[14px] leading-tight pl-1.5">${data.tInfoText}</div>
                        </div>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(item);

            // 강조 표시 적용 (공통 도면에서 특정 상품카드 부속만 강조)
            if (highlightOrderId && isShared) {
                setTimeout(() => {
                    const boardContainer = document.getElementById(`board-container-${data.confirmId}`);
                    if (boardContainer) {
                        const rects = boardContainer.querySelectorAll('rect[data-order-ids]');
                        rects.forEach(rect => {
                            const partOrderIds = (rect.getAttribute('data-order-ids') || '').split(',').filter(Boolean).map(id => parseInt(id));
                            if (partOrderIds.includes(highlightOrderId)) {
                                // 이 상품카드에 해당하는 부속 → 강조
                                rect.setAttribute('fill', '#eeeeec');
                                rect.setAttribute('opacity', '1');
                            } else {
                                // 다른 상품카드 부속 → 흐리게
                                rect.setAttribute('opacity', '0.2');
                            }
                        });
                    }
                }, 50);
            }
        }

        function toggleCuttingConfirmCheck(confirmId) { const data = confirmedCuttingData.find(d => d.confirmId === confirmId); if (data) data.checked = !data.checked; renderConfirmedCuttingList(); }

        function toggleGroupCuttingCheck(groupIdsStr) { const ids = groupIdsStr.split(',').filter(Boolean).map(Number); const allChecked = ids.every(id => confirmedCuttingData.find(d => d.confirmId === id)?.checked); ids.forEach(id => { const data = confirmedCuttingData.find(d => d.confirmId === id); if (data) data.checked = !allChecked; }); renderConfirmedCuttingList(); }

        function confirmCutting() { if (!primarySelectedCardId) return; const pAgg = document.getElementById(primarySelectedCardId), sAgg = secondarySelectedCardId ? document.getElementById(secondarySelectedCardId) : null, tAgg = tertiarySelectedCardId ? document.getElementById(tertiarySelectedCardId) : null; const board = document.getElementById('board-rect'), confirmId = Date.now(), lastDash = selectedMaterialInfoText.lastIndexOf('-'), base = selectedMaterialInfoText.substring(0, lastDash), color = selectedMaterialInfoText.substring(lastDash + 1); const cuttingData = { confirmId, checked: false, targetPage: 'cutting', pId: primarySelectedCardId, pRowIndex: parseInt(pAgg.dataset.rowIndex), pProducedQty: currentProducedQtyPrimary, pDisplayName: pAgg.dataset.displayName, pInfoText: document.getElementById('part-production-detail-text').textContent, pOrderIds: pAgg.dataset.orderIds ? pAgg.dataset.orderIds.split(',').map(id => parseInt(id)) : [], sId: secondarySelectedCardId || null, sRowIndex: sAgg ? parseInt(sAgg.dataset.rowIndex) : null, sProducedQty: currentProducedQtySecondary, sDisplayName: sAgg ? sAgg.dataset.displayName : '', sInfoText: sAgg ? document.getElementById('residue-production-detail-text').textContent : '', sOrderIds: sAgg && sAgg.dataset.orderIds ? sAgg.dataset.orderIds.split(',').map(id => parseInt(id)) : [], tId: tertiarySelectedCardId || null, tRowIndex: tAgg ? parseInt(tAgg.dataset.rowIndex) : null, tProducedQty: currentProducedQtyTertiary, tDisplayName: tAgg ? tAgg.dataset.displayName : '', tInfoText: tAgg ? document.getElementById('tertiary-production-detail-text').textContent : '', tOrderIds: tAgg && tAgg.dataset.orderIds ? tAgg.dataset.orderIds.split(',').map(id => parseInt(id)) : [], baseMaterial: base, materialColor: color, sheets: suggestedSheets, boardParts: Array.from(board.querySelectorAll('.placed-part')).map(el => ({ lp: parseFloat(el.style.left) / parseFloat(board.style.width), tp: parseFloat(el.style.top) / parseFloat(board.style.height), wp: parseFloat(el.style.width) / parseFloat(board.style.width), hp: parseFloat(el.style.height) / parseFloat(board.style.height), bg: el.style.backgroundColor || '', oids: el.dataset.orderIds || '', dw: el.querySelector('.dim-w-label')?.textContent || '', dh: el.querySelector('.dim-d-label')?.textContent || '' })), boardW: parseFloat(board.style.width), boardH: parseFloat(board.style.height), cutW: (currentFullData[0] && currentFullData[parseInt(pAgg.dataset.rowIndex)]) ? (parseFloat(currentFullData[parseInt(pAgg.dataset.rowIndex)][currentFullData[0].indexOf('재단W')]) || 0) : 0, cutD: (currentFullData[0] && currentFullData[parseInt(pAgg.dataset.rowIndex)]) ? (parseFloat(currentFullData[parseInt(pAgg.dataset.rowIndex)][currentFullData[0].indexOf('재단D')]) || 0) : 0 }; console.log('[confirmCutting] cuttingData:', { pOrderIds: cuttingData.pOrderIds, sOrderIds: cuttingData.sOrderIds, tOrderIds: cuttingData.tOrderIds }); confirmedCuttingData.unshift(cuttingData); if (pAgg.dataset.isCommon !== "true") pAgg.dataset.qty = parseFloat(pAgg.dataset.qty) - currentProducedQtyPrimary; if (sAgg && sAgg.dataset.isCommon !== "true") sAgg.dataset.qty = parseFloat(sAgg.dataset.qty) - currentProducedQtySecondary; if (tAgg && tAgg.dataset.isCommon !== "true") tAgg.dataset.qty = parseFloat(tAgg.dataset.qty) - currentProducedQtyTertiary; primarySelectedCardId = null; secondarySelectedCardId = null; tertiarySelectedCardId = null; document.querySelectorAll('.inner-part-card').forEach(c => { c.classList.remove('active', 'suggested-card'); if (parseFloat(c.dataset.qty) <= 0.001 && c.dataset.isCommon !== "true") c.style.display = 'none'; }); isSheetsManual = false; updateBoardVisual(); renderConfirmedCuttingList(); refreshConsolidatedMaterials(); }

        function cancelConfirmedCutting(confirmId) { const idx = confirmedCuttingData.findIndex(d => d.confirmId == confirmId); if (idx === -1) return; confirmedCuttingData.splice(idx, 1); showSubParts(selectedMaterialInfoText, confirmedOrders.filter(o => o.checked)); renderConfirmedCuttingList(); updateBoardVisual(); refreshConsolidatedMaterials(); }


        function showToastMessage(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.style.opacity = '1'; setTimeout(() => toast.style.opacity = '0', 3000); }

        // 재단카드를 타임라인 배치보드에 배치
        function assignCuttingToMachine(machine) {
            const checkedData = confirmedCuttingData.filter(d => d.checked);
            if (checkedData.length === 0) { alert('배치할 재단 도면을 선택해주세요!'); return; }

            checkedData.forEach(data => {
                const allOrderIds = [...new Set([...(data.pOrderIds||[]), ...(data.sOrderIds||[]), ...(data.tOrderIds||[])])];
                const order = confirmedOrders.find(o => allOrderIds.includes(o.idNum));
                const cuttingDate = order?.procOverrides?.['재단'] || order?.deliveryDate || '미정';
                const sk = cuttingDate + '-재단';
                const cKey = 'cut_' + data.confirmId;

                // 상태 초기화
                if (!window._woBoring[sk]) window._woBoring[sk] = { 'AMT': [], pool: [] };
                if (!window._woBoringParts[sk]) window._woBoringParts[sk] = [];

                // 중복 방지
                const allAssigned = new Set([
                    ...(window._woBoring[sk]['AMT']||[]),
                    ...(window._woBoring[sk].pool||[])
                ]);
                if (allAssigned.has(cKey)) return;

                // pool(미배정)에 추가 — 타임라인에서 드래그로 기계 배정
                window._woBoring[sk].pool.push(cKey);

                // 부속 정보 등록
                const orderCode = allOrderIds.map(id => confirmedOrders.find(o=>o.idNum===id)?.orderCode).filter(Boolean).join('/');
                const orderName = allOrderIds.map(id => confirmedOrders.find(o=>o.idNum===id)?.displayName).filter(Boolean).join(' / ');
                window._woBoringParts[sk].push({
                    cKey,
                    nm: `${data.baseMaterial} · ${data.materialColor}`,
                    pm: 0,
                    dq: data.sheets || 1,
                    orderCode,
                    orderName,
                    orderKey: String(allOrderIds[0] || ''),
                    plateName: data.baseMaterial || '',
                    finish: data.materialColor || '',
                    rw: data.cutW || 0,
                    rd: data.cutD || 0,
                    deliveryDate: order?.deliveryDate || '',
                    boardParts: data.boardParts || [],
                    sheets: data.sheets || 1,
                    isCuttingCard: true
                });
            });

            // 확정 리스트에서 제거
            confirmedCuttingData = confirmedCuttingData.filter(d => !d.checked);
            renderConfirmedCuttingList();
            showToastMessage(`${checkedData.length}개 재단 도면이 AMT 재단 타임라인 미배정 풀에 등록되었습니다.`);
        }

        // AMT재단으로 전송 (Firebase - 레거시 보존)
        async function sendToAmtCutting() {
            const checkedData = confirmedCuttingData.filter(d => d.checked);
            if (checkedData.length === 0) {
                alert('전송할 재단 도면을 선택해주세요!');
                return;
            }

            if (!confirm(`선택한 ${checkedData.length}개의 재단 도면을 AMT재단으로 전송하시겠습니까?`)) return;

            const { collection, addDoc, serverTimestamp } = window.fbFirestore;
            const appId = "vivivic-4b7ef";

            try {
                const amtCuttingRef = collection(window.db, 'artifacts', appId, 'public', 'data', 'amt_cutting');

                for (const data of checkedData) {
                    // 이 재단도면에 포함된 상품카드들의 orderCode 수집
                    const allOrderIds = [...new Set([
                        ...(data.pOrderIds || []),
                        ...(data.sOrderIds || []),
                        ...(data.tOrderIds || [])
                    ])];

                    const orderCodes = allOrderIds.map(orderId => {
                        const order = confirmedOrders.find(o => o.idNum === orderId);
                        return order?.orderCode || null;
                    }).filter(code => code);

                    console.log('[sendToAmtCutting] 재단도면 전송:', { confirmId: data.confirmId, orderCodes });

                    await addDoc(amtCuttingRef, {
                        ...data,
                        orderCodes: orderCodes, // orderCode 배열 추가
                        sentFrom: 'cutting',
                        sentAt: serverTimestamp(),
                        status: 'pending'
                    });
                }

                // 전송한 항목 제거
                confirmedCuttingData = confirmedCuttingData.filter(d => !d.checked);
                renderConfirmedCuttingList();
                showToastMessage(`${checkedData.length}개 재단 도면이 AMT재단으로 전송되었습니다.`);
            } catch (err) {
                console.error('AMT재단 전송 오류:', err);
                showToastMessage('전송 실패');
            }
        }

        // 재단외주로 전송
        async function sendToOutsourceCutting() {
            const checkedData = confirmedCuttingData.filter(d => d.checked);
            if (checkedData.length === 0) {
                alert('전송할 재단 도면을 선택해주세요!');
                return;
            }

            if (!confirm(`선택한 ${checkedData.length}개의 재단 도면을 재단외주로 전송하시겠습니까?`)) return;

            const { collection, addDoc, serverTimestamp } = window.fbFirestore;
            const appId = "vivivic-4b7ef";

            try {
                const outsourceCuttingRef = collection(window.db, 'artifacts', appId, 'public', 'data', 'outsource_cutting');

                for (const data of checkedData) {
                    // 이 재단도면에 포함된 상품카드들의 orderCode 수집
                    const allOrderIds = [...new Set([
                        ...(data.pOrderIds || []),
                        ...(data.sOrderIds || []),
                        ...(data.tOrderIds || [])
                    ])];

                    const orderCodes = allOrderIds.map(orderId => {
                        const order = confirmedOrders.find(o => o.idNum === orderId);
                        return order?.orderCode || null;
                    }).filter(code => code);

                    console.log('[sendToOutsourceCutting] 재단도면 전송:', { confirmId: data.confirmId, orderCodes });

                    await addDoc(outsourceCuttingRef, {
                        ...data,
                        orderCodes: orderCodes, // orderCode 배열 추가
                        sentFrom: 'cutting',
                        sentAt: serverTimestamp(),
                        status: 'pending'
                    });
                }

                // 전송한 항목 제거
                confirmedCuttingData = confirmedCuttingData.filter(d => !d.checked);
                renderConfirmedCuttingList();
                showToastMessage(`${checkedData.length}개 재단 도면이 재단외주로 전송되었습니다.`);
            } catch (err) {
                console.error('재단외주 전송 오류:', err);
                showToastMessage('전송 실패');
            }
        }
    </script>
