        // --- 작업시간 계산 함수 (공정별 독립 난이도) ---
        // difficulties: { 재단:1, 엣지:1, 보링:1, NC:1 }
        function calcProcessTime(row, qty, difficulties, h) {
            const W = parseFloat(row[h.indexOf("재단W")]) || 0;
            const D = parseFloat(row[h.indexOf("재단D")]) || 0;
            const totalEdge = String(row[h.indexOf("총엣지면")] || '').toLowerCase();
            const edgeFaces = (totalEdge === 'non' || totalEdge === 'x' || totalEdge === '') ? 0 : (parseFloat(totalEdge) || 0);
            const hasBoring = String(row[h.indexOf("보링수량")] || '').includes('입력대기') || (parseFloat(row[h.indexOf("보링수량")]) > 0);
            const hasNC = String(row[h.indexOf("NC유무")] || '').toUpperCase() === 'O';
            const hasEdge = edgeFaces > 0;
            const hasCutting = W > 0 && D > 0;

            // 공정별 독립 난이도 배율: 1→1.0배, 2→1.1배, ..., 10→1.9배
            const diffMap = (typeof difficulties === 'object' && difficulties !== null) ? difficulties : {};
            const mult = (key) => { const d = Math.max(1, Math.min(10, parseInt(diffMap[key]) || 1)); return 1 + (d - 1) * 0.1; };

            const perimeter = (W * 2) + (D * 2);
            const edgeVal = (W * edgeFaces) + (edgeFaces * D);

            return {
                재단: hasCutting ? +(perimeter * qty * PROCESS_BASE_RATES.재단 * mult('재단')).toFixed(3) : 0,
                엣지: hasEdge   ? +(edgeVal   * qty * PROCESS_BASE_RATES.엣지 * mult('엣지')).toFixed(3) : 0,
                보링: hasBoring  ? +(perimeter * qty * PROCESS_BASE_RATES.보링 * mult('보링')).toFixed(3) : 0,
                NC:   hasNC     ? +(perimeter * qty * PROCESS_BASE_RATES.NC   * mult('NC')).toFixed(3)   : 0,
            };
        }

        // --- 공정관리 카드 렌더링 ---
        function renderProcessCards() {
            const container = document.getElementById('process-card-list');
            const cards = Object.values(processCards);
            if (cards.length === 0) {
                container.innerHTML = '<div class="p-8 text-center font-bold tracking-tight text-[13px] italic text-[#787774]">상품을 검색하여 선택하면 공정 작업시간이 표시됩니다.</div>';
                return;
            }
            if (currentFullData.length < 2) return;
            const h = currentFullData[0];

            container.innerHTML = cards.map(card => {
                const orderQty = card.qty || 1;  // 완성품(세트) 발주수량
                const partRows = card.rows.map(ri => currentFullData[ri]).filter(Boolean);
                const amtRows = partRows.filter(r => normalizeValue(r[h.indexOf("공급처")]) === "AMT");
                const isOpen = card.isOpen || false;

                // 총 작업시간 계산
                const totalTime = amtRows.reduce((sum, row) => {
                    // ✅ cardKey: 엑셀 데이터 기반 (부속명|원장명|마감색상|재단WxD) → 세션/재업로드 무관하게 항상 동일
                    const cardKey = [
                        row[h.indexOf("부속명")]    || '',
                        row[h.indexOf("원장명")]    || '',
                        row[h.indexOf("마감색상")]  || '',
                        `${row[h.indexOf("재단W")] || 0}x${row[h.indexOf("재단D")] || 0}`
                    ].join('|');
                    const pData = card.processData[cardKey] || {};
                    const diffs = pData.difficulties || { 재단:1, 엣지:1, 보링:1, NC:1 };
                    // 부속 세트수량 = unitCons × orderQty
                    const unitCons = parseFloat(row[h.indexOf("세트별소모량")]) || 1;
                    const partQty = unitCons * orderQty;
                    const t = calcProcessTime(row, partQty, diffs, h);
                    return sum + t.재단 + t.엣지 + t.보링 + t.NC;
                }, 0);

                // 발주서 출처 배지
                const sourceBadge = card.sourceDocId
                    ? `<div class="flex items-center gap-1.5 flex-wrap mt-0.5">
                        <span class="px-1.5 py-0.5 bg-[#f1f1ef] text-[#37352f] border border-[#ededeb] rounded text-[9px] font-bold">발주서</span>
                        ${card.orderCode ? `<span class="px-1.5 py-0.5 bg-[#f1f1ef] text-[#787774] rounded text-[9px] font-mono">${card.orderCode}</span>` : ''}
                        ${card.deliveryDate ? `<span class="text-[9px] text-[#787774]">납기 ${card.deliveryDate}</span>` : ''}
                       </div>`
                    : '';

                // 부속 카드 HTML (펼쳤을 때만 렌더)
                const partsHtml = amtRows.map(row => {
                    // ✅ cardKey: 엑셀 데이터 기반 (부속명|원장명|마감색상|재단WxD) → 세션/재업로드 무관하게 항상 동일
                    const cardKey = [
                        row[h.indexOf("부속명")]    || '',
                        row[h.indexOf("원장명")]    || '',
                        row[h.indexOf("마감색상")]  || '',
                        `${row[h.indexOf("재단W")] || 0}x${row[h.indexOf("재단D")] || 0}`
                    ].join('|');
                    const pData = card.processData[cardKey] || {};
                    const diffs = pData.difficulties || { 재단:1, 엣지:1, 보링:1, NC:1 };

                    // 세트별소모량 × 발주수량 = 부속 세트수량
                    const unitCons = parseFloat(row[h.indexOf("세트별소모량")]) || 1;
                    const partQty = unitCons * orderQty;

                    const times = calcProcessTime(row, partQty, diffs, h);
                    const partName  = row[h.indexOf("부속명")] || '-';
                    const plateName = row[h.indexOf("원장명")] || '';
                    const W = row[h.indexOf("재단W")] || 0;
                    const D = row[h.indexOf("재단D")] || 0;
                    const totalEdge = String(row[h.indexOf("총엣지면")] || '').toLowerCase();
                    const hasBoring = String(row[h.indexOf("보링수량")] || '').includes('입력대기');
                    const hasNC     = String(row[h.indexOf("NC유무")] || '').toUpperCase() === 'O';
                    const hasEdge   = !['non','x',''].includes(totalEdge);
                    const isCut     = hasCutting(W, D);

                    // 공정 배지
                    const processBadges = [
                        isCut     ? `<span class="px-1.5 py-0.5 text-white rounded text-[9px] font-bold" style="background:#90BBC6">재단</span>` : '',
                        hasEdge   ? `<span class="px-1.5 py-0.5 text-white rounded text-[9px] font-bold" style="background:#17C3B2">엣지</span>` : '',
                        hasBoring ? `<span class="px-1.5 py-0.5 text-white rounded text-[9px] font-bold" style="background:#227C9D">보링</span>` : '',
                        hasNC     ? `<span class="px-1.5 py-0.5 text-white rounded text-[9px] font-bold" style="background:#FF9C75">NC</span>`   : '',
                    ].filter(Boolean).join('');

                    // 공정별 난이도 + 작업시간 행
                    const procRows = [
                        { key:'재단', active: isCut,     color:'#90BBC6', time: times.재단 },
                        { key:'엣지', active: hasEdge,   color:'#17C3B2', time: times.엣지 },
                        { key:'보링', active: hasBoring, color:'#227C9D', time: times.보링 },
                        { key:'NC',   active: hasNC,     color:'#FF9C75', time: times.NC   },
                    ];
                    const procHtml = procRows.map(p => {
                        const curDiff = diffs[p.key] || 1;
                        const opts = Array.from({length:10}, (_,i) => i+1)
                            .map(n => `<option value="${n}" ${curDiff==n?'selected':''}>${n}${n===1?' ★':''}</option>`).join('');
                        return `
                        <div class="flex items-center justify-between gap-1 py-0.5 ${p.active ? '' : 'opacity-25'}">
                            <div class="flex items-center gap-1 min-w-0">
                                <span class="text-[9px] font-black w-6 text-[#787774]">${p.key}</span>
                                <span class="text-[11px] font-black" style="${p.active ? `color:${p.color}` : 'color:#d3d1cb'}">
                                    ${p.active ? p.time.toFixed(2) + '분' : '-'}
                                </span>
                            </div>
                            <div class="flex items-center gap-0.5 flex-shrink-0">
                                <span class="text-[8px] text-[#787774]">난이도</span>
                                <select class="text-[9px] border border-[#e3e2e0] rounded px-0.5 py-0 bg-white focus:outline-none ${p.active ? '' : 'pointer-events-none'}"
                                    ${p.active ? '' : 'disabled'}
                                    onchange="updateProcessDifficulty(${card.idNum}, decodeURIComponent('${encodeURIComponent(cardKey)}'), '${p.key}', this.value)">
                                    ${opts}
                                </select>
                            </div>
                        </div>`;
                    }).join('');

                    return `
                    <div class="p-3 rounded-xl border border-[#ededeb] bg-white shadow-sm flex flex-col gap-1">
                        <div class="flex items-start gap-2 pb-1.5 mb-1 border-b border-[#f1f1ef]">
                            <div class="flex flex-col min-w-0 flex-1">
                                <span class="text-[11px] font-bold text-[#37352f]">${partName}</span>
                                <span class="text-[9px] text-[#787774]">${plateName} · ${W}×${D}</span>
                                <div class="flex gap-1 mt-1 flex-wrap">${processBadges}</div>
                            </div>
                            <!-- 세트수량 표시: unitCons × orderQty -->
                            <div class="flex flex-col items-end flex-shrink-0 gap-0.5">
                                <span class="text-[9px] text-[#787774]">세트수량</span>
                                <span class="text-[12px] font-black text-[#37352f] bg-[#f7f6f3] px-1.5 rounded">${partQty} EA</span>
                                <span class="text-[8px] text-[#787774]">(×${unitCons}/세트)</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-0">${procHtml}</div>
                    </div>`;
                }).join('');

                return `
                <div class="mb-3 notion-card overflow-hidden border shadow-sm">
                    <!-- 카드 헤더 (항상 표시) -->
                    <div class="p-4 border-b border-[#f1f1ef] bg-[#fbfbfa]">
                        <div class="flex items-center justify-between gap-2">
                            <!-- 상품명 + 토글 (클릭 영역) -->
                            <div class="flex items-center gap-2 cursor-pointer flex-1 min-w-0" onclick="toggleProcessCard(${card.idNum})">
                                <svg class="flex-shrink-0 transition-transform duration-200 ${isOpen ? 'rotate-90' : ''}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#787774" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                                <div class="flex flex-col min-w-0">
                                    <span class="font-bold text-[13px] text-[#37352f] truncate">${card.displayName}</span>
                                    <span class="text-[10px] text-[#787774]">${card.supplier || ''} · ${card.code || ''}</span>
                                    ${sourceBadge}
                                </div>
                            </div>
                            <!-- 수량 입력 + 총시간 + 버튼 -->
                            <div class="flex items-center gap-2 flex-shrink-0">
                                <div class="flex items-center gap-1" onclick="event.stopPropagation()">
                                    <span class="text-[10px] text-[#787774] whitespace-nowrap">발주수량</span>
                                    <input type="number" min="1" value="${orderQty}"
                                        class="w-14 text-[11px] text-center border border-[#e3e2e0] rounded-md px-1 py-0.5 bg-white focus:outline-none focus:border-[#ededeb] transition-all"
                                        onchange="updateProcessQty(${card.idNum}, this.value)">
                                    <span class="text-[10px] text-[#787774]">EA</span>
                                </div>
                                <span class="text-[10px] font-black text-[#37352f] bg-[#f7f6f3] px-2 py-1 rounded-lg whitespace-nowrap">총 ${totalTime.toFixed(1)}분</span>
                                <button onclick="saveProcessCardToFirebase(${card.idNum})" class="px-2 py-1 bg-[#37352f] text-white text-[10px] font-bold rounded-lg hover:bg-black transition-all active:scale-95">저장</button>
                                <button onclick="removeProcessCard(${card.idNum})" class="px-2 py-1 bg-red-50 text-red-500 border border-red-200 text-[10px] font-bold rounded-lg hover:bg-red-100 transition-all active:scale-95">삭제</button>
                            </div>
                        </div>
                    </div>
                    <!-- 부속 카드 그리드 (토글) -->
                    <div id="proc-parts-${card.idNum}" class="${isOpen ? '' : 'hidden'} p-4 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2">
                        ${partsHtml || '<div class="col-span-full text-center text-[#787774] text-[11px] italic py-4">AMT 부속이 없습니다.</div>'}
                    </div>
                </div>`;
            }).join('');

            // 카드 렌더링 후 타임라인도 동기화
            renderProcessTimeline();
        }

        // 공정관리 카드 토글
        function toggleProcessCard(idNum) {
            const card = processCards[idNum];
            if (!card) return;
            card.isOpen = !card.isOpen;
            // 부분 DOM 업데이트 (전체 재렌더 없이 해당 카드만)
            const partsEl = document.getElementById(`proc-parts-${idNum}`);
            const arrowEl = partsEl?.previousElementSibling?.querySelector('svg');
            if (partsEl) partsEl.classList.toggle('hidden', !card.isOpen);
            if (arrowEl) arrowEl.style.transform = card.isOpen ? 'rotate(90deg)' : '';
        }

        function hasCutting(W, D) { return parseFloat(W) > 0 && parseFloat(D) > 0; }

        // ===== 공정 일정 타임라인 =====
        // 타임라인에 추가로 표시할 날짜 목록 (+ 버튼으로 추가)

        // 날짜 문자열(YYYY-MM-DD) → { month, day, weekday } 변환
        function parseDateCard(dateStr) {
            if (!dateStr) return null;
            const d = new Date(dateStr + 'T00:00:00');
            if (isNaN(d)) return null;
            const weekdays = ['일','월','화','수','목','금','토'];
            return {
                dateStr,
                month: d.getMonth() + 1,
                day:   d.getDate(),
                weekday: weekdays[d.getDay()],
                isSat: d.getDay() === 6,
                isSun: d.getDay() === 0,
                ts: d.getTime()
            };
        }

        // 타임라인 렌더링
        // batchId(Unix 타임스탬프 ms)에서 발주일 YYYY-MM-DD 추출

        // 타임라인 공정 필터 상태 (Set: 빈 Set = 전체보기)
        let timelineProcessFilter = new Set(); // 비어있으면 전체

        // 타임라인 상품 버튼 선택/해제

        // 로컬 날짜 기준 YYYY-MM-DD (전역) — toISOString()은 UTC 변환으로 한국에서 하루 밀림
        function toLocalDateStr(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        // 선택된 상품을 동일 섹션의 다른 날짜로 이동 (deliveryDate Firebase 업데이트)
        async function moveTlCardToDate(targetDateStr, targetProcessKey) {
            if (!selectedTlCard) return;
            const { idNum, processKey } = selectedTlCard;

            // 동일 섹션(공정)으로만 이동 가능
            if (targetProcessKey !== processKey) {
                showToastMessage(`"${processKey}" 섹션으로만 이동할 수 있습니다.`);
                return;
            }

            const item = confirmedOrders.find(o => o.idNum === idNum);
            if (!item || !item.docId) return;

            // 납기일 역산: 공정별 offset 만큼 더한 날짜를 deliveryDate로
            const offsetMap = { '재단': 3, 'NC': 3, '엣지': 2, '보링': 1, '납기': 0 };
            const offset = offsetMap[processKey] ?? 0;
            const d = new Date(targetDateStr + 'T00:00:00');
            d.setDate(d.getDate() + offset);
            // 주말이면 월요일로
            if (d.getDay() === 6) d.setDate(d.getDate() + 2);
            if (d.getDay() === 0) d.setDate(d.getDate() + 1);
            const newDeliveryDate = toLocalDateStr(d);

            try {
                const { doc, updateDoc } = window.fbFirestore;
                const docRef = doc(window.db, 'artifacts', 'vivivic-4b7ef', 'public', 'data', 'confirmed_orders', item.docId);
                await updateDoc(docRef, { deliveryDate: newDeliveryDate });
                item.deliveryDate = newDeliveryDate;
                selectedTlCard = null;
                showToastMessage(`납기일이 ${newDeliveryDate}로 변경됐습니다.`);
                renderProcessTimeline();
            } catch(e) {
                showToastMessage('이동 실패: ' + e.message);
            }
        }

        function setTimelineFilter(process) {
            if (process === 'all') {
                // 전체: 모든 개별 필터 해제
                timelineProcessFilter.clear();
            } else {
                // 개별 공정 토글 (멀티선택)
                if (timelineProcessFilter.has(process)) {
                    timelineProcessFilter.delete(process);
                } else {
                    timelineProcessFilter.add(process);
                }
            }
            // 버튼 active 상태 업데이트
            const isAll = timelineProcessFilter.size === 0;
            document.getElementById('tl-filter-all').classList.toggle('active', isAll);
            ['재단','NC','엣지','보링'].forEach(p => {
                const btn = document.getElementById(`tl-filter-${p}`);
                if (btn) btn.classList.toggle('active', timelineProcessFilter.has(p));
            });
            // 타임라인 재렌더
            renderProcessTimeline();
        }

        // ── 무한 스크롤 타임라인 엔진 ─────────────────────────────────────
        const TL = {
            CARD_W: 165,   // 카드 너비
            GAP:     12,   // gap
            BUFFER:  30,   // 양쪽 미리 렌더할 날짜 수
            offset:   0,   // 현재 트랙 translateX (px)
            dragging: false,
            startX:   0,
            lastX:    0,
            velX:     0,
            rafId:    null,
            centerDate: null,  // 현재 중앙 날짜 (YYYY-MM-DD)
            renderedDates: [], // 렌더된 날짜 배열 (오름차순)
            activatedWeekendDates: new Set(), // 사용자가 활성화한 주말 날짜들

            get cellW() { return this.CARD_W + this.GAP; },

            init() {
                const wrap  = document.getElementById('tl-infinite-wrap');
                const track = document.getElementById('tl-infinite-track');
                if (!wrap || !track) return;

                // 오늘을 중심으로 초기화
                this.centerDate = toLocalDateStr(new Date());
                this.offset = 0;
                this.renderedDates = [];

                // 초기 렌더: 뷰포트 기준 좌우 BUFFER일
                this._buildRange();
                this._applyTransform(false);
                this._scrollToDate(this.centerDate, false);
                this._initDrag(wrap);
                // 초기화 후 납기·공정 섹션 채우기
                this._fillDeliverySections();
                this._fillProcessSections();
                this._fillOrderBtns();
                this._fillPartSections();
            },

            // 날짜 오프셋 계산
            _dateOffset(dateStr, days) {
                const d = new Date(dateStr + 'T00:00:00');
                d.setDate(d.getDate() + days);
                return toLocalDateStr(d);
            },

            // 현재 중심 기준으로 필요한 범위 렌더
            _buildRange() {
                const container = document.getElementById('process-timeline-container');
                if (!container) return;

                const start = this._dateOffset(this.centerDate, -this.BUFFER);
                const end   = this._dateOffset(this.centerDate,  this.BUFFER);

                // 앞쪽 추가
                let d = start;
                const toAdd = [];
                while (d <= end) {
                    if (!this.renderedDates.includes(d)) toAdd.push(d);
                    d = this._dateOffset(d, 1);
                }

                if (toAdd.length === 0) return;

                // 앞쪽 날짜 (renderedDates 보다 이전)
                const before = toAdd.filter(d => !this.renderedDates.length || d < this.renderedDates[0]);
                const after  = toAdd.filter(d => !this.renderedDates.length || d > this.renderedDates[this.renderedDates.length - 1]);

                before.reverse().forEach(dateStr => {
                    const el = this._makeCard(dateStr);
                    container.insertBefore(el, container.firstChild);
                    this.renderedDates.unshift(dateStr);
                    // 앞에 추가하면 트랙이 밀리므로 offset 보정
                    this.offset -= this.cellW;
                });

                after.forEach(dateStr => {
                    const el = this._makeCard(dateStr);
                    container.appendChild(el);
                    this.renderedDates.push(dateStr);
                });

                this._applyTransform(false);
            },

            // 날짜카드 HTML 생성
            _makeCard(dateStr) {
                const div = document.createElement('div');
                div.dataset.tlDate = dateStr;
                div.style.cssText = `min-width:${this.CARD_W}px; max-width:${this.CARD_W}px; flex-shrink:0;`;
                div.innerHTML = this._renderEmptyCard(dateStr);
                return div;
            },

            // 날짜카드 HTML (공정 섹션 외형 포함)
            _renderEmptyCard(dateStr) {
                const info = parseDateCard(dateStr);
                if (!info) return '';
                const today = toLocalDateStr(new Date());
                const isToday = dateStr === today;
                const wColor = info.isSat ? 'text-[#787774]' : info.isSun ? 'text-red-400' : 'text-[#787774]';

                // 주말(토·일): 활성화 여부 확인
                if (info.isSat || info.isSun) {
                    const isActivated = TL.activatedWeekendDates.has(dateStr);

                    if (!isActivated) {
                        // 비활성 주말: 날짜 흐리게 + 작업+ 버튼
                        const bColor = info.isSat ? 'border-[#ededeb]' : 'border-red-100';
                        const wkLabel = info.isSat ? '토요일' : '일요일';
                        return `<div class="flex flex-col rounded-xl border ${bColor} bg-white shadow-sm overflow-hidden h-full" data-card-date="${dateStr}" data-weekend="1">
                            <div class="px-3 pt-3 pb-2 flex flex-col items-center" style="position:relative;" ondblclick="if(!event.target.closest('button'))tlExpandDateCard('${dateStr}')">
                                <div class="tl-order-btn-wrap" data-date="${dateStr}" style="display:none;position:absolute;top:4px;right:4px;z-index:10;flex-direction:column;align-items:flex-end;gap:2px;"></div>
                                <div style="opacity:0.45;display:flex;flex-direction:column;align-items:center;width:100%;">
                                    <span class="text-[10px] font-bold text-[#c8c6c2]">${info.month}월</span>
                                    <span class="text-[32px] font-black leading-none text-[#d0ceca]">${info.day}</span>
                                    <span class="text-[12px] font-black ${wColor} mt-0.5">${info.weekday}요일</span>
                                </div>
                                <button class="tl-activate-weekend-btn" onclick="tlActivateWeekend('${dateStr}')" title="${dateStr} ${wkLabel} 작업일 활성화">작업+</button>
                            </div>
                        </div>`;
                    }

                    // 활성화된 주말: 평일과 동일하게 공정 섹션 포함 렌더
                    // (아래 평일 렌더링 코드로 이어짐)
                }

                // 활성화된 주말 or 평일: 공정 섹션 외형 표시
                const isActivatedWeekend = (info.isSat || info.isSun) && TL.activatedWeekendDates.has(dateStr);
                const borderCls = isToday ? 'tl-card-today border-[#ededeb]'
                    : isActivatedWeekend ? (info.isSat ? 'border-[#b0aeaa]' : 'border-red-200')
                    : 'border-[#ededeb]';

                const makeSection = (label, headerCls, labelCls, processKey) => {
                    return `<div class="border-t border-[#f1f1ef]">
                        <div class="px-2 py-0.5 ${headerCls} flex items-center justify-between gap-1" onclick="tlOpenProcessView('${processKey}')" style="cursor:pointer;">
                            <span class="text-[8px] font-black ${labelCls} uppercase tracking-wider">${label}</span>
                            <span class="tl-proc-stat" data-date="${dateStr}" data-process="${processKey}" style="display:none;font-size:8px;font-weight:800;color:#fff;background:rgba(0,0,0,0.18);padding:0 4px;border-radius:3px;white-space:nowrap;"></span>
                        </div>
                        <div class="tl-process-section px-1 py-1" data-date="${dateStr}" data-process="${processKey}"></div>
                    </div>`;
                };

                // 납기 섹션 — 헤더에 수량 뱃지 슬롯 포함
                const deliverySection = `<div class="border-t border-[#f1f1ef]">
                    <div class="px-2 py-0.5 tl-proc-header-납기 flex items-center justify-between gap-1" onclick="tlOpenProcessView('납기')" style="cursor:pointer;">
                        <span class="text-[8px] font-black tl-proc-label-납기 uppercase tracking-wider">납기</span>
                        <span class="tl-delivery-count" data-date="${dateStr}" style="font-size:8px;font-weight:800;color:#fff;background:rgba(0,0,0,0.18);padding:0 4px;border-radius:3px;display:none;"></span>
                    </div>
                    <div class="tl-process-section px-1 py-1" data-date="${dateStr}" data-process="납기"></div>
                </div>`;
                const cuttingSection  = makeSection('재단', 'tl-proc-header-재단', 'tl-proc-label-재단', '재단');
                const ncSection       = makeSection('NC',   'tl-proc-header-NC',   'tl-proc-label-NC',   'NC');
                const edgeSection     = makeSection('엣지', 'tl-proc-header-엣지', 'tl-proc-label-엣지', '엣지');
                const boringSection   = makeSection('보링', 'tl-proc-header-보링', 'tl-proc-label-보링', '보링');

                // 활성화 주말 배지 + 비활성화 버튼
                const weekendActiveBadge = isActivatedWeekend
                    ? `<span class="tl-weekend-active-badge">${info.isSat ? '토' : '일'}</span>
                       <button class="tl-deactivate-weekend-btn" onclick="tlActivateWeekend('${dateStr}', true)" title="작업일 해제">✕</button>`
                    : '';

                return `<div class="flex flex-col rounded-xl border ${borderCls} bg-white shadow-sm overflow-hidden h-full" style="transition: opacity 0.25s, transform 0.25s;" data-card-date="${dateStr}"${isActivatedWeekend ? ' data-weekend-activated="1"' : ''}>
                    <div class="relative px-3 pt-3 pb-2 flex flex-col items-center" ondblclick="if(!event.target.closest('button'))tlExpandDateCard('${dateStr}')" onclick="if(window.innerWidth<=767&&!event.target.closest('button'))tlExpandDateCard('${dateStr}')">
                        <div class="tl-order-btn-wrap" data-date="${dateStr}" style="display:none;position:absolute;top:4px;right:4px;z-index:10;flex-direction:column;align-items:flex-end;gap:2px;"></div>
                        ${weekendActiveBadge}
                        <span class="text-[10px] font-bold text-[#b0aeaa]">${info.month}월</span>
                        <span class="text-[32px] font-black leading-none ${isActivatedWeekend ? (info.isSat ? 'text-[#787774]' : 'text-red-400') : (isToday ? 'text-[#787774]' : 'text-[#37352f]')}">${info.day}</span>
                        <span class="text-[12px] font-black ${isActivatedWeekend ? (info.isSat ? 'text-[#787774]' : 'text-red-400') : 'text-[#787774]'} mt-0.5">${info.weekday}요일</span>
                        <span class="tl-today-badge" style="visibility:${isToday ? 'visible' : 'hidden'};">TODAY</span>
                    </div>
                    ${deliverySection}${boringSection}${edgeSection}${ncSection}${cuttingSection}
                </div>`;
            },

            // 카드 내용 갱신
            refreshCards() {
                const container = document.getElementById('process-timeline-container');
                if (!container) return;
                // 1) 빈 카드 HTML 재생성
                container.querySelectorAll('[data-tl-date]').forEach(div => {
                    div.innerHTML = this._renderEmptyCard(div.dataset.tlDate);
                });
                // 2) 납기 섹션에 발주 상품카드 배치
                TL._fillDeliverySections();
                // 3) 공정별 섹션에 상품카드 배치 (납기 오프셋)
                TL._fillProcessSections();
                // 4) 발주일 기준 날짜카드 상단 발주 버튼 배치
                TL._fillOrderBtns();
                // 5) 이동된 부속 카드 배치
                TL._fillPartSections();
            },

            // 납기 섹션 채우기: pendingOrders의 deliveryDate → 해당 날짜카드 납기 섹션에 인라인 토글 배치
            _fillDeliverySections() {
                const PROC = [
                    { key: '재단', color: '#90BBC6' },
                    { key: 'NC',   color: '#FF9C75' },
                    { key: '엣지', color: '#17C3B2' },
                    { key: '보링', color: '#227C9D' },
                ];
                const pendingOrders = confirmedOrders.filter(o => o.amtTimeline === true && o.amtRegistered !== true && !o.amtConfirmedCancel);

                // 날짜별 그룹핑
                const byDate = {};
                pendingOrders.forEach(item => {
                    const d = item.deliveryDate;
                    if (!d) return;
                    if (!byDate[d]) byDate[d] = [];
                    byDate[d].push(item);
                });

                Object.entries(byDate).forEach(([dateStr, items]) => {
                    const section = document.querySelector(`.tl-process-section[data-date="${dateStr}"][data-process="납기"]`);
                    if (!section) return;

                    // ── 헤더 수량 뱃지 업데이트 ──────────────────────────
                    const countBadge = document.querySelector(`.tl-delivery-count[data-date="${dateStr}"]`);
                    if (countBadge) {
                        const totalQty = items.reduce((s, o) => s + (o.orderQty || 0), 0);
                        countBadge.textContent = items.length;
                        countBadge.style.display = 'inline';
                    }

                    // ── 상품별 토글 행 생성 ──────────────────────────────
                    const itemsHtml = items.map(item => {
                        const h  = currentFullData[0];
                        const wt = item.cachedWorkTime || {};

                        // 상품 총 작업시간
                        const totalMin = PROC.reduce((s, p) => s + (wt[p.key] ?? 0), 0);
                        const totalStr = totalMin > 0 ? `${Math.round(totalMin)}분` : '';

                        // 상품행 공정 스팟 (hover 툴팁)
                        const spots = PROC.filter(p => (wt[p.key] ?? 0) > 0)
                            .map(p => `<span class="tl-spot-wrap">
                                <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color};"></span>
                                <span class="tl-spot-tip">${p.key} ${Math.round(wt[p.key])}분</span>
                            </span>`).join('');

                        // 부속 목록 (AMT, 미삭제)
                        let partsHtml = '';
                        if (h && currentFullData.length >= 2) {
                            const matchingRows = currentFullData.slice(1).filter(r =>
                                r && normalizeValue(r[h.indexOf("ing발주처")]) === item.supplier &&
                                IDENTITY_HEADERS.every((col, i) => normalizeValue(r[h.indexOf(col)]) === item.criteria[i])
                            );
                            matchingRows.forEach(row => {
                                const cardKey = `card-${item.idNum}-${currentFullData.indexOf(row)}`;
                                const pData   = item.partInfoMap ? item.partInfoMap[cardKey] : null;
                                if (!pData || pData.isDeleted) return;
                                if (normalizeValue(row[h.indexOf("공급처")]) !== "AMT") return;

                                const partName  = row[h.indexOf("부속명")] || '-';
                                const unitCons  = parseFloat(row[h.indexOf("세트별소모량")]) || 1;
                                const partQty   = unitCons * (item.orderQty || 1);
                                const partT     = calcProcessTime(row, partQty, {}, h);
                                const partTotal = PROC.reduce((s, p) => s + (partT[p.key] ?? 0), 0);

                                // 부속 공정 스팟
                                const partSpots = PROC.filter(p => (partT[p.key] ?? 0) > 0)
                                    .map(p => `<span class="tl-spot-wrap">
                                        <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${p.color};"></span>
                                        <span class="tl-spot-tip">${p.key} ${partT[p.key].toFixed(1)}분</span>
                                    </span>`).join('');

                                // ── 납기 부속 이동 상태 확인 (partMoveLog 기반) ──
                                const _dlvBatches   = item.partMoveLog?.[cardKey] || [];
                                const _dlvOD        = item.deliveryDate;
                                const _dlvMoved     = _dlvBatches
                                    .filter(b => b['납기'] && b['납기'] !== _dlvOD)
                                    .map(b => ({ date: b['납기'], qty: b.qty }));
                                const _dlvMovedQty  = _dlvMoved.reduce((s, e) => s + (e.qty || 0), 0);
                                const _dlvRemain    = pData.qty - _dlvMovedQty;
                                const _dlvIsMoved   = _dlvMovedQty > 0;
                                const _dlvMovedLabel = _dlvIsMoved
                                    ? `<span style="font-size:7px;font-weight:800;color:#787774;white-space:nowrap;flex-shrink:0;">→${_dlvMoved.map(e=>`${e.date.slice(5)}(${e.qty}EA)`).join(' ')}</span>`
                                    : '';
                                const _dlvDisplayQty = _dlvIsMoved ? Math.max(0, _dlvRemain) : pData.qty;
                                const _dlvOpacity    = (_dlvIsMoved && _dlvRemain <= 0) ? '0.35' : '1';
                                const _dlvTotalQty   = Math.round(unitCons * (item.orderQty || 1));
                                partsHtml += `
                                    <div
                                        data-idnum="${item.idNum}"
                                        data-docid="${item.docId || ''}"
                                        data-proc="납기"
                                        data-partname="${partName.replace(/"/g,'&quot;')}"
                                        data-cardkey="${cardKey}"
                                        data-totalqty="${_dlvTotalQty}"
                                        onmousedown="tlPartDragStart(event,this)"
                                        style="display:flex;align-items:center;gap:4px;padding:2px 0;border-bottom:1px solid #ededeb;cursor:grab;opacity:${_dlvOpacity};">
                                        <span style="flex:1;font-size:8px;font-weight:700;color:#37352f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${partName}</span>
                                        ${_dlvMovedLabel}
                                        <span style="display:flex;gap:2px;align-items:center;flex-shrink:0;">${partSpots}</span>
                                        ${partTotal > 0 ? `<span style="font-size:8px;font-weight:700;color:#787774;white-space:nowrap;flex-shrink:0;">${partTotal.toFixed(1)}분</span>` : ''}
                                        <span style="font-size:8px;font-weight:800;color:#37352f;white-space:nowrap;flex-shrink:0;">${_dlvDisplayQty}EA</span>
                                    </div>`;
                            });
                        }

                        return `
                        <div class="tl-delivery-item" data-idnum="${item.idNum}" data-docid="${item.docId || ''}" data-ordercode="${item.orderCode || ''}" data-proc="납기" ondblclick="tlSelectRelated(this)" onmousedown="tlProcDragStart(event,this)">
                            <div style="display:flex;align-items:center;gap:3px;cursor:pointer;" onclick="tlDeliveryCardClick(event,this.closest('.tl-delivery-item'))">
                                <span class="tl-arrow" style="font-size:9px;color:#787774;flex-shrink:0;padding:0 2px;">▶</span>
                                <span style="flex:1;font-size:9px;font-weight:700;color:#37352f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.displayName}</span>
                                <span style="display:flex;gap:2px;align-items:center;flex-shrink:0;">${spots}</span>
                                ${totalStr ? `<span style="font-size:8px;font-weight:700;color:#787774;white-space:nowrap;flex-shrink:0;">${totalStr}</span>` : ''}
                                <span style="font-size:8px;font-weight:800;color:#37352f;white-space:nowrap;flex-shrink:0;">${item.orderQty}EA</span>
                            </div>
                            <div class="tl-delivery-parts">
                                <div style="padding:4px 8px;">
                                    ${partsHtml || '<span style="font-size:8px;color:#b0aeaa;padding:2px 0;display:block;">부속 없음</span>'}
                                </div>
                            </div>
                        </div>`;
                    }).join('');

                    section.innerHTML = itemsHtml;
                });
            },

            // 공정 섹션 채우기
            // 기본 오프셋: 보링=납기-1, 엣지·NC=납기-2, 재단=납기-3
            // 비활성(토·일) → 직전 금요일 보정
            // 동일 오더코드 간 충돌 시 공정 선후 관계 강제 재배치
            //   선후 순서: 재단 < 엣지=NC < 보링 (재단이 가장 이른 날)
            _fillProcessSections() {
                const PROC_DEF = [
                    { key: '재단', offset: 3, color: '#90BBC6' },
                    { key: '엣지', offset: 2, color: '#17C3B2' },
                    { key: 'NC',   offset: 2, color: '#FF9C75' },
                    { key: '보링', offset: 1, color: '#227C9D' },
                ];
                const PROC_MAP = Object.fromEntries(PROC_DEF.map(p => [p.key, p]));

                const pendingOrders = confirmedOrders.filter(o => o.amtTimeline === true && o.amtRegistered !== true && !o.amtConfirmedCancel);
                const h = currentFullData[0];

                // ── 헬퍼: 비활성(토·일) → 다음 월요일 (활성화된 주말은 그대로 유지) ──
                // 뒤로 밀면(금요일) lowerBound(토요일)에 의해 토요일로 재클램핑되어
                // 공정 섹션이 없는 비활성 토·일에 배치 → 카드 사라짐 버그 발생
                // 따라서 앞쪽(월요일)으로 밀어 활성 날짜에 배치되도록 수정
                const toValidDate = (dateStr) => {
                    if (TL.activatedWeekendDates.has(dateStr)) return dateStr;
                    const day = new Date(dateStr + 'T00:00:00').getDay();
                    if (day === 6) return TL._dateOffset(dateStr, 2); // 토 → 월
                    if (day === 0) return TL._dateOffset(dateStr, 1); // 일 → 월
                    return dateStr;
                };

                // ── 헬퍼: 해당 공정이 포함된 부속 존재 여부 확인 ──────────
                const hasProcInItem = (item, procKey) => {
                    if (!h || currentFullData.length < 2) return false;
                    const matchingRows = currentFullData.slice(1).filter(r =>
                        r && normalizeValue(r[h.indexOf("ing발주처")]) === item.supplier &&
                        IDENTITY_HEADERS.every((col, i) => normalizeValue(r[h.indexOf(col)]) === item.criteria[i])
                    );
                    for (const row of matchingRows) {
                        if (normalizeValue(row[h.indexOf("공급처")]) !== "AMT") continue;
                        const unitCons = parseFloat(row[h.indexOf("세트별소모량")]) || 1;
                        const partT = calcProcessTime(row, unitCons * (item.orderQty || 1), {}, h);
                        if ((partT[procKey] ?? 0) > 0) return true;
                    }
                    return false;
                };

                // ── STEP 1: 각 item × 공정별 기본 targetDate 계산 ──────────
                // procOverrides : 사용자 수동 이동 날짜 (영구 보존)
                // 우선순위: procOverrides > 기본값
                // 하한: max(발주일, 오늘KST) — 발주일이 과거면 오늘이 하한
                const procDates = {};
                // 오늘 KST 인라인 (todayKST/batchDateStr은 바깥 스코프라 직접 사용 불가)
                const todayForFill = (() => { const d = new Date(Date.now() + 9*60*60*1000); return d.toISOString().slice(0,10); })();
                const getBatchDate = (item) => {
                    if (item.batchId) {
                        const kst = new Date(item.batchId + 9*60*60*1000);
                        return `${kst.getUTCFullYear()}-${String(kst.getUTCMonth()+1).padStart(2,'0')}-${String(kst.getUTCDate()).padStart(2,'0')}`;
                    }
                    if (item.orderCode && item.orderCode.length >= 8) {
                        const s = item.orderCode.replace(/-/g,'').slice(0,8);
                        return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
                    }
                    return null;
                };
                pendingOrders.forEach(item => {
                    const d = item.deliveryDate;
                    if (!d) return;
                    const key = item.orderCode || String(item.idNum);
                    if (!procDates[key]) procDates[key] = { _item: item, '납기': d };
                    // 하한: max(발주일, 오늘)
                    const orderDate = getBatchDate(item);
                    const lowerBound = (orderDate && orderDate > todayForFill) ? orderDate : todayForFill;
                    if (!item.procOverrides) item.procOverrides = {};
                    // 하한을 비활성 주말에서 다음 월요일로 스냅
                    // (발주일 또는 오늘이 토·일이면 lowerBound 자체가 비활성 주말이 되어
                    //  procOverrides가 공정 섹션 없는 날짜로 초기화되어 카드가 사라지는 버그 수정)
                    const validLB = toValidDate(lowerBound);
                    PROC_DEF.forEach(proc => {
                        if (!hasProcInItem(item, proc.key)) return;
                        // procOverrides에 없으면 기본값 계산 후 저장 (그리드 card.col 초기화와 동일)
                        if (!item.procOverrides[proc.key]) {
                            const base = toValidDate(TL._dateOffset(d, -proc.offset));
                            const defaultDate = base < validLB ? validLB : base;
                            item.procOverrides[proc.key] = defaultDate;
                        } else {
                            // 기존 procOverride가 비활성 주말에 걸린 경우 → 다음 유효일로 스냅
                            const ov = item.procOverrides[proc.key];
                            const ovDay = new Date(ov + 'T00:00:00').getDay();
                            if ((ovDay === 6 || ovDay === 0) && !TL.activatedWeekendDates.has(ov)) {
                                item.procOverrides[proc.key] = toValidDate(ov);
                            }
                        }
                        procDates[key][proc.key] = item.procOverrides[proc.key];
                    });
                });

                // ── STEP 2: 숫자카드 규칙 기준 미래 벽 클램핑 ──────────────
                // 미래 벽: 납기→보링→엣지, 납기→NC(독립), min(엣지,NC)→재단
                // 엣지·NC 완전 독립 (서로 영향 없음)
                // ※ 활성 주말 보호 제거: 활성 주말에 배치된 카드도 상한 초과 시 클램핑

                Object.values(procDates).forEach(entry => {
                    const item = entry['_item'];
                    // 보링: 납기 못 넘음
                    if (entry['보링'] && entry['납기'] && entry['보링'] > entry['납기']) {
                        entry['보링'] = entry['납기'];
                        if (item && item.procOverrides) item.procOverrides['보링'] = entry['납기'];
                    }
                    // 엣지: 보링 못 넘음 (NC와 완전 독립)
                    if (entry['엣지'] && entry['보링'] && entry['엣지'] > entry['보링']) {
                        entry['엣지'] = entry['보링'];
                        if (item && item.procOverrides) item.procOverrides['엣지'] = entry['보링'];
                    }
                    // NC: 납기 못 넘음 (엣지·보링과 완전 독립)
                    if (entry['NC'] && entry['납기'] && entry['NC'] > entry['납기']) {
                        entry['NC'] = entry['납기'];
                        if (item && item.procOverrides) item.procOverrides['NC'] = entry['납기'];
                    }
                    // 재단: min(엣지, NC) 못 넘음
                    if (entry['재단']) {
                        const walls = [entry['엣지'], entry['NC']].filter(Boolean);
                        if (walls.length > 0) {
                            const minWall = walls.reduce((a, b) => a < b ? a : b);
                            if (entry['재단'] > minWall) {
                                entry['재단'] = minWall;
                                if (item && item.procOverrides) item.procOverrides['재단'] = minWall;
                            }
                        }
                    }
                });

                // ── STEP 3: 공정별 날짜 → 섹션에 배치 ──────────────────────
                // byProc[procKey][targetDate] = [item, ...]
                const byProc = {};
                PROC_DEF.forEach(p => { byProc[p.key] = {}; });

                Object.values(procDates).forEach(entry => {
                    const item = entry._item;
                    PROC_DEF.forEach(proc => {
                        const td = entry[proc.key];
                        if (!td) return;
                        if (!byProc[proc.key][td]) byProc[proc.key][td] = [];
                        byProc[proc.key][td].push(item);
                    });
                });

                // ── STEP 4: DOM 렌더 ──────────────────────────────────────
                PROC_DEF.forEach(proc => {
                    Object.entries(byProc[proc.key]).forEach(([targetDate, items]) => {
                        const section = document.querySelector(`.tl-process-section[data-date="${targetDate}"][data-process="${proc.key}"]`);
                        if (!section) return;

                        let sectionTotalMin = 0;

                        const itemsHtml = items.map(item => {
                            // 부속 시간을 직접 합산 — cachedWorkTime 불필요
                            let itemPartTotal = 0;

                            // 부속 목록 — 해당 공정 있는 부속만, 해당 공정 스팟·시간만
                            let partsHtml = '';
                            if (h && currentFullData.length >= 2) {
                                const matchingRows = currentFullData.slice(1).filter(r =>
                                    r && normalizeValue(r[h.indexOf("ing발주처")]) === item.supplier &&
                                    IDENTITY_HEADERS.every((col, i) => normalizeValue(r[h.indexOf(col)]) === item.criteria[i])
                                );
                                matchingRows.forEach(row => {
                                    const cardKey = `card-${item.idNum}-${currentFullData.indexOf(row)}`;
                                    if (normalizeValue(row[h.indexOf("공급처")]) !== "AMT") return;
                                    const pData = item.partInfoMap?.[cardKey];
                                    if (!pData || pData.isDeleted) return;
                                    const unitCons   = parseFloat(row[h.indexOf("세트별소모량")]) || 1;
                                    const partQty    = unitCons * (item.orderQty || 1);
                                    const partT      = calcProcessTime(row, partQty, {}, h);
                                    const partProcMin = partT[proc.key] ?? 0;
                                    if (partProcMin <= 0) return;

                                    const partName = row[h.indexOf("부속명")] || '-';

                                    const totalQty = Math.round(unitCons * (item.orderQty || 1));
                                    const partSpot = `<span class="tl-spot-wrap">
                                        <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${proc.color};"></span>
                                        <span class="tl-spot-tip">${proc.key} ${partProcMin.toFixed(1)}분</span>
                                    </span>`;
                                    // ── 부속 이동 상태 확인 (partMoveLog 기반) ──
                                    const _batches    = item.partMoveLog?.[cardKey] || [];
                                    const _procOD     = proc.key === '납기' ? item.deliveryDate : item.procOverrides?.[proc.key];
                                    // 비활성 주말에 걸린 배치 날짜는 toValidDate로 스냅하여 비교
                                    const _movedQtySum = _batches.reduce((s, b) => {
                                        const bd = toValidDate(b[proc.key]);
                                        return s + (bd && bd !== _procOD ? b.qty : 0);
                                    }, 0);
                                    const _remainQty = totalQty - _movedQtySum;
                                    // 잔여 수량 비율만큼만 헤더 시간에 합산 (이동분 차감)
                                    itemPartTotal += totalQty > 0 ? partProcMin * Math.max(0, _remainQty) / totalQty : partProcMin;
                                    const _isMoved = _movedQtySum > 0;
                                    // 이동된 배치 라벨 (날짜·수량)
                                    const _movedEntries = _batches
                                        .filter(b => toValidDate(b[proc.key]) && toValidDate(b[proc.key]) !== _procOD)
                                        .map(b => ({ date: toValidDate(b[proc.key]), qty: b.qty }));
                                    const _movedLabel = _isMoved
                                        ? `<span style="font-size:7px;font-weight:800;color:#787774;white-space:nowrap;flex-shrink:0;">→${_movedEntries.map(e=>`${e.date.slice(5)}(${e.qty}EA)`).join(' ')}</span>`
                                        : '';
                                    const _displayQty = _isMoved ? Math.max(0, _remainQty) : totalQty;
                                    const _rowOpacity = (_isMoved && _remainQty <= 0) ? '0.35' : '1';
                                    partsHtml += `
                                    <div
                                        data-idnum="${item.idNum}"
                                        data-docid="${item.docId || ''}"
                                        data-proc="${proc.key}"
                                        data-partname="${partName.replace(/"/g,'&quot;')}"
                                        data-cardkey="${cardKey}"
                                        data-totalqty="${totalQty}"
                                        onmousedown="tlPartDragStart(event,this)"
                                        style="display:flex;align-items:center;gap:4px;padding:2px 0;border-bottom:1px solid #ededeb;cursor:grab;opacity:${_rowOpacity};">
                                        <span style="flex:1;font-size:8px;font-weight:700;color:#37352f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${partName}</span>
                                        ${_movedLabel}
                                        <span style="display:flex;gap:2px;align-items:center;flex-shrink:0;">${partSpot}</span>
                                        <span style="font-size:8px;font-weight:700;color:#787774;white-space:nowrap;flex-shrink:0;">${partProcMin.toFixed(1)}분</span>
                                        <span style="font-size:8px;font-weight:800;color:#37352f;white-space:nowrap;flex-shrink:0;">${_displayQty}EA</span>
                                    </div>`;
                                });
                            }
                            // 카드 직접 합산값으로 표시 및 헤더 누적
                            const procMin = itemPartTotal;
                            const procStr = procMin > 0 ? `${Math.round(procMin)}분` : '';
                            const spot = procMin > 0 ? `<span class="tl-spot-wrap"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${proc.color};"></span><span class="tl-spot-tip">${proc.key} ${Math.round(procMin)}분</span></span>` : '';
                            sectionTotalMin += procMin;

                            return `
                            <div class="tl-delivery-item" data-idnum="${item.idNum}" data-docid="${item.docId || ''}" data-ordercode="${item.orderCode || ''}" data-proc="${proc.key}" ondblclick="tlSelectRelated(this)" onmousedown="tlProcDragStart(event,this)">
                                <div style="display:flex;align-items:center;gap:3px;">
                                    <span class="tl-arrow" style="font-size:9px;color:#787774;flex-shrink:0;cursor:pointer;padding:0 2px;" onclick="event.stopPropagation();tlToggleDeliveryParts(this.closest('.tl-delivery-item'))">▶</span>
                                    <span style="flex:1;font-size:9px;font-weight:700;color:#37352f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.displayName}</span>
                                    <span style="display:flex;gap:2px;align-items:center;flex-shrink:0;">${spot}</span>
                                    ${procStr ? `<span style="font-size:8px;font-weight:700;color:#787774;white-space:nowrap;flex-shrink:0;">${procStr}</span>` : ''}
                                </div>
                                <div class="tl-delivery-parts">
                                    <div style="padding:4px 8px;">
                                        ${partsHtml || '<span style="font-size:8px;color:#b0aeaa;padding:2px 0;display:block;">부속 없음</span>'}
                                    </div>
                                </div>
                            </div>`;
                        }).join('');

                        section.innerHTML = itemsHtml;

                        // 섹션 헤더 통계 뱃지: N건 · N분
                        const statBadge = document.querySelector(`.tl-proc-stat[data-date="${targetDate}"][data-process="${proc.key}"]`);
                        if (statBadge) {
                            statBadge.textContent = `${items.length}건 · ${Math.round(sectionTotalMin)}분`;
                            statBadge.style.display = 'inline';
                        }
                    });

                });
            },

            // 발주일 기준 날짜카드 상단에 발주 버튼 배치
            // batchId → 한국 표준시(KST) 날짜 → 해당 날짜카드 tl-order-btn-wrap에 버튼 삽입
            _fillOrderBtns() {
                const pendingOrders = confirmedOrders.filter(o => o.amtTimeline === true && o.amtRegistered !== true && !o.amtConfirmedCancel);

                // 날짜별로 모든 발주 상품 그룹핑 (같은 날이면 batchId 무관하게 하나의 버튼)
                const byDate = {};
                pendingOrders.forEach(item => {
                    if (!item.batchId) return;
                    const kstDate = new Date(item.batchId + 9 * 60 * 60 * 1000);
                    const y = kstDate.getUTCFullYear();
                    const m = String(kstDate.getUTCMonth() + 1).padStart(2, '0');
                    const d = String(kstDate.getUTCDate()).padStart(2, '0');
                    const dateStr = `${y}-${m}-${d}`;
                    if (!byDate[dateStr]) byDate[dateStr] = [];
                    byDate[dateStr].push(item);
                });

                const PROC = [
                    { key: '재단', color: '#90BBC6' },
                    { key: '엣지', color: '#17C3B2' },
                    { key: '보링', color: '#227C9D' },
                    { key: 'NC',   color: '#FF9C75' },
                ];

                Object.entries(byDate).forEach(([dateStr, items]) => {
                    const wrap = document.querySelector(`.tl-order-btn-wrap[data-date="${dateStr}"]`);
                    if (!wrap) return;

                    wrap.innerHTML = '';

                    const panelId = `tl-order-panel-${dateStr}`;
                    const itemListHtml = items.map(item => {
                        const wt = item.cachedWorkTime || {};
                        const spots = PROC.filter(p => (wt[p.key] ?? 0) > 0)
                            .map(p => `<span class="tl-spot-wrap">
                                <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color};"></span>
                                <span class="tl-spot-tip">${p.key} ${Math.round(wt[p.key])}분</span>
                            </span>`).join('');
                        const totalMin = PROC.reduce((s, p) => s + (wt[p.key] ?? 0), 0);
                        return `
                            <div style="display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid #f1f1ef;">
                                <span style="flex:1;font-size:9px;font-weight:700;color:#37352f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.displayName}</span>
                                <span style="display:flex;gap:2px;align-items:center;flex-shrink:0;">${spots}</span>
                                ${totalMin > 0 ? `<span style="font-size:8px;font-weight:700;color:#787774;white-space:nowrap;flex-shrink:0;">${Math.round(totalMin)}분</span>` : ''}
                                <span style="font-size:8px;font-weight:800;color:#37352f;white-space:nowrap;flex-shrink:0;">${item.orderQty}EA</span>
                            </div>`;
                    }).join('');

                    wrap.insertAdjacentHTML('beforeend', `
                        <button class="tl-order-btn" data-batch="${dateStr}"
                            onclick="tlToggleOrderPanel(this)"
                            style="font-size:8px;font-weight:800;color:#fff;background:#b0aeaa;border:none;border-radius:4px;padding:2px 6px;cursor:pointer;text-align:center;white-space:nowrap;">
                            발주 ${items.length}건
                        </button>
                        <div id="${panelId}" class="tl-order-parts" style="display:none;">
                            <div style="padding:4px 8px;">${itemListHtml}</div>
                        </div>`);

                    wrap.style.display = 'flex';
                });
            },

            _applyTransform(animate) {
                const track = document.getElementById('tl-infinite-track');
                if (!track) return;
                if (animate) {
                    track.classList.add('momentum');
                    setTimeout(() => track.classList.remove('momentum'), 500);
                } else {
                    track.classList.remove('momentum');
                }
                track.style.transform = `translateX(${this.offset}px)`;
                // 패널이 열려 있으면 위치 실시간 동기화
                tlSyncPanelPosition();
            },

            // 특정 날짜가 중앙에 오도록 스크롤
            _scrollToDate(dateStr, animate) {
                const idx = this.renderedDates.indexOf(dateStr);
                if (idx < 0) return;
                const wrap = document.getElementById('tl-infinite-wrap');
                if (!wrap) return;
                const wrapW   = wrap.offsetWidth;
                const trackLeft = 16; // padding-left
                const cardCenter = trackLeft + idx * this.cellW + this.CARD_W / 2;
                this.offset = wrapW / 2 - cardCenter;
                this._applyTransform(animate);
            },

            // 드래그 이벤트 초기화
            _initDrag(wrap) {
                const onDown = e => {
                    if (e.target.closest('.tl-sort-item-wrap, button, input')) return;
                    this.dragging = true;
                    this.startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                    this.lastX  = this.startX;
                    this.velX   = 0;
                    wrap.classList.add('grabbing');
                    if (this.rafId) cancelAnimationFrame(this.rafId);
                };
                const onMove = e => {
                    if (!this.dragging) return;
                    const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                    const dx = x - this.lastX;
                    this.velX  = dx;
                    this.lastX = x;
                    this.offset += dx;
                    this._applyTransform(false);
                    // 양끝 도달 시 추가 렌더
                    this._checkEdges();
                };
                const onUp = () => {
                    if (!this.dragging) return;
                    this.dragging = false;
                    wrap.classList.remove('grabbing');
                    this._startMomentum();
                };

                wrap.addEventListener('mousedown',  onDown);
                wrap.addEventListener('touchstart', onDown, { passive: true });
                window.addEventListener('mousemove', onMove);
                window.addEventListener('touchmove', onMove, { passive: true });
                window.addEventListener('mouseup',   onUp);
                window.addEventListener('touchend',  onUp);
            },

            // 관성 스크롤
            _startMomentum() {
                let vel = this.velX * 3; // 관성 배율 (낮을수록 느림)
                const step = () => {
                    if (Math.abs(vel) < 0.5) return;
                    vel *= 0.85; // 마찰 (낮을수록 빨리 감속)
                    this.offset += vel;
                    this._applyTransform(false);
                    this._checkEdges();
                    this.rafId = requestAnimationFrame(step);
                };
                this.rafId = requestAnimationFrame(step);
            },

            // 양끝 도달 시 추가 날짜 렌더
            _checkEdges() {
                const wrap = document.getElementById('tl-infinite-wrap');
                if (!wrap) return;
                const wrapW = wrap.offsetWidth;
                const trackLeft = 16;

                // 왼쪽 끝 여유 계산
                const leftEdge = this.offset + trackLeft;
                const rightEdge = this.offset + trackLeft + this.renderedDates.length * this.cellW;

                if (leftEdge > -this.cellW * 5) {
                    // 앞쪽 5장 추가
                    this.centerDate = this._dateOffset(this.renderedDates[0], -this.BUFFER / 2);
                    this._buildRange();
                    this._fillDeliverySections();
                    this._fillProcessSections();
                    this._fillOrderBtns();
                    this._fillPartSections();
                }
                if (rightEdge < wrapW + this.cellW * 5) {
                    // 뒷쪽 5장 추가
                    this.centerDate = this._dateOffset(this.renderedDates[this.renderedDates.length - 1], this.BUFFER / 2);
                    this._buildRange();
                    this._fillDeliverySections();
                    this._fillProcessSections();
                    this._fillOrderBtns();
                    this._fillPartSections();
                }
            },

            // ── 이동된 부속 카드를 해당 날짜·공정 섹션에 배치 ──────────────
            _fillPartSections() {
                // 기존 standalone 부속 카드 제거 (중복 방지)
                document.querySelectorAll('.tl-delivery-item[data-partcard="1"]').forEach(el => el.remove());

                const pendingOrders = confirmedOrders.filter(o => o.amtTimeline === true && o.amtRegistered !== true && !o.amtConfirmedCancel);
                const h = currentFullData[0];
                if (!h || currentFullData.length < 2) return;

                const PROC_DEF   = ['재단', '엣지', 'NC', '보링', '납기'];
                const PROC_COLOR = { '재단':'#90BBC6', '엣지':'#17C3B2', 'NC':'#FF9C75', '보링':'#227C9D', '납기':'#b0aeaa' };

                // 섹션 배지 누적용 맵: "procKey|date" → partMin 합산
                const badgeAccum = {};

                // ── (procKey × batchDate) 단위로 수량 합산 후 카드 1개 렌더 ──
                // 배치 분할 시 동일 procKey·날짜가 여러 배치에 걸쳐 중복될 수 있으므로
                // (cardKey, procKey, batchDate) 기준으로 그룹핑하여 카드를 1개만 생성
                // partNameMap 일괄 저장 (cardKey → 부속명, 이카운트등록 연동용)
                pendingOrders.forEach(item => {
                    if (!item.partMoveLog || !item.docId) return;
                    const nameUpdates = {};
                    Object.entries(item.partMoveLog).forEach(([ck, batches]) => {
                        if (!Array.isArray(batches) || !batches.length) return;
                        const ri = parseInt(ck.split('-')[2]);
                        const r  = currentFullData[ri];
                        if (!r) return;
                        const pn = r[h.indexOf("부속명")] || '';
                        if (pn && !item.partNameMap?.[ck]) nameUpdates[`partNameMap.${ck}`] = pn;
                    });
                    if (Object.keys(nameUpdates).length) {
                        const { doc: _pnDoc, updateDoc: _pnUpd } = window.fbFirestore;
                        _pnUpd(_pnDoc(window.db, 'artifacts', 'vivivic-4b7ef', 'public', 'data', 'confirmed_orders', item.docId), nameUpdates).catch(() => {});
                    }
                });

                pendingOrders.forEach(item => {
                    if (!item.partMoveLog) return;
                    Object.entries(item.partMoveLog).forEach(([cardKey, batches]) => {
                        if (!Array.isArray(batches) || batches.length === 0) return;
                        const rowIdx = parseInt(cardKey.split('-')[2]);
                        const row    = currentFullData[rowIdx];
                        if (!row) return;
                        const pData = item.partInfoMap?.[cardKey];
                        if (!pData || pData.isDeleted) return;
                        if (normalizeValue(row[h.indexOf("공급처")]) !== "AMT") return;

                        const partName = row[h.indexOf("부속명")] || '-';
                        const unitCons = parseFloat(row[h.indexOf("세트별소모량")]) || 1;
                        const totalQty = Math.round(unitCons * (item.orderQty || 1));
                        const partT    = calcProcessTime(row, unitCons * (item.orderQty || 1), {}, h);

                        // 1단계: 비활성 주말 스냅 (영구 수정)
                        batches.forEach(batch => {
                            PROC_DEF.forEach(pk => {
                                const d = batch[pk];
                                if (!d || TL.activatedWeekendDates.has(d)) return;
                                const day = new Date(d + 'T00:00:00').getDay();
                                if (day === 6) batch[pk] = TL._dateOffset(d, 2);
                                else if (day === 0) batch[pk] = TL._dateOffset(d, 1);
                            });
                        });

                        // 2단계: (procKey|batchDate) → 합산 수량 그룹핑
                        // → 배치 분할 시 동일 (procKey, batchDate)가 여러 배치에 나타나 2개 카드가 생기는 버그 방지
                        const grouped = {}; // "procKey|batchDate" → totalMovedQty
                        batches.forEach(batch => {
                            PROC_DEF.forEach(procKey => {
                                const batchDate = batch[procKey];
                                if (!batchDate) return;
                                const orderDate = procKey === '납기' ? item.deliveryDate : item.procOverrides?.[procKey];
                                if (batchDate === orderDate) return;
                                const gKey = `${procKey}|${batchDate}`;
                                grouped[gKey] = (grouped[gKey] || 0) + batch.qty;
                            });
                        });

                        // 3단계: 그룹별 카드 1개 렌더
                        Object.entries(grouped).forEach(([gKey, movedQty]) => {
                            const [procKey, batchDate] = gKey.split('|');
                            const section = document.querySelector(`.tl-process-section[data-date="${batchDate}"][data-process="${procKey}"]`);
                            if (!section) return;

                            const procMin   = procKey === '납기'
                                ? Object.values(partT).reduce((s, v) => s + (v || 0), 0)
                                : (partT[procKey] ?? 0);
                            const scaledMin = totalQty > 0 ? procMin * (movedQty / totalQty) : 0;
                            const color     = PROC_COLOR[procKey];

                            const spot = scaledMin > 0
                                ? `<span class="tl-spot-wrap"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${color};"></span><span class="tl-spot-tip">${procKey} ${scaledMin.toFixed(1)}분</span></span>`
                                : '';
                            const timeStr = scaledMin > 0
                                ? `<span style="font-size:8px;font-weight:700;color:#787774;white-space:nowrap;flex-shrink:0;">${Math.round(scaledMin)}분</span>`
                                : '';

                            // ── 독립 카드 생성 (카드 자체가 드래그 대상) ──
                            const isDone    = !!(item.partCompletions?.[cardKey]?.[procKey]);
                            const isStarted = !!(item.partStarted?.[cardKey]?.[procKey]);
                            const actualMin = item.partCompletions?.[cardKey]?.[procKey]?.actualMinutes ?? null;
                            // 완료됐지만 partName 없는 경우 자동 수정
                            if (isDone && item.docId && partName) {
                                const _tlVal = item.partCompletions?.[cardKey]?.[procKey];
                                if (_tlVal && typeof _tlVal === 'object' && !_tlVal.partName) {
                                    const { doc: _tlDoc, updateDoc: _tlUpd } = window.fbFirestore;
                                    _tlUpd(_tlDoc(window.db, 'artifacts', 'vivivic-4b7ef', 'public', 'data', 'confirmed_orders', item.docId), {
                                        [`partCompletions.${cardKey}.${procKey}.partName`]: partName
                                    }).catch(() => {});
                                }
                            }
                            const el = document.createElement('div');
                            el.className = 'tl-delivery-item';
                            el.dataset.idnum     = String(item.idNum);
                            el.dataset.docid     = item.docId || '';
                            el.dataset.ordercode = item.orderCode || '';
                            el.dataset.proc      = procKey;
                            el.dataset.partcard  = '1';
                            el.dataset.cardkey   = cardKey;
                            el.dataset.batchdate = batchDate;
                            el.dataset.totalqty  = String(totalQty);
                            el.dataset.partname  = partName.replace(/"/g, '&quot;');
                            el.dataset.done      = isDone ? '1' : '0';
                            el.setAttribute('ondblclick', 'tlSelectRelated(this)');
                            if (!isDone) el.setAttribute('onmousedown', 'tlPartDragStart(event,this)');
                            if (isDone) el.style.opacity = '0.55';
                            const safeDocId  = (item.docId || '').replace(/'/g, "\\'");
                            const safeCK     = cardKey.replace(/'/g, "\\'");
                            const safePK     = procKey.replace(/'/g, "\\'");
                            const _tlQI = _partQtyInfo(item.partCompletions?.[cardKey], movedQty);
                            el.innerHTML = `
                                <div style="display:flex;align-items:center;gap:3px;cursor:${isDone ? 'default' : 'grab'};">
                                    <span style="flex:1;font-size:9px;font-weight:700;color:${isDone ? '#b0aeaa' : '#37352f'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${isDone ? 'text-decoration:line-through;' : ''}"><span style="color:${isDone ? '#d3d1cb' : '#787774'};font-size:8px;">[${partName}]</span> ${item.displayName}</span>
                                    ${isDone ? '' : spot + timeStr}
                                    <span style="font-size:8px;font-weight:800;color:${isDone ? '#b0aeaa' : _tlQI.color};background:${isDone ? 'transparent' : _tlQI.bg};padding:0 3px;border-radius:3px;white-space:nowrap;flex-shrink:0;">${_tlQI.label}EA</span>
                                    ${isDone
                                        ? `<span style="font-size:9px;font-weight:900;color:#22c55e;flex-shrink:0;padding:0 2px;">✓</span>${actualMin != null ? `<span style="font-size:8px;font-weight:700;color:#60a5fa;flex-shrink:0;white-space:nowrap;">${actualMin.toFixed(1)}분</span>` : ''}`
                                        : _partPrereqDone(cardKey, procKey, item.partCompletions?.[cardKey] || {})
                                            ? isStarted
                                                ? `<button onclick="event.stopPropagation();tlShowPartDoneConfirm('${safeDocId}','${safeCK}','${safePK}','${batchDate}',this,'${partName.replace(/'/g,"\\'")}',${movedQty})" onmousedown="event.stopPropagation()" style="flex-shrink:0;font-size:8px;font-weight:900;color:#fff;background:#22c55e;border:none;border-radius:3px;padding:1px 5px;cursor:pointer;white-space:nowrap;line-height:1.4;">완료</button>`
                                                : `<button onclick="event.stopPropagation();tlMarkPartStarted('${safeDocId}','${safeCK}','${safePK}','${batchDate}',this,'${partName.replace(/'/g,"\\'")}',${movedQty})" onmousedown="event.stopPropagation()" style="flex-shrink:0;font-size:8px;font-weight:900;color:#fff;background:#3b82f6;border:none;border-radius:3px;padding:1px 5px;cursor:pointer;white-space:nowrap;line-height:1.4;">▶ 시작</button>`
                                            : ''
                                    }
                                </div>`;
                            section.appendChild(el);

                            // 배지 누적 (납기 섹션은 tl-proc-stat 없으므로 제외)
                            if (procKey !== '납기' && scaledMin > 0) {
                                const bKey = `${procKey}|${batchDate}`;
                                badgeAccum[bKey] = (badgeAccum[bKey] || 0) + scaledMin;
                            }
                        });
                    });
                });

                // ── 섹션 헤더 배지에 이동된 부속 시간 합산 ──────────────
                Object.entries(badgeAccum).forEach(([bKey, partMin]) => {
                    const [procKey, date] = bKey.split('|');
                    const badge = document.querySelector(`.tl-proc-stat[data-date="${date}"][data-process="${procKey}"]`);
                    if (!badge) return;
                    const m = badge.textContent.match(/(\d+)건\s*[··]\s*([\d.]+)분/);
                    if (m) {
                        badge.textContent = `${m[1]}건 · ${Math.round(parseFloat(m[2]) + partMin)}분`;
                    } else {
                        badge.textContent = `0건 · ${Math.round(partMin)}분`;
                        badge.style.display = 'inline';
                    }
                });
            },

            // SortableJS 초기화 (카드 내 공정 섹션)
        };

        // ── 부속 공정 시작 처리 ──────────────────────────────────────────────────
        // ── 공정 선행 조건 충족 여부 판단 ──────────────────────────────
        window._partPrereqDone = function(cardKey, procKey, completions) {
            if (procKey === '재단') return true;
            if (procKey === '엣지' || procKey === 'NC') return !!completions['재단'];
            if (procKey === '보링') {
                let hasEdgeNC = false;
                try {
                    const _ri = parseInt(cardKey.split('-').pop());
                    const _pr = currentFullData?.[_ri];
                    if (_pr && currentFullData?.[0]) {
                        const _t = calcProcessTime(_pr, 1, {}, currentFullData[0]);
                        hasEdgeNC = (_t['엣지'] || 0) > 0 || (_t['NC'] || 0) > 0;
                    }
                } catch(_e) {}
                return hasEdgeNC ? !!(completions['엣지'] || completions['NC']) : !!completions['재단'];
            }
            return true;
        };

        // ── 유효 수량 및 변경 표기 계산 ────────────────────────────────────
        // completions: partCompletions[cardKey], defaultQty: 예정 수량
        // 반환: { qty: 실효수량, label: '43(-1, 재단)' 형식 또는 '43' }
        window._partQtyInfo = function(completions, defaultQty) {
            const procs = ['재단', '엣지', 'NC', '보링'];
            const PC = { '재단':'#90BBC6', '엣지':'#17C3B2', 'NC':'#FF9C75', '보링':'#227C9D' };
            let effectiveQty = defaultQty;
            let changedBy    = null;
            for (const p of procs) {
                const aq = completions?.[p]?.actualQty;
                if (aq != null) { effectiveQty = aq; changedBy = p; }
            }
            if (changedBy != null && effectiveQty !== defaultQty) {
                const diff  = effectiveQty - defaultQty;
                const color = PC[changedBy] || '#ef4444';
                return { qty: effectiveQty, changedBy, color, bg: color + '22',
                         label: `${effectiveQty}(${diff > 0 ? '+' : ''}${diff}, ${changedBy})` };
            }
            return { qty: defaultQty, changedBy: null, color: '#37352f', bg: '#f5f5f4', label: String(defaultQty) };
        };

                    }

        // ── 부속 공정 완료 처리 ──────────────────────────────────────────────────
        window.tlResetAllWorkData = async function() {
            if (!confirm('모든 작업 시작/완료 데이터를 삭제합니다.\n발주 정보는 유지됩니다.\n계속하시겠습니까?')) return;
            const { collection, getDocs, doc, updateDoc, deleteField } = window.fbFirestore;
            const appId = "vivivic-4b7ef";
            try {
                showToastMessage('초기화 중...');
                const colRef = collection(window.db, 'artifacts', appId, 'public', 'data', 'confirmed_orders');
                const snap = await getDocs(colRef);
                let count = 0;
                for (const d of snap.docs) {
                    const data = d.data();
                    const updates = {};
                    if (data.partCompletions) updates.partCompletions = deleteField();
                    if (data.partStarted)     updates.partStarted     = deleteField();
                    if (Object.keys(updates).length) {
                        await updateDoc(doc(window.db, 'artifacts', appId, 'public', 'data', 'confirmed_orders', d.id), updates);
                        count++;
                    }
                }
                showToastMessage(`✓ 작업데이터 초기화 완료 (${count}건)`);
            } catch(e) {

                showToastMessage('초기화 실패: ' + e.message);

                    <label style="font-size:10px;font-weight:700;color:#37352f;display:block;margin-bottom:4px;">완료 수량 <span style="color:#b0aeaa;font-weight:500;">(예정: ${expectedQty}EA)</span></label>
                    <input id="_pdQty" type="number" value="${expectedQty}" min="0"

        window._tlPartDoneSubmit = function() {
            const d = window._pdConfirmData;
            if (!d) return;
            const actualQty = parseInt(document.getElementById('_pdQty')?.value ?? d.expectedQty);
            const isChanged = actualQty !== d.expectedQty;
