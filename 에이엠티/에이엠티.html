                });
            }
            const escId = String(idNum);
            area.innerHTML = `<div class="tl-dc-delivery-card">
                <div class="tl-dc-delivery-card-title">🚚 배송 정보 확인</div>
                <div class="tl-dc-delivery-info">
                    ${item.orderCode?`<div class="tl-dc-delivery-info-row"><span class="tl-dc-delivery-info-label">오더코드</span><span style="font-family:monospace;font-weight:700;">${item.orderCode}</span></div>`:''}
                    <div class="tl-dc-delivery-info-row"><span class="tl-dc-delivery-info-label">상품명</span><span style="font-weight:700;">${item.displayName}</span></div>
                    <div class="tl-dc-delivery-info-row"><span class="tl-dc-delivery-info-label">수량</span><span style="font-weight:800;">${item.orderQty} EA</span></div>
                    <div class="tl-dc-delivery-info-row"><span class="tl-dc-delivery-info-label">납기일</span><span style="font-weight:700;">${item.deliveryDate}</span></div>
                    ${item.supplier?`<div class="tl-dc-delivery-info-row"><span class="tl-dc-delivery-info-label">공급처</span><span>${item.supplier}</span></div>`:''}
                </div>
                ${partsRows?`<div><div class="tl-dc-delivery-parts-title">📦 부속 목록</div>${partsRows}</div>`:''}
                <textarea class="tl-dc-delivery-memo" placeholder="배송 메모 (선택사항)..." rows="2"></textarea>
                <div class="tl-dc-delivery-btn-row">
                    <button class="tl-dc-btn-cancel" onclick="(function(el){el.closest('.tl-dc-delivery-area').innerHTML='';var c=el.closest('.tl-dc-full-card')||el.closest('.tl-dc-order-card');if(c){var b=c.querySelector('.tl-dc-btn-delivery');if(b)b.textContent='🚚 배송출발';}})(this)">취소</button>
                    <button class="tl-dc-btn-confirm" onclick="tlDcConfirmDelivery(${escId},this)">✅ 배송 확정</button>
                </div>
            </div>`;
            btnEl.textContent = '▲ 접기';
        };

        // 배송 확정 처리
        window.tlDcConfirmDelivery = function(idNum, btnEl) {
            const memo = btnEl.closest('.tl-dc-delivery-card').querySelector('.tl-dc-delivery-memo')?.value.trim() || '';
            showToastMessage(`배송 시작 처리되었습니다.${memo?'  메모: '+memo:''}`);
            btnEl.closest('.tl-dc-delivery-area').innerHTML =
                `<div style="padding:10px 14px;background:#f5f5f4;border-top:2px solid #b0aeaa;display:flex;align-items:center;gap:8px;">
                    <span style="font-size:18px;">✅</span>
                    <span style="font-size:11px;font-weight:700;color:#b0aeaa;">배송 시작 처리 완료${memo?' · '+memo:''}</span>
                </div>`;
        };

        // ── 보링 기계배정 드래그앤드롭 ─────────────────────────────────────
        // 07:00 ~ 22:30, 30분 단위 32슬롯 전역 상수
        // ── 배제 시간 관리
        window._woExclusions      = {};  // sk → Set<blockStart(분)>
        window._woExclusionReasons = {}; // sk → { zoneStart: {reason, custom} }
        window._woMacStartMin     = {};  // sk → { mac → clockMin }

        function _woSetMacStart(sk, mac, clockMin) {
            if (!window._woMacStartMin[sk]) window._woMacStartMin[sk] = {};
            window._woMacStartMin[sk][mac] = clockMin;
            _woRenderBoard(sk);
        }
        function _woGetMacStart(sk, mac) {
            return (window._woMacStartMin[sk] && window._woMacStartMin[sk][mac] != null)
                ? window._woMacStartMin[sk][mac] : null;
        }

        function _woGetExclBlocks(sk) {
            return window._woExclusions[sk] || (window._woExclusions[sk] = new Set());
        }
        function _woGetExclZones(sk) {
            const blocks = Array.from(_woGetExclBlocks(sk)).sort((a,b)=>a-b);
            if (!blocks.length) return [];
            const zones = [];
            let zS = blocks[0], zE = blocks[0] + 10;
            for (let i = 1; i < blocks.length; i++) {
                if (blocks[i] === zE) { zE += 10; }
                else { zones.push({start:zS, end:zE}); zS = blocks[i]; zE = blocks[i]+10; }
            }
            zones.push({start:zS, end:zE});
            return zones;
        }
        function _woToggleExclBlock(sk, blockStart) {
            const s = _woGetExclBlocks(sk);
            if (s.has(blockStart)) s.delete(blockStart); else s.add(blockStart);
            _woRenderBoard(sk);
        }
        // 특정 구간 전체 취소
        function _woClearExclZone(sk, zoneStart, zoneEnd) {
            const s = _woGetExclBlocks(sk);
            for (let m = zoneStart; m < zoneEnd; m += 10) s.delete(m);
            if (window._woExclusionReasons[sk]) delete window._woExclusionReasons[sk][zoneStart];
            _woRenderBoard(sk);
        }
        // 전체 배제 초기화
        function _woClearAllExcl(sk) {
            window._woExclusions[sk]      = new Set();
            window._woExclusionReasons[sk] = {};
            _woRenderBoard(sk);
        }
        function _woSetExclReason(sk, zoneStart, reason) {
            if (!window._woExclusionReasons[sk]) window._woExclusionReasons[sk] = {};
            const prev = window._woExclusionReasons[sk][zoneStart] || {};
            window._woExclusionReasons[sk][zoneStart] = {reason, custom: prev.custom || ''};
            // 기타 선택시 입력창 표시/숨김 (재렌더 없이)
            const inp = document.getElementById(`wo-excl-inp-${sk}-${zoneStart}`);
            if (inp) inp.style.display = reason === '기타' ? 'block' : 'none';
        }
        function _woSetExclCustom(sk, zoneStart, val) {
            if (!window._woExclusionReasons[sk]) window._woExclusionReasons[sk] = {};
            const prev = window._woExclusionReasons[sk][zoneStart] || {};
            window._woExclusionReasons[sk][zoneStart] = {reason: prev.reason || '기타', custom: val};
        }
        // 카드의 실제 종료 시간(분) 계산 — 배제 구간을 건너뜀
        function _woCalcEffectiveEnd(startMin, pm, zones) {
            let workLeft = pm, cur = startMin;
            for (const z of zones) {
                if (z.end <= cur) continue;
                if (z.start >= cur + workLeft) break;
                const workBefore = Math.max(0, z.start - cur);
                workLeft -= workBefore; cur = z.start;
                if (workLeft <= 0) break;
                cur = z.end; // 배제 구간 건너뜀
            }
            return cur + workLeft;
        }
        // 빈 컬럼 시작시간 슬롯 드롭 — macStart 미설정시 해당 슬롯 시간으로 자동 설정 후 드롭 처리
        window._woDropOnEmptyCol = function(e, sk, mac, m) {
            if (_woGetMacStart(sk, mac) == null) {
                if (!window._woMacStartMin[sk]) window._woMacStartMin[sk] = {};
                window._woMacStartMin[sk][mac] = m;
            }
            woBoardDrop(e, mac, null, sk);
        };

        // ── 타임라인 공통 헬퍼 (보링/엣지 공용) ──────────────────────────
        function _woGetMachines(sk) {
            if (sk.endsWith('-엣지')) return ['1호기','2호기','3호기','4호기','5호기'];
            if (sk.endsWith('-재단')) return ['AMT'];
            return ['1호기','2호기','멀티보링'];
        }
        function _woGetProcMeta(sk) {
            if (sk.endsWith('-엣지')) return { procKey:'엣지', color:'#17C3B2', colorAlpha:'rgba(23,195,178,0.08)', label:'엣지' };
            if (sk.endsWith('-재단')) return { procKey:'재단', color:'#90BBC6', colorAlpha:'rgba(144,187,198,0.08)', label:'재단' };
            return { procKey:'보링', color:'#227C9D', colorAlpha:'rgba(34,124,157,0.08)', label:'보링' };
        }

        window._WO_SLOTS = Array.from({length:32}, (_, i) => {
            const h = String(7 + Math.floor(i / 2)).padStart(2, '0');
            return `${h}:${i % 2 === 0 ? '00' : '30'}`;
        });
        window._WO_PX_PER_MIN = 44 / 30; // 30분 = 44px 기준 (1분 ≈ 1.47px)
        window._woBoring      = {};   // { stateKey: { '1호기':{'07:00':[],...}, pool:[] } }
        window._woBoringParts = {};   // { stateKey: [ {nm,pm,dq,cKey} ] }
        window._woBDragKey    = null;

        // pool용 카드 HTML (border-left 색상은 부모 요소의 --wo-proc-color CSS 변수로 자동 적용)
        // 오더번호별 색상 팔레트 — 뮤트 내추럴톤 (배경 극저채도 / 테두리 중간채도)
        const _ORDER_BG_PAL = [
            '#eef3ee', // sage
            '#eeedf5', // lavender
            '#f3eeea', // warm sand
            '#e9f3f4', // soft teal
            '#f4ecea', // dusty rose
            '#eaeff5', // steel blue
            '#eaf1eb', // fern
            '#f1eaf0', // mauve
            '#f3f0e7', // wheat
            '#eaecf3', // slate
        ];
        const _ORDER_BD_PAL = [
            '#89a88b', // sage
            '#8d8cb4', // lavender
            '#a8907e', // sand
            '#76a8b0', // teal
            '#b08680', // rose
            '#7896b0', // steel blue
            '#789c82', // fern
            '#a678a4', // mauve
            '#ae9e78', // wheat
            '#8696a8', // slate
        ];
        function _woGetOrderColorMap(sk) {
            const parts = window._woBoringParts[sk] || [];
            const keys = [...new Set(parts.map(p => p.orderKey || p.orderCode || '').filter(Boolean))];
            const map = {};
            keys.forEach((ok, i) => { map[ok] = { bg: _ORDER_BG_PAL[i % _ORDER_BG_PAL.length], bd: _ORDER_BD_PAL[i % _ORDER_BD_PAL.length] }; });
            return map;
        }

        /**
         * 기기별 작업시간 균형 자동배치
         * Phase 1: LPT(오래 걸리는 오더부터) 그리디 — 오더 단위로 최소부하 기기에 배정
         * Phase 2: 불균형(평균의 15% 초과) 시 단일 부속 이동으로 최소분리 보정 (최대 parts수만큼 반복)
         * @param {Array} parts   - 부속 배열 [{cKey, pm, orderKey, orderCode}]
         * @param {Array} macs    - 배정 대상 기기명 배열
         * @returns {Object}      - { 기기명: [cKey,...], ... }
         */
        function _woAutoBalance(parts, macs) {
            if (!macs.length) return {};
            const bins = {};
            macs.forEach(m => { bins[m] = { keys: [], pm: 0 }; });

            if (macs.length === 1) {
                bins[macs[0]].keys = parts.map(p => p.cKey);
                bins[macs[0]].pm  = parts.reduce((s, p) => s + (p.pm || 0), 0);
                return bins;
            }

            // ── Phase 1: LPT 그리디 (오더 단위)
            const orderMap = new Map();
            parts.forEach(p => {
                const ok = p.orderKey || p.orderCode || '_';
                if (!orderMap.has(ok)) orderMap.set(ok, { keys: [], pm: 0 });
                orderMap.get(ok).keys.push(p.cKey);
                orderMap.get(ok).pm += p.pm || 0;
            });
            const orders = [...orderMap.entries()].sort((a, b) => b[1].pm - a[1].pm);
            orders.forEach(([, od]) => {
                const minM = macs.reduce((a, b) => bins[a].pm <= bins[b].pm ? a : b);
                bins[minM].keys.push(...od.keys);
                bins[minM].pm += od.pm;
            });

            // ── Phase 2: 최소 부속 이동으로 불균형 보정
            const avg = macs.reduce((s, m) => s + bins[m].pm, 0) / macs.length;
            for (let iter = 0; iter < parts.length; iter++) {
                const maxM = macs.reduce((a, b) => bins[a].pm >= bins[b].pm ? a : b);
                const minM = macs.reduce((a, b) => bins[a].pm <= bins[b].pm ? a : b);
                if (bins[maxM].pm - bins[minM].pm <= avg * 0.15) break;  // 15% 이내 → 충분히 균형
                const target = (bins[maxM].pm - bins[minM].pm) / 2;
                let bestKey = null, bestDiff = Infinity;
                bins[maxM].keys.forEach(k => {
                    const p = parts.find(pp => pp.cKey === k);
                    if (!p) return;
                    const d = Math.abs((p.pm || 0) - target);
                    if (d < bestDiff) { bestDiff = d; bestKey = k; }
                });
                if (!bestKey) break;
                const bp = parts.find(pp => pp.cKey === bestKey);
                bins[maxM].keys = bins[maxM].keys.filter(k => k !== bestKey);
                bins[maxM].pm  -= bp?.pm || 0;
                bins[minM].keys.push(bestKey);
                bins[minM].pm  += bp?.pm || 0;
            }
            return bins;
        }

        function _woCardHtml(p, stateKey) {
            // 완료 상태 확인
            const _wpk  = stateKey.replace(/^\d{4}-\d{2}-\d{2}-/, '');
            const _wdid = p.orderKey || '';
            const _wck  = _wdid ? p.cKey.substring(_wdid.length + 1) : p.cKey;
            const _wobj = confirmedOrders.find(o => (o.docId || String(o.idNum)) === _wdid);
            const _wDone    = !!(_wobj?.partCompletions?.[_wck]?.[_wpk]);
            const _wStarted = !!(_wobj?.partStarted?.[_wck]?.[_wpk]);
            const _wActMin  = _wobj?.partCompletions?.[_wck]?.[_wpk]?.actualMinutes ?? null;
            const _wSafeDocId = _wdid.replace(/'/g, "\\'");
            const _wSafeCK   = _wck.replace(/'/g, "\\'");
            const _wDate    = stateKey.substring(0, 10);
            const _wPrereq  = _partPrereqDone(_wck, _wpk, _wobj?.partCompletions?.[_wck] || {});
            const _wQI      = _partQtyInfo(_wobj?.partCompletions?.[_wck], p.dq || 0);
            const _wDoneHtml = _wDone
                ? `<div style="margin-top:5px;text-align:right;"><span style="font-size:9px;font-weight:900;color:#22c55e;">✓ 완료</span>${_wActMin != null ? `<span style="font-size:8px;font-weight:700;color:#60a5fa;margin-left:3px;">${_wActMin.toFixed(1)}분</span>` : ''}</div>`
                : _wPrereq
                    ? _wStarted
                        ? `<div style="margin-top:5px;text-align:right;"><button onclick="event.stopPropagation();tlShowPartDoneConfirm('${_wSafeDocId}','${_wSafeCK}','${_wpk}','${_wDate}',this,'${(p.nm||'').replace(/'/g,"\\'")}',${p.dq||0})" onmousedown="event.stopPropagation()" style="font-size:8px;font-weight:900;color:#fff;background:#22c55e;border:none;border-radius:3px;padding:2px 7px;cursor:pointer;line-height:1.4;">완료</button></div>`
                        : `<div style="margin-top:5px;text-align:right;"><button onclick="event.stopPropagation();tlMarkPartStarted('${_wSafeDocId}','${_wSafeCK}','${_wpk}','${_wDate}',this,'${(p.nm||'').replace(/'/g,"\\'")}',${p.dq||0})" onmousedown="event.stopPropagation()" style="font-size:8px;font-weight:900;color:#fff;background:#3b82f6;border:none;border-radius:3px;padding:2px 7px;cursor:pointer;line-height:1.4;">▶ 시작</button></div>`
                    : '';

            let innerHtml = '';
            if (p.isCuttingCard) {
                const dimStr    = (p.rw && p.rd) ? `${p.rw}×${p.rd}` : '';
                const sheetsStr = p.sheets       ? `${p.sheets}장`    : '';
                innerHtml =
                    `<div style="font-size:9px;font-weight:700;color:#a8a6a2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${p.orderCode||''}</div>` +
                    `<div style="font-size:12px;font-weight:800;color:#37352f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;margin-top:1px;">${p.plateName||p.nm||'-'}</div>` +
                    `<div style="font-size:10px;font-weight:600;color:#6b6966;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${p.finish||''}</div>` +
                    `<div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;margin-top:3px;">` +
                    (dimStr    ? `<span style="font-size:9px;font-weight:700;color:#787774;background:#f0efed;padding:1px 4px;border-radius:3px;">${dimStr}</span>` : '') +
                    (sheetsStr ? `<span style="font-size:9px;font-weight:700;color:#37352f;background:#e8e7e4;padding:1px 4px;border-radius:3px;">${sheetsStr}</span>` : '') +
                    `<span style="font-size:9px;font-weight:700;color:${_wQI.color};background:${_wQI.bg};padding:1px 4px;border-radius:3px;">${_wQI.label} EA</span>` +
                    `</div>` + _wDoneHtml;
            } else {
                const _cOn = p.orderName
                    ? `<div style="font-size:9px;font-weight:600;color:#a8a6a2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;">${p.orderName}</div>` : '';
                const _cNm = `<div style="display:flex;align-items:center;justify-content:space-between;gap:3px;overflow:hidden;">` +
                    `<span style="font-size:11px;font-weight:800;color:#37352f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;">${p.nm}</span>` +
                    `<span style="font-size:9px;font-weight:700;color:${_wQI.color};background:${_wQI.bg};padding:0 4px;border-radius:3px;flex-shrink:0;white-space:nowrap;line-height:1.6;">${_wQI.label} EA</span>` +
                    `</div>`;
                const _pmPool = p.pm || 0;
                const _pmPoolStr = _pmPool >= 1 ? `${_pmPool.toFixed(1)}분` : `${Math.round(_pmPool * 60)}초`;
                const _cTimePool = `<div style="font-size:8px;font-weight:600;color:#aaa8a4;margin-top:2px;white-space:nowrap;">⏱ ${_pmPoolStr}</div>`;
                innerHtml = _cOn + _cNm + _cTimePool + _wDoneHtml;
            }
            const _pcm = _woGetOrderColorMap(stateKey);
            const _pok = p.orderKey || p.orderCode || '';
            const _pcc = _pcm[_pok] || {};
            const _pcs = _pcc.bg ? `background:${_pcc.bg};border-left:3px solid ${_pcc.bd};` : '';
            return `<div class="wo-boring-part-card" draggable="${_wDone ? 'false' : 'true'}"
                data-ck="${p.cKey}" data-sk="${stateKey}" data-done="${_wDone ? '1' : '0'}"
                style="${_pcs}${_wDone ? 'opacity:0.6;' : ''}"
                onmouseenter="woBoardCardTipShow(event)"
                onmouseleave="woBoardCardTipHide()"
                ${_wDone ? '' : `ondragstart="woBoardDragStart(event,'${p.cKey}','${stateKey}')" ondragend="woBoardDragEnd(event)"`}>${innerHtml}</div>`;
        }

        // ── 보링 보드 재렌더 (절대위치 Gantt)
        // PX_PER_MIN 결정 원칙:
        //   ① 어떤 카드도 MIN_CARD_H 이하로 그려지지 않는다 (상한 없음, 타임라인 확장)
        //   ② 확장된 스케일은 세 기계 모두에 동일하게 적용 → 시간 비례 유지
        //   PX_PER_MIN = max(BASE, MIN_CARD_H / min_pm_per_machine)  – 기계별 계산 후 전역 max
        function _woRenderBoard(sk) {
            const grid = document.getElementById('wo-boring-grid-' + sk);
            if (!grid) return;
            const parts    = window._woBoringParts[sk] || [];
            const state    = window._woBoring[sk];
            if (!state) return;
            const machines   = _woGetMachines(sk);
            const procMeta   = _woGetProcMeta(sk);
            // 공정색을 CSS 변수로 주입 → placed 카드 border + drag-over 강조에 자동 적용
            grid.style.setProperty('--wo-proc-color', procMeta.color);
            const MIN_CARD_H = 58;   // 카드 최소 높이 (px) — 내용+완료버튼 공간 포함
            const GAP_PX     = 2;    // 카드 사이 간격

            // 기계별 순서 배열 정규화
            const macKeys = {};
            machines.forEach(mac => {
                macKeys[mac] = (state[mac] || []).map(x => typeof x === 'string' ? x : x?.cKey).filter(Boolean);
            });

            // ── 기본 배제 구간 초기화 (sk 최초 진입시 1회)
            if (!window._woExclusions[sk]) {
                // 10:00~10:20 휴식(m=180,190), 12:00~13:00 점심(m=300~350), 15:00~15:20 휴식(m=480,490)
                window._woExclusions[sk] = new Set([180,190, 300,310,320,330,340,350, 480,490]);
                window._woExclusionReasons[sk] = {
                    180: {reason:'휴식', custom:''},
                    300: {reason:'점심', custom:''},
                    480: {reason:'휴식', custom:''}
                };
            }

            // ── 배제 구간 정보 (타임라인 계산보다 먼저)
            const exclZones   = _woGetExclZones(sk);
            const exclBlocks  = _woGetExclBlocks(sk);
            const exclReasons = (window._woExclusionReasons[sk]) || {};

            // ── 고정 PX/분 스케일 — 최단카드 기준 자동확장 폐기, 시각 누적 방식으로 전환
            // 짧은 카드: MIN_CARD_H 보장 & 다음 카드는 시각 바닥부터 → 겹침 없음
            // 긴 카드: 실제 소요분 × PX 비례 → 합리적 높이
            const PX_PER_MIN = 0.7;

            // ── 기계별 시각 누적 타임라인
            // actualCur = 실제 시계 분(배제구간 반영), visualY = 시각 Y px
            const macTimelines = {};
            machines.forEach(mac => {
                const ms = _woGetMacStart(sk, mac) ?? 0;
                let actualCur = ms;
                let visualY   = ms * PX_PER_MIN;
                const tl = [];
                macKeys[mac].forEach(k => {
                    const p        = parts.find(pp => pp.cKey === k);
                    // ── 실제 작업시간이 기록된 경우 actualMinutes 우선 사용 (스케줄 자동 조정)
                    const _procKey = sk.replace(/^\d{4}-\d{2}-\d{2}-/, '');
                    const _ordAct  = p ? confirmedOrders.find(o => (o.docId || String(o.idNum)) === p.orderKey) : null;
                    const _ckAct   = p ? p.cKey.substring((p.orderKey || '').length + 1) : '';
                    const _actPm   = _ordAct?.partCompletions?.[_ckAct]?.[_procKey]?.actualMinutes;
                    const pm       = p ? (_actPm ?? p.pm) : 0;
                    const cStart = actualCur;
                    const cEnd   = _woCalcEffectiveEnd(cStart, pm, exclZones);
                    const effDur = cEnd - cStart;
                    // 재단카드(isCuttingCard)는 4행 정보 표기를 위해 최소 높이 80px 확보
                    const cardMinH = (p && p.isCuttingCard) ? 80 : MIN_CARD_H;
                    const visH   = Math.max(cardMinH, Math.round(effDur * PX_PER_MIN));
                    tl.push({ cKey: k, pm, clockStart: cStart, clockEnd: cEnd,
                               topPx: Math.round(visualY), cardH: visH - GAP_PX });
                    actualCur = cEnd;
                    visualY  += visH;
                });
                macTimelines[mac] = tl;
                macTimelines[mac]._visEnd = visualY;
                macTimelines[mac]._actEnd = actualCur;
            });

            // 보드 높이: 시각 최대 Y 기준 (시계보다 클 수 있음)
            let maxClockMin = 120;
            let maxVisY     = 120 * PX_PER_MIN;
            machines.forEach(mac => {
                const ms = _woGetMacStart(sk, mac) ?? 0;
                if (ms > 0) maxClockMin = Math.max(maxClockMin, ms + 30);
                const tl = macTimelines[mac];
                if (tl.length) {
                    maxClockMin = Math.max(maxClockMin, macTimelines[mac]._actEnd);
                    maxVisY     = Math.max(maxVisY, macTimelines[mac]._visEnd);
                }
            });
            const BOARD_H = Math.max(200, Math.ceil(maxVisY) + 40);

            // ── 헤더 HTML (기계 목록 동적)
            let html =
                `<div class="wo-boring-board-hdr">` +
                `<div class="wo-boring-time-hdr">시간</div>` +
                machines.map(m =>
                    `<div class="wo-boring-machine-hdr" style="color:#1a1a1a;background:${procMeta.colorAlpha};">${m}</div>`
                ).join('') +
                `</div>`;

            // ── 내부 콘텐츠 (절대위치 영역)
            html += `<div class="wo-boring-inner" style="height:${BOARD_H}px;">`;

            // 시간축 컬럼 — 10분 토글 블록 + 30분 눈금 + 배제 구간 라벨
            html += `<div class="wo-boring-time-col" style="height:${BOARD_H}px;position:relative;">`;
            // 10분 단위 토글 버튼
            for (let m = 0; m < maxClockMin + 30; m += 10) {
                const yPx  = Math.round(m * PX_PER_MIN);
                const h10  = Math.round(10 * PX_PER_MIN);
                if (yPx >= BOARD_H) break;
                const isOn = exclBlocks.has(m);
                const cH   = String(7 + Math.floor(m / 60)).padStart(2,'0');
                const cM   = String(m % 60).padStart(2,'0');
                html += `<div class="wo-excl-block${isOn?' on':''}" style="top:${yPx}px;height:${h10}px;"` +
                    ` title="${cH}:${cM} 배제 토글" onclick="_woToggleExclBlock('${sk}',${m})"></div>`;
            }
            // 30분 눈금 + 시간 표기
            for (let m = 0; m <= maxClockMin + 30; m += 30) {
                const yPx = Math.round(m * PX_PER_MIN);
                if (yPx > BOARD_H + 5) break;
                const h   = String(7 + Math.floor(m / 60)).padStart(2, '0');
                const min = String(m % 60).padStart(2, '0');
                const isHalf = (m % 60 === 30);
                html += `<div class="wo-boring-tick" style="top:${yPx}px;pointer-events:none;` +
                    `border-top-width:1px;border-top-color:${isHalf?'#e3e1de':'#d0ceca'};` +
                    `border-top-style:${isHalf?'dashed':'solid'};height:1px;"></div>` +
                    `<div style="position:absolute;top:${yPx+3}px;left:0;right:0;text-align:center;pointer-events:none;` +
                    `font-size:${isHalf?8:10}px;font-weight:${isHalf?500:800};` +
                    `color:${isHalf?'#c0bebb':'#8a8884'};line-height:1;">${h}:${min}</div>`;
            }
            // 배제 구간 라벨 (사유 선택 + 구간 취소 버튼)
            exclZones.forEach(z => {
                const top    = Math.round(z.start * PX_PER_MIN);
                const height = Math.round((z.end - z.start) * PX_PER_MIN);
                const r      = exclReasons[z.start] || {reason:'휴식', custom:''};
                const opts   = ['휴식','점심','기타'].map(o =>
                    `<option${r.reason===o?' selected':''}>${o}</option>`).join('');
                html += `<div class="wo-excl-zone-label" style="top:${top}px;height:${height}px;">` +
                    `<button onclick="_woClearExclZone('${sk}',${z.start},${z.end})" title="이 구간 배제 취소"` +
                    ` style="font-size:9px;line-height:1;padding:1px 4px;border:1px solid #d0cec9;border-radius:3px;` +
                    `background:#fff;color:#b0aeaa;cursor:pointer;width:100%;max-width:48px;">✕ 취소</button>` +
                    `<select class="wo-excl-zone-select" onchange="_woSetExclReason('${sk}',${z.start},this.value)">${opts}</select>` +
                    `<input id="wo-excl-inp-${sk}-${z.start}" class="wo-excl-custom-input" type="text"` +
                    ` placeholder="사유입력" value="${r.custom||''}"` +
                    ` style="display:${r.reason==='기타'?'block':'none'};"` +
                    ` onblur="_woSetExclCustom('${sk}',${z.start},this.value)">` +
                    `</div>`;
            });
            html += `</div>`; // end time-col

            // 오더별 색상맵 (배치 카드용)
            const _boardColorMap = _woGetOrderColorMap(sk);

            // 기계 컬럼
            machines.forEach((mac, mi) => {
                const tl   = macTimelines[mac];
                const keys = macKeys[mac];

                html +=
                    `<div class="wo-boring-mac-col" id="mac-col-${mi}-${sk}"` +
                    ` style="height:${BOARD_H}px;"` +
                    ` ondragover="woBoardDragOver(event)"` +
                    ` ondrop="woBoardDrop(event,'${mac}',null,'${sk}')"` +
                    ` ondragleave="woBoardDragLeave(event)"` +
                    ` data-mac="${mac}" data-sk="${sk}">`;

                // 30분 눈금선 (배경)
                for (let m = 30; m <= maxClockMin + 30; m += 30) {
                    const yPx = Math.round(m * PX_PER_MIN);
                    if (yPx > BOARD_H) break;
                    const isHalf = (m % 60 === 30);
                    html += `<div style="position:absolute;left:0;right:0;top:${yPx}px;height:1px;` +
                        `border-top:1px ${isHalf?'dashed':'solid'} ${isHalf?'#edeceb':'#e3e2e0'};pointer-events:none;"></div>`;
                }

                // 배제 구간 오버레이
                exclZones.forEach(z => {
                    const top    = Math.round(z.start * PX_PER_MIN);
                    const height = Math.round((z.end - z.start) * PX_PER_MIN);
                    html += `<div class="wo-excl-overlay" style="top:${top}px;height:${height}px;"></div>`;
                });

                // ── 빈 컬럼: 시작시간 선택 슬롯 (drag 이벤트도 처리)
                if (tl.length === 0) {
                    const curStart = _woGetMacStart(sk, mac);
                    for (let m = 0; m <= maxClockMin + 60; m += 30) {
                        const yPx  = Math.round(m * PX_PER_MIN);
                        const h30  = Math.round(30 * PX_PER_MIN);
                        if (yPx >= BOARD_H) break;
                        const isEx = exclZones.some(z => m >= z.start && m < z.end);
                        if (isEx) continue;
                        const cH    = String(7 + Math.floor(m / 60)).padStart(2,'0');
                        const cM    = String(m % 60).padStart(2,'0');
                        const isSel = (curStart === m);
                        const bgNormal  = isSel ? 'rgba(0,0,0,0.08)' : 'rgba(0,0,0,0.03)';
                        const borderClr = isSel ? '#d0cec9' : '#eeeeec';
                        html += `<div class="wo-start-slot"` +
                            ` style="left:4px;right:4px;top:${yPx+2}px;height:${h30-4}px;` +
                            `background:${bgNormal};border:1px ${isSel?'solid':'dashed'} ${borderClr};"` +
                            ` onclick="_woSetMacStart('${sk}','${mac}',${m})"` +
                            ` ondragover="event.preventDefault();event.dataTransfer.dropEffect='move';"` +
                            ` ondragleave=""` +
                            ` ondrop="_woDropOnEmptyCol(event,'${sk}','${mac}',${m})">` +
                            `${isSel?`<span style="font-size:11px;color:#b0aeaa;pointer-events:none;line-height:1;">▶</span>`:''}` +
                            `<span style="font-size:${isSel?11:10}px;font-weight:${isSel?800:600};` +
                            `color:${isSel?'#555250':'#b0aeaa'};letter-spacing:0.3px;pointer-events:none;">${cH}:${cM}</span>` +
                            `</div>`;
                    }
                }

                // 배치 카드 (절대위치) — 시각 누적 기반 (topPx/cardH 미리 계산)
                tl.forEach(({cKey, topPx, cardH}) => {
                    const p = parts.find(pp => pp.cKey === cKey);
                    if (!p) return;

                    // _bQI 먼저 계산 (수량 표기에 _placedInner 생성 전 필요)
                    const _bpk   = sk.replace(/^\d{4}-\d{2}-\d{2}-/, '');
                    const _bdid  = p.orderKey || '';
                    const _bck   = _bdid ? cKey.substring(_bdid.length + 1) : cKey;
                    const _bobj  = confirmedOrders.find(o => (o.docId || String(o.idNum)) === _bdid);
                    const _bQI   = _partQtyInfo(_bobj?.partCompletions?.[_bck], p.dq || 0);

                    // ─── 배치 카드 (재단카드: 상세 4행 / 일반카드: 컴팩트 2행) ───
                    let _placedInner = '';
                    if (p.isCuttingCard) {
                        const _dimStr2    = (p.rw && p.rd) ? `${p.rw}×${p.rd}` : '';
                        const _sheetsStr2 = p.sheets       ? `${p.sheets}장`    : '';
                        _placedInner =
                            `<div style="font-size:9px;font-weight:700;color:#a8a6a2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${p.orderCode||''}</div>` +
                            `<div style="font-size:12px;font-weight:800;color:#37352f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;margin-top:1px;">${p.plateName||p.nm||'-'}</div>` +
                            `<div style="font-size:10px;font-weight:600;color:#6b6966;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${p.finish||''}</div>` +
                            `<div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap;margin-top:3px;">` +
                            (_dimStr2    ? `<span style="font-size:9px;font-weight:700;color:#787774;background:#f0efed;padding:1px 4px;border-radius:3px;">${_dimStr2}</span>` : '') +
                            (_sheetsStr2 ? `<span style="font-size:9px;font-weight:700;color:#37352f;background:#e8e7e4;padding:1px 4px;border-radius:3px;">${_sheetsStr2}</span>` : '') +
                            `<span style="font-size:9px;font-weight:700;color:${_bQI.color};background:${_bQI.bg};padding:1px 4px;border-radius:3px;">${_bQI.label} EA</span>` +
                            `</div>`;
                    } else {
                        const _cOn2 = p.orderName
                            ? `<div style="font-size:9px;font-weight:600;color:#a8a6a2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.25;">${p.orderName}</div>`
                            : '';
                        const _cNm2 = `<div style="display:flex;align-items:center;justify-content:space-between;gap:3px;overflow:hidden;">` +
                            `<span style="font-size:11px;font-weight:800;color:#37352f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;">${p.nm}</span>` +
                            `<span style="font-size:9px;font-weight:700;color:${_bQI.color};background:${_bQI.bg};padding:0 4px;border-radius:3px;white-space:nowrap;flex-shrink:0;">${_bQI.label} EA</span>` +
                            `</div>`;
                        // 공정시간 표시 — 카드 높이가 충분할 때만 표기
                        const _pmVal = p.pm || 0;
                        const _pmStr2 = _pmVal >= 1 ? `${_pmVal.toFixed(1)}분` : `${Math.round(_pmVal * 60)}초`;
                        const _cTime2 = cardH >= 72
                            ? `<div style="font-size:8px;font-weight:600;color:#aaa8a4;padding-top:2px;white-space:nowrap;">⏱ ${_pmStr2}</div>`
                            : '';
                        _placedInner = `<div style="display:flex;flex-direction:column;overflow:hidden;">` + _cOn2 + _cNm2 + _cTime2 + `</div>`;
                    }

                    const _bok = p.orderKey || p.orderCode || '';
                    const _bcc = _boardColorMap[_bok] || {};
                    const _bcs = _bcc.bg ? `background:${_bcc.bg};border-left:3px solid ${_bcc.bd};` : '';

                    // 완료 상태 확인 (_bpk, _bdid, _bck, _bobj, _bQI 는 위에서 이미 선언됨)
                    const _bDone    = !!(_bobj?.partCompletions?.[_bck]?.[_bpk]);
                    const _bStarted = !!(_bobj?.partStarted?.[_bck]?.[_bpk]);
                    // 완료됐지만 partName 없는 경우 자동 수정
                    if (_bDone && _bobj?.docId && p.nm) {
                        const _bVal = _bobj?.partCompletions?.[_bck]?.[_bpk];
                        if (_bVal && typeof _bVal === 'object' && !_bVal.partName) {
                            const { doc: _bDoc, updateDoc: _bUpd } = window.fbFirestore;
                            _bUpd(_bDoc(window.db, 'artifacts', 'vivivic-4b7ef', 'public', 'data', 'confirmed_orders', _bobj.docId), {
                                [`partCompletions.${_bck}.${_bpk}.partName`]: p.nm
                            }).catch(() => {});
                        }
                    }
                    const _bActMin   = _bobj?.partCompletions?.[_bck]?.[_bpk]?.actualMinutes ?? null;
                    const _bSafeDocId = _bdid.replace(/'/g, "\\'");
                    const _bSafeCK    = _bck.replace(/'/g, "\\'");
                    const _bDate     = sk.substring(0, 10);
                    const _bPrereq = _partPrereqDone(_bck, _bpk, _bobj?.partCompletions?.[_bck] || {});
                    const _bDoneHtml  = _bDone
                        ? `<div style="margin-top:auto;padding-top:2px;text-align:right;flex-shrink:0;"><span style="font-size:9px;font-weight:900;color:#22c55e;">✓완료</span>${_bActMin != null ? `<span style="font-size:8px;font-weight:700;color:#60a5fa;margin-left:3px;">${_bActMin.toFixed(1)}분</span>` : ''}</div>`
                        : _bPrereq
                            ? _bStarted
                                ? `<div style="margin-top:auto;padding-top:2px;text-align:right;flex-shrink:0;"><button onclick="event.stopPropagation();tlShowPartDoneConfirm('${_bSafeDocId}','${_bSafeCK}','${_bpk}','${_bDate}',this,'${(p.nm||'').replace(/'/g,"\\'")}',${p.dq||0})" onmousedown="event.stopPropagation()" style="font-size:8px;font-weight:900;color:#fff;background:#22c55e;border:none;border-radius:3px;padding:1px 6px;cursor:pointer;line-height:1.5;">완료</button></div>`
                                : `<div style="margin-top:auto;padding-top:2px;text-align:right;flex-shrink:0;"><button onclick="event.stopPropagation();tlMarkPartStarted('${_bSafeDocId}','${_bSafeCK}','${_bpk}','${_bDate}',this,'${(p.nm||'').replace(/'/g,"\\'")}',${p.dq||0})" onmousedown="event.stopPropagation()" style="font-size:8px;font-weight:900;color:#fff;background:#3b82f6;border:none;border-radius:3px;padding:1px 6px;cursor:pointer;line-height:1.5;">▶ 시작</button></div>`
                            : '';

                    html +=
                        `<div class="wo-boring-placed-card" draggable="${_bDone ? 'false' : 'true'}"` +
                        ` style="top:${topPx+1}px;height:${cardH}px;${_bcs}${_bDone ? 'opacity:0.6;' : ''}"` +
                        ` data-ck="${cKey}" data-sk="${sk}" data-done="${_bDone ? '1' : '0'}"` +
                        ` onmouseenter="woBoardCardTipShow(event)"` +
                        ` onmouseleave="woBoardCardTipHide()"` +
                        (_bDone ? '' : ` ondragstart="woBoardDragStart(event,'${cKey}','${sk}')" ondragend="woBoardDragEnd(event)"`) +
                        `>` +
                        _placedInner + _bDoneHtml +
                        `</div>`;
                });

                html += `</div>`; // end mac-col
            });

            html += `</div>`; // end inner
            grid.innerHTML = html;
        }

        // pool 섹션 재렌더 (상품명별 그룹화 + 배정 현황 표시)
        function _woRenderPool(sk) {
            const el = document.getElementById('zone-pool-' + sk);
            if (!el) return;
            const parts  = window._woBoringParts[sk] || [];
            const boring = window._woBoring[sk] || {};
            const poolKeys = new Set(boring.pool || []);
            // pool 카드도 공정색 CSS 변수 상속
            const _poolMeta = _woGetProcMeta(sk);
            el.style.setProperty('--wo-proc-color', _poolMeta.color);

            if (!parts.length) {
                el.innerHTML = '<span style="font-size:9px;color:#b0aeaa;padding:4px 0;">모두 배정됨 ✓</span>';
                return;
            }

            // 기계에 배정된 키 집합 (기계 목록은 state 키에서 동적 추출)
            const assignedKeys = new Set();
            Object.keys(boring).filter(k => k !== 'pool').forEach(mac => {
                (boring[mac] || []).forEach(k => assignedKeys.add(k));
            });

            // 상품명(orderKey)별로 그룹화
            const orderMap = new Map();
            parts.forEach(p => {
                const ok = p.orderKey || '_';
                if (!orderMap.has(ok)) orderMap.set(ok, { orderName: p.orderName || ok, orderCode: p.orderCode || '', deliveryDate: p.deliveryDate || '', parts: [] });
                orderMap.get(ok).parts.push(p);
            });

            // ── 당일 다른 공정 일정 감지 ──────────────────────────────────
            const dateStr0 = sk.replace('-보링', '');
            const allSecs  = (typeof window._tlDcGetItems === 'function') ? window._tlDcGetItems(dateStr0) : {};

                    _tlCollapsed = [];
                }

                // 고스트 생성
                const ghost = document.createElement('div');
                ghost.id = 'tl-drag-ghost';
                ghost.textContent = `${procKey} · ${item.displayName}`;
                const _sc = _getTouchCoords(e);
                ghost.style.left = _sc.clientX + 12 + 'px';
                ghost.style.top  = _sc.clientY - 10 + 'px';
                document.body.appendChild(ghost);

                // 원본 카드 반투명
                cardEl.classList.add('tl-item-dragging');

                // 현재 날짜 (카드가 속한 날짜카드의 data-card-date)
                const currentDate = cardEl.closest('[data-card-date]')?.dataset.cardDate;

                _drag = {
                    docId, procKey, item, cardEl, currentDate,
                    ghost,
                    startX: _sc.clientX,
                    hoveredDate: currentDate,
                };

                window.addEventListener('mousemove',  _onDragMove);
                window.addEventListener('mouseup',    _onDragEnd);
                window.addEventListener('touchmove',  _onDragMoveTouch, { passive: false });
                window.addEventListener('touchend',   _onDragEndTouch);
            };

            function _onDragMove(e) {
                if (!_drag) return;
                const _c = _getTouchCoords(e);
                window._tlDragMoved = true;
                _drag.ghost.style.left = _c.clientX + 12 + 'px';
                _drag.ghost.style.top  = _c.clientY - 10 + 'px';

                _drag.ghost.style.display = 'none';
                const el = document.elementFromPoint(_c.clientX, _c.clientY);
                _drag.ghost.style.display = '';

                // 드롭 타깃 초기화
                document.querySelectorAll('.tl-drop-target').forEach(s => s.classList.remove('tl-drop-target'));
                _drag.hoveredDate = null;

                if (!el) return;

                // 마우스 아래 날짜카드 찾기
                const dateCardEl = el.closest('[data-card-date]');
                if (!dateCardEl) return;
                const sectionDate = dateCardEl.dataset.cardDate;

                // ── 이동모드 범위 체크 ──────────────────────────────────────
                // 하한: max(발주일, 오늘) — 발주일이 과거면 오늘이 하한
                const od = batchDateStr(_drag.item);
                const todayKST = (() => { const d = new Date(Date.now() + 9*60*60*1000); return d.toISOString().slice(0,10); })();
                const lowerBound = (od && od > todayKST) ? od : todayKST;
                if (sectionDate < lowerBound) return;

                // 납기(5) 카드: 미래 제한 없음, 날짜카드 전체를 드롭 타깃으로
                if (_drag.procKey === '납기') {
                    const section = dateCardEl.querySelector(`.tl-process-section[data-process="납기"]`);
                    _drag.hoveredDate = sectionDate;
                    if (section) section.classList.add('tl-drop-target');
                    else dateCardEl.classList.add('tl-drop-target');
                    return;
                }

                // 1~4 공정 카드: 카드별 미래 벽(그리드 규칙) 적용
                const futureWall = _getDragFutureWall(_drag.item, _drag.procKey);
                if (futureWall && sectionDate > futureWall) return;

                // 해당 공정 섹션 위에 있어야 드롭 허용
                const section = dateCardEl.querySelector(`.tl-process-section[data-process="${_drag.procKey}"]`);
                if (!section) return;

                _drag.hoveredDate = sectionDate;
                section.classList.add('tl-drop-target');
            }

            function _onDragEnd(e) {
                if (!_drag) return;
                window.removeEventListener('mousemove',  _onDragMove);
                window.removeEventListener('mouseup',    _onDragEnd);
                window.removeEventListener('touchmove',  _onDragMoveTouch);
                window.removeEventListener('touchend',   _onDragEndTouch);

                // 드래그 이동 플래그 리셋 (mouseup 직후 click 이벤트보다 먼저 처리되도록 setTimeout)
                setTimeout(() => { window._tlDragMoved = false; }, 0);

                // 고스트 제거, 카드 원상복구
                if (_drag.ghost.parentNode) _drag.ghost.parentNode.removeChild(_drag.ghost);
                _drag.cardEl.classList.remove('tl-item-dragging');
                document.querySelectorAll('.tl-drop-target').forEach(s => s.classList.remove('tl-drop-target'));

                const targetDate = _drag.hoveredDate;
                const { item, procKey, currentDate } = _drag;
                _drag = null;

                if (!targetDate || targetDate === currentDate) return;

                // ── 이동모드 범위 제한 ──────────────────────────────────────
                // 하한: max(발주일, 오늘) — 발주일이 과거면 오늘이 하한
                const orderDate = batchDateStr(item);
                const todayStr = (() => { const d = new Date(Date.now() + 9*60*60*1000); return d.toISOString().slice(0,10); })();
                const lowerBound = (orderDate && orderDate > todayStr) ? orderDate : todayStr;
                if (targetDate < lowerBound) return;
                // 1~4 공정: 카드별 미래 벽(그리드 규칙) 적용 / 납기: 미래 제한 없음
                const futureWall = _getDragFutureWall(item, procKey);
                if (futureWall && targetDate > futureWall) return;

                // 비활성날짜(주말) 보정
                const finalDate = toValidDate(targetDate);

                // 그리드 이동 로직 적용 (역행 시만 클램핑, 미래로 이동 시 아무도 따라가지 않음)
                applyGridMoveLogic(item, procKey, finalDate, orderDate);

                // Firebase에 procOverrides 저장 (새로고침 후에도 편집 상태 유지)
                // ※ 납기 드래그는 item.deliveryDate를 변경하므로 deliveryDate도 함께 저장
                //   미저장 시 onSnapshot이 Firebase의 구 deliveryDate로 덮어써 납기카드가 원위치로 복귀하는 버그 발생
                if (item.docId) {
                    const { doc, updateDoc } = window.fbFirestore;
                    const appId = "vivivic-4b7ef";
                    const docRef = doc(window.db, 'artifacts', appId, 'public', 'data', 'confirmed_orders', item.docId);
                    const saveVal = item.procOverrides && Object.keys(item.procOverrides).length > 0 ? item.procOverrides : null;
                    const saveData = { procOverrides: saveVal };
                    if (procKey === '납기') saveData.deliveryDate = item.deliveryDate;
                    updateDoc(docRef, saveData)
                        .catch(err => console.error('[procOverrides 저장 실패]', err));
                }

                // 타임라인 재렌더
                TL.refreshCards();

                // 더블클릭 선택 상태 유지 (docId로 재선택)
                const newDocId = item.docId;
                setTimeout(() => {
                    document.querySelectorAll(`.tl-delivery-item[data-docid="${newDocId}"]`)
                        .forEach(c => c.classList.add('tl-item-selected'));
                }, 30);
            }

        // ══════════════════════════════════════════════════════════════
        //  부속(Part) 드래그 이동 — ORDER 공정카드 이동과 별개 레이어
        //  토글 열린 상태에서 개별 부속 행을 드래그 → 날짜 이동
        // ══════════════════════════════════════════════════════════════

            let _partDrag = null;

            // 부속의 특정 공정 유효 날짜 조회
            // ── partMoveLog 헬퍼 ─────────────────────────────────────────────────
            // ORDER 공정 기준일 (partMoveLog에서 null 값이 의미하는 날짜)
            function getOrderProcDate(item, procKey) {
                return procKey === '납기' ? item.deliveryDate : item.procOverrides?.[procKey];
            }

            // partMoveLog[cardKey] 배치 배열에서 procKey의 대표 날짜 (최솟값, 없으면 ORDER 기준일)
            function getPartProcDate(item, cardKey, procKey) {
                const batches = item.partMoveLog?.[cardKey];
                const orderDate = getOrderProcDate(item, procKey);
                if (!Array.isArray(batches) || batches.length === 0) return orderDate;
                // 각 배치의 procKey 날짜 중 최솟값 (null → orderDate 로 대체)
                return batches.reduce((minD, b) => {
                    const d = b[procKey] || orderDate;
                    return (d && (!minD || d < minD)) ? d : minD;
                }, null) || orderDate;
            }

            // 부속 카드의 실제 공정 존재 여부 반환 (calcProcessTime 기반)
            function _getPartHas(item, cardKey) {
                const result = { 재단: true, 엣지: true, 보링: true, NC: true };
                if (!currentFullData || currentFullData.length < 2) return result;
                const rowIdx = parseInt(cardKey.split('-').pop());
                const partRow = currentFullData[rowIdx];
                if (!partRow) return result;
                const ph = currentFullData[0];
                const unitCons = parseFloat(partRow[ph.indexOf("세트별소모량")]) || 1;
                const partT = calcProcessTime(partRow, unitCons * (item.orderQty || 1), {}, ph);
                return {
                    재단: (partT.재단 ?? 0) > 0,
                    엣지: (partT.엣지 ?? 0) > 0,
                    보링: (partT.보링 ?? 0) > 0,
                    NC:   (partT.NC   ?? 0) > 0,
                };
            }

            // 부속 드래그 미래 벽 (ORDER 납기가 아닌 해당 부속의 납기 기준)
            // currentDate: 드래그 출발 날짜 (null이면 원공정일 위치에서 드래그)
            function _getDragFutureWallForPart(item, cardKey, procKey, currentDate) {
                if (procKey === '납기') return null;
                const isInactive = dt => {
                    if (!dt) return false;
                    const dow = new Date(dt + 'T00:00:00').getDay();
                    return (dow === 0 || dow === 6) && !(TL.activatedWeekendDates && TL.activatedWeekendDates.has(dt));
                };
                // 출발 배치 찾기 (currentDate === orderDate → 암묵 잔여 → sourceBatch = null)
                const procOrderDate = getOrderProcDate(item, procKey);
                const batches = item.partMoveLog?.[cardKey] || [];
                const isFromOrderDate = !currentDate || currentDate === procOrderDate;
                const sourceBatch = isFromOrderDate ? null : batches.find(b => b[procKey] === currentDate) || null;

                // 배치 내 특정 공정 날짜 — 배치에 upKey 없을 때 하위공정 체인으로 대체
                // (기본카드 clamped 값 대신 배치 내 하위공정 날짜를 미래 벽으로 사용)
                const downstreamChain = {
                    '엣지': ['보링', '납기'],
                    'NC':   ['납기'],
                    '보링': ['납기'],
                    '납기': [],
                };
                const getBatchDate = (upKey) => {
                    const chain = downstreamChain[upKey] || [];
                    if (sourceBatch) {
                        if (sourceBatch[upKey]) return sourceBatch[upKey];
                        // 배치에 upKey 없으면 하위공정 날짜로 대체 (clamped 기본값 차단)
                        for (const dk of chain) {
                            if (sourceBatch[dk]) return sourceBatch[dk];
                        }
                        return getOrderProcDate(item, upKey);
                    }
                    // isFromOrderDate = true: 모든 배치의 최대 하위공정 날짜 vs 기본값 중 큰 값
                    const basicDate = getOrderProcDate(item, upKey) || '';
                    let maxDate = basicDate;
                    for (const b of batches) {
                        if (b[upKey] && b[upKey] > maxDate) maxDate = b[upKey];
                        for (const dk of chain) {
                            if (b[dk] && b[dk] > maxDate) { maxDate = b[dk]; break; }
                        }
                    }
                    return maxDate || undefined;
                };

                // 해당 부속에 실제 존재하는 공정만 제약으로 사용
                const partHas = _getPartHas(item, cardKey);
                if (procKey === '보링') return getBatchDate('납기');
                if (procKey === 'NC')   return getBatchDate('납기');
                if (procKey === '엣지') return partHas.보링 ? getBatchDate('보링') : getBatchDate('납기');
                if (procKey === '재단') {
                    const e = partHas.엣지 ? getBatchDate('엣지') : null;
                    const n = partHas.NC   ? getBatchDate('NC')   : null;
                    const eOk = e && !isInactive(e);
                    const nOk = n && !isInactive(n);
                    if (eOk && nOk) return e < n ? e : n;
                    if (eOk) return e;
                    if (nOk) return n;
                    return getBatchDate('납기');
                }
                return getBatchDate('납기');
            }

            // ── 배치 내 공정 순서 제약 강제 적용 ────────────────────────────────
            // 재단 ≤ min(엣지, NC) ≤ 보링 ≤ 납기 — 위반 시 배치 내 날짜 클램핑
            function enforceConstraints(batch, item, cardKey) {
                // 해당 부속에 실제 존재하는 공정만 제약으로 사용
                const partHas = cardKey ? _getPartHas(item, cardKey) : { 재단: true, 엣지: true, 보링: true, NC: true };
                const get = pk => batch[pk] || getOrderProcDate(item, pk);
                const set = (pk, d) => {
                    const od = getOrderProcDate(item, pk);
                    batch[pk] = (d && d !== od) ? d : null;
                };
                const 납기 = get('납기');
                let 보링  = partHas.보링 ? get('보링') : null;
                let 엣지  = partHas.엣지 ? get('엣지') : null;
                let NC    = partHas.NC   ? get('NC')   : null;
                let 재단  = partHas.재단 ? get('재단') : null;
                if (납기 && 보링 && 보링 > 납기) { 보링 = 납기; set('보링', 보링); }
                // 엣지 상한: 보링 있으면 보링, 없으면 납기
                const 엣지상한 = 보링 || 납기;
                if (엣지상한 && 엣지 && 엣지 > 엣지상한) { 엣지 = 엣지상한; set('엣지', 엣지); }
                if (납기 && NC   && NC   > 납기) { NC   = 납기; set('NC',   NC);   }
                const wall = (엣지 && NC) ? (엣지 < NC ? 엣지 : NC) : (엣지 || NC || 납기);
                if (wall && 재단 && 재단 > wall) set('재단', wall);
            }

            // ── 부속 이동 로직 — partMoveLog 배치 기반 ───────────────────────────
            // 각 배치 = 동일 그룹 부속의 전체 공정 날짜를 독립 관리
            // currentDate: 드래그 출발 날짜 (procKey 기준)
            function applyPartMove(item, cardKey, procKey, finalDate, movedQty, totalQty, currentDate) {
                if (!item.partMoveLog)          item.partMoveLog = {};
                if (!item.partMoveLog[cardKey]) item.partMoveLog[cardKey] = [];
                const log = item.partMoveLog[cardKey];

                const procOD = getOrderProcDate(item, procKey);
                const isFromOrderDate = !currentDate || currentDate === procOD;

                if (isFromOrderDate) {
                    // ── 암묵 잔여(원공정일)에서 드래그 → 새 배치 생성 ──────────
                    // 먼저 배치에서 procKey = null (원공정일 위치) 인 배치 찾기
                    const nullBatch = log.find(b => !b[procKey] || b[procKey] === procOD);
                    if (nullBatch && nullBatch.qty > movedQty) {
                        // 기존 null 배치를 분할: 나머지는 남기고 movedQty만 별도 배치로
                        nullBatch.qty -= movedQty;
                        const newBatch = { ...nullBatch, qty: movedQty };
                        newBatch[procKey] = (finalDate !== procOD) ? finalDate : null;
                        enforceConstraints(newBatch, item, cardKey);
                        log.push(newBatch);
                    } else if (nullBatch && nullBatch.qty === movedQty) {
                        // 통째 이동
                        nullBatch[procKey] = (finalDate !== procOD) ? finalDate : null;
                        enforceConstraints(nullBatch, item, cardKey);
                    } else {
                        // 완전 암묵 잔여에서 새 배치 생성 (다른 공정은 모두 원공정일)
                        const newBatch = { qty: movedQty };
                        newBatch[procKey] = (finalDate !== procOD) ? finalDate : null;
                        enforceConstraints(newBatch, item, cardKey);
                        log.push(newBatch);
                    }
                } else {
                    // ── 명시적 배치(비원공정일)에서 드래그 ───────────────────────
                    const srcIdx = log.findIndex(b => b[procKey] === currentDate && b.qty > 0);
                    if (srcIdx === -1) return; // 해당 배치 없음
                    const src = log[srcIdx];

                    if (movedQty >= src.qty) {
                        // 배치 전체 이동
                        src[procKey] = (finalDate !== procOD) ? finalDate : null;
                        enforceConstraints(src, item, cardKey);
                    } else {
                        // 배치 분할
                        src.qty -= movedQty;
                        const newBatch = { ...src, qty: movedQty };
                        newBatch[procKey] = (finalDate !== procOD) ? finalDate : null;
                        enforceConstraints(newBatch, item, cardKey);
                        log.push(newBatch);
                    }
                }

                // 정리: 모든 공정이 null(원공정일)이거나 qty=0인 배치 제거
                const PROC_KEYS = ['재단', '엣지', 'NC', '보링', '납기'];
                item.partMoveLog[cardKey] = log.filter(b =>
                    b.qty > 0 && PROC_KEYS.some(pk => b[pk] && b[pk] !== getOrderProcDate(item, pk))
                );
                if (item.partMoveLog[cardKey].length === 0) delete item.partMoveLog[cardKey];
                if (Object.keys(item.partMoveLog).length === 0) delete item.partMoveLog;
            }

            // 이동 수량 입력 팝업 (동적 생성)
            (function() {
                const modal = document.createElement('div');
                modal.id = 'part-qty-modal';
                modal.style.cssText = 'display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.35);align-items:center;justify-content:center;';
                modal.innerHTML = `
                    <div style="background:#fff;border-radius:12px;padding:20px;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.2);">
                        <div style="font-size:13px;font-weight:700;color:#37352f;margin-bottom:8px;">이동 수량 입력</div>
                        <div style="font-size:11px;color:#787774;margin-bottom:8px;">최대 <span id="part-qty-max"></span>EA 이동 가능</div>
                        <input id="part-qty-input" type="number" min="1" style="width:100%;border:1.5px solid #ededeb;border-radius:8px;padding:8px 10px;font-size:13px;font-weight:700;outline:none;box-sizing:border-box;"/>
                        <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
                            <button id="part-qty-cancel"  style="padding:6px 14px;border:1px solid #ededeb;border-radius:6px;font-size:11px;font-weight:700;background:#f7f6f3;color:#37352f;cursor:pointer;">취소</button>
                            <button id="part-qty-confirm" style="padding:6px 14px;border:none;border-radius:6px;font-size:11px;font-weight:700;background:#b0aeaa;color:#fff;cursor:pointer;">이동</button>
                        </div>
                    </div>`;
                document.addEventListener('DOMContentLoaded', () => document.body.appendChild(modal));
            })();

            function showPartQtyPopup(maxQty, callback) {
                const modal      = document.getElementById('part-qty-modal');
                const maxEl      = document.getElementById('part-qty-max');
                const input      = document.getElementById('part-qty-input');
                const cancelBtn  = document.getElementById('part-qty-cancel');
                const confirmBtn = document.getElementById('part-qty-confirm');
                maxEl.textContent = maxQty;
                input.max   = maxQty;
                input.value = maxQty;
                modal.style.display = 'flex';
                setTimeout(() => { input.focus(); input.select(); }, 50);
                const cleanup = () => { modal.style.display = 'none'; };
                cancelBtn.onclick  = () => { cleanup(); callback(null); };
                confirmBtn.onclick = () => {
                    const qty = parseInt(input.value) || 0;
                    if (qty <= 0 || qty > maxQty) {
                        input.style.borderColor = '#b0aeaa';
                        setTimeout(() => { input.style.borderColor = '#ededeb'; }, 600);
                        return;
                    }
                    cleanup(); callback(qty);
                };
                input.onkeydown = e => {
                    if (e.key === 'Enter')  confirmBtn.click();
                    if (e.key === 'Escape') cancelBtn.click();
                };
            }

            // ── 부속 드래그 터치 래퍼 ──
            function _onPartDragMoveTouch(e) { e.preventDefault(); _onPartDragMove(e); }
            function _onPartDragEndTouch(e)  { _onPartDragEnd(e); }

            // 부속 행 드래그 시작
            window.tlPartDragStart = function(e, partEl) {
                if (e.type !== 'touchstart' && e.button !== 0) return;
                if (partEl.dataset.done === '1') return;

                // 이동모드 체크: 패널이 열린 ORDER card가 tl-item-selected 여야 함
                const openOrderItem = document.querySelector('.tl-delivery-item[data-tl-open="1"]');
                const isInPanel     = !!partEl.closest('#tl-parts-panel');
                if (isInPanel && (!openOrderItem || !openOrderItem.classList.contains('tl-item-selected'))) return;

                const docId    = partEl.dataset.docid;
                const procKey  = partEl.dataset.proc;
                const cardKey  = partEl.dataset.cardkey;
                const totalQty = parseInt(partEl.dataset.totalqty) || 1;
                const partName = partEl.dataset.partname;
                if (!docId || !procKey || !cardKey) return;

                // confirmedOrders에서 item 찾기 (docId = Firebase 문서 ID로 유일 식별)
                const item = confirmedOrders.find(o => o.docId === docId);
                if (!item) return;

                e.preventDefault();
                e.stopPropagation();
                window._tlPartDragMoved = false;

                // 드래그 시작 시 축소된 날짜카드 즉시 복원 → 모든 날짜를 드롭 대상으로 허용
                if (_tlCollapsed.length > 0) {
                    _tlCollapsed.forEach(({ wrapEl, placeholder }) => {
                        if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                        gsap.killTweensOf(wrapEl);
                        wrapEl.style.display = '';
                        gsap.set(wrapEl, { minWidth: TL.CARD_W, maxWidth: TL.CARD_W, opacity: 1 });
                    });
                    _tlCollapsed = [];
                }

                // 현재 날짜 결정
                // standalone 부속카드(data-batchdate) → 배치 날짜 우선
                let currentDate = partEl.dataset.batchdate || null;
                if (!currentDate && isInPanel && openOrderItem) {
                    currentDate = openOrderItem.closest('[data-card-date]')?.dataset.cardDate;
                }
                if (!currentDate) currentDate = getPartProcDate(item, cardKey, procKey);

                // 고스트
                const ghost = document.createElement('div');
                ghost.id = 'tl-drag-ghost';
                ghost.textContent = `${procKey} · [${partName}] ${item.displayName}`;
                const _sc2 = _getTouchCoords(e);
                ghost.style.left = _sc2.clientX + 12 + 'px';
                ghost.style.top  = _sc2.clientY - 10 + 'px';
                document.body.appendChild(ghost);

                partEl.style.opacity = '0.35';

                _partDrag = { docId, procKey, cardKey, item, partEl, currentDate, ghost, totalQty, partName, hoveredDate: currentDate };

                window.addEventListener('mousemove',  _onPartDragMove);
                window.addEventListener('mouseup',    _onPartDragEnd);
                window.addEventListener('touchmove',  _onPartDragMoveTouch, { passive: false });
                window.addEventListener('touchend',   _onPartDragEndTouch);
            };

            function _onPartDragMove(e) {
                if (!_partDrag) return;
                const _c2 = _getTouchCoords(e);
                window._tlPartDragMoved = true;
                _partDrag.ghost.style.left = _c2.clientX + 12 + 'px';
                _partDrag.ghost.style.top  = _c2.clientY - 10 + 'px';

                _partDrag.ghost.style.display = 'none';
                const el = document.elementFromPoint(_c2.clientX, _c2.clientY);
                _partDrag.ghost.style.display = '';

                document.querySelectorAll('.tl-drop-target').forEach(s => s.classList.remove('tl-drop-target'));
                _partDrag.hoveredDate = null;
                if (!el) return;

                const dateCardEl  = el.closest('[data-card-date]');
                if (!dateCardEl) return;
                const sectionDate = dateCardEl.dataset.cardDate;

                // 하한 체크
                const od         = batchDateStr(_partDrag.item);
                const todayStr   = (() => { const d = new Date(Date.now() + 9*60*60*1000); return d.toISOString().slice(0,10); })();
                const lowerBound = (od && od > todayStr) ? od : todayStr;
                if (sectionDate < lowerBound) return;

                // 미래 벽 체크 (출발날짜 전달 → 배치별 wall 계산)
                const futureWall = _getDragFutureWallForPart(_partDrag.item, _partDrag.cardKey, _partDrag.procKey, _partDrag.currentDate);
                if (futureWall && sectionDate > futureWall) return;

                const section = dateCardEl.querySelector(`.tl-process-section[data-process="${_partDrag.procKey}"]`);
                if (!section) return;

                _partDrag.hoveredDate = sectionDate;
                section.classList.add('tl-drop-target');
            }

            function _onPartDragEnd(e) {
                if (!_partDrag) return;
                window.removeEventListener('mousemove',  _onPartDragMove);
                window.removeEventListener('mouseup',    _onPartDragEnd);
                window.removeEventListener('touchmove',  _onPartDragMoveTouch);
                window.removeEventListener('touchend',   _onPartDragEndTouch);
                setTimeout(() => { window._tlPartDragMoved = false; }, 0);

                if (_partDrag.ghost.parentNode) _partDrag.ghost.parentNode.removeChild(_partDrag.ghost);
                _partDrag.partEl.style.opacity = '';
                document.querySelectorAll('.tl-drop-target').forEach(s => s.classList.remove('tl-drop-target'));

                const targetDate = _partDrag.hoveredDate;
                const { item, procKey, cardKey, currentDate, totalQty, partName } = _partDrag;
                _partDrag = null;

                if (!targetDate || targetDate === currentDate) return;

                // 하한/미래 벽 재검사
                const orderDate  = batchDateStr(item);
                const todayStr   = (() => { const d = new Date(Date.now() + 9*60*60*1000); return d.toISOString().slice(0,10); })();
                const lowerBound = (orderDate && orderDate > todayStr) ? orderDate : todayStr;
                if (targetDate < lowerBound) return;
                const futureWall = _getDragFutureWallForPart(item, cardKey, procKey, currentDate);
                if (futureWall && targetDate > futureWall) return;

                const finalDate = toValidDate(targetDate);

                // ── 가용 수량 계산 (partMoveLog 기반) ──────────────────────────
                const procOD   = getOrderProcDate(item, procKey);
                const batches  = item.partMoveLog?.[cardKey] || [];
                let availableQty;
                if (!currentDate || currentDate === procOD) {
                    // 원공정일 위치에서 드래그 → 전체 qty - 명시 배치 합산
                    const movedSum = batches.reduce((s, b) => {
                        const d = b[procKey]; return s + (d && d !== procOD ? b.qty : 0);
                    }, 0);
                    availableQty = Math.max(0, totalQty - movedSum);

                    // ── 이후 공정 이동수량 상한 적용 ───────────────────────────
                    // 이후 공정이 N개 이동된 경우, 이전 공정 이동 가능 수량을 N개로 제한
                    // (이미 이동된 이전 공정 수량은 제외)
                    const partHas = _getPartHas(item, cardKey);
                    let dsKey = null;
                    if      (procKey === '재단') dsKey = partHas.엣지 ? '엣지' : (partHas.NC ? 'NC' : null);
                    else if (procKey === '엣지') dsKey = partHas.보링 ? '보링' : null;
                    if (dsKey) {
                        const dsOD = getOrderProcDate(item, dsKey);
                        const dsMovedSum = batches.reduce((s, b) => {
                            const d = b[dsKey]; return s + (d && d !== dsOD ? b.qty : 0);
                        }, 0);
                        if (dsMovedSum > 0) {
                            const usMovedSum = batches.reduce((s, b) => {
                                const d = b[procKey]; return s + (d && d !== procOD ? b.qty : 0);
                            }, 0);
                            availableQty = Math.min(availableQty, Math.max(0, dsMovedSum - usMovedSum));
                        }
                    }
                } else {
                    // 명시 배치에서 드래그 → 해당 배치 qty
                    const srcBatch = batches.find(b => b[procKey] === currentDate);
                    availableQty = srcBatch ? srcBatch.qty : 0;
                }
                if (availableQty <= 0) return;

                // 수량 팝업
                showPartQtyPopup(availableQty, movedQty => {
                    if (!movedQty) return;

                    applyPartMove(item, cardKey, procKey, finalDate, movedQty, totalQty, currentDate);

                    // Firebase 저장 (partMoveLog 필드)
                    if (item.docId) {
                        const { doc, updateDoc } = window.fbFirestore;
                        const docRef = doc(window.db, 'artifacts', 'vivivic-4b7ef', 'public', 'data', 'confirmed_orders', item.docId);
                        const saveVal = item.partMoveLog && Object.keys(item.partMoveLog).length > 0 ? item.partMoveLog : null;
                        updateDoc(docRef, { partMoveLog: saveVal })
                            .catch(err => console.error('[partMoveLog 저장 실패]', err));
                    }

                    // 토글 패널 닫기 — refreshCards() 후 data-tl-open 항목이 사라져
                    // openOrderItem=null로 재이동 drag가 차단되는 버그 방지
                    const _afterMovePanel = document.getElementById('tl-parts-panel');
                    if (_afterMovePanel) { _afterMovePanel.style.display = 'none'; _afterMovePanel.innerHTML = ''; }
                    document.querySelectorAll('.tl-delivery-item[data-tl-open="1"]').forEach(el => {
                        el.dataset.tlOpen = '0';
                        const _a = el.querySelector('.tl-arrow');
                        if (_a) _a.textContent = '▶';
                    });

                    TL.refreshCards();
                    // 이동 후에도 이동모드 유지 — refreshCards 후 선택 클래스 재적용 (docId 기준)
                    const _keepDocId = _tlFlowIdNum;   // _tlFlowIdNum에는 docId가 저장됨
                    setTimeout(() => {
                        document.querySelectorAll(`.tl-delivery-item[data-docid="${_keepDocId}"]`)
                            .forEach(c => c.classList.add('tl-item-selected'));
                    }, 30);
                });
            }

        })();

        function tlSyncPanelPosition() {
            const panel = document.getElementById('tl-parts-panel');
            if (!panel || panel.style.display === 'none') return;
            const openItem = document.querySelector('.tl-delivery-item[data-tl-open="1"]');
            if (!openItem) { panel.style.display = 'none'; return; }

            const cardEl     = openItem.closest('[data-card-date]');
            const anchorRect = (cardEl || openItem).getBoundingClientRect();
            const itemRect   = openItem.getBoundingClientRect();

            // 날짜카드가 뷰포트 밖으로 나가면 패널 숨김
            const wrap = document.getElementById('tl-infinite-wrap');
            if (wrap) {
                const wrapRect = wrap.getBoundingClientRect();
                if (anchorRect.right < wrapRect.left || anchorRect.left > wrapRect.right) {
                    panel.style.display = 'none';
                    return;
                }
            }

            panel.style.left = anchorRect.left + 'px';
            const spaceBelow = window.innerHeight - itemRect.bottom - 4;
            const spaceAbove = itemRect.top - 4;
            if (panel.dataset.tlDir === 'up') {
                panel.style.bottom = (window.innerHeight - itemRect.top + 2) + 'px';
            } else {
                panel.style.top = (itemRect.bottom + 2) + 'px';
            }
        }

        // ── 납기 상품 토글 — body에 패널을 이동시켜 모든 overflow 제약 탈출 ─
        (function() {
            // 공유 패널 1개를 body에 미리 생성
            const panel = document.createElement('div');
            panel.id = 'tl-parts-panel';
            panel.style.cssText = 'display:none;position:fixed;z-index:9999;background:#fff;border:1px solid #ededeb;border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,0.15);min-width:160px;max-width:220px;max-height:280px;overflow-y:auto;padding:4px 0;';
            document.addEventListener('DOMContentLoaded', () => document.body.appendChild(panel));

            // 납기 카드 헤더 클릭: 이동모드이거나 더블클릭이면 무시,
            // 그 외에는 드롭다운 패널 토글 (dblclick 확인 위해 300ms 지연)
            window._tlDblClickTs = 0;
            window.tlDeliveryCardClick = function(e, itemEl) {
                e.stopPropagation();
                // 드래그가 발생했으면 클릭으로 처리하지 않음
                if (window._tlDragMoved) return;
                // 300ms 후 dblclick 여부 확인 후 드롭다운 열기
                const clickTs = Date.now();
                setTimeout(() => {
                    // dblclick이 발생했으면 (_tlDblClickTs가 click 이후 갱신됨) 무시
                    if (window._tlDblClickTs >= clickTs) return;
                    tlToggleDeliveryParts(itemEl);
                }, 300);
            };

            window.tlToggleDeliveryParts = function(itemEl) {
                const isOpen = itemEl.dataset.tlOpen === '1';

                // 이미 열린 항목 닫기
                document.querySelectorAll('.tl-delivery-item[data-tl-open="1"]').forEach(el => {
                    el.dataset.tlOpen = '0';
                    const a = el.querySelector('.tl-arrow');
                    if (a) a.textContent = '▶';
                });
                panel.style.display = 'none';
                panel.innerHTML = '';

                if (!isOpen) {
                    // 부속 목록 HTML을 패널에 복사
                    const src = itemEl.querySelector('.tl-delivery-parts');
                    if (!src) return;
                    panel.innerHTML = src.innerHTML;

                    // 날짜카드 기준으로 너비·위치 계산 (다른 날짜카드 침범 방지)
                    const cardEl     = itemEl.closest('[data-card-date]');
                    const anchorRect = (cardEl || itemEl).getBoundingClientRect();
                    const itemRect   = itemEl.getBoundingClientRect();
                    const panelW     = Math.round(anchorRect.width);
                    const spaceBelow = window.innerHeight - itemRect.bottom - 4;
                    const spaceAbove = itemRect.top - 4;

                    panel.style.width    = panelW + 'px';
                    panel.style.minWidth = panelW + 'px';
                    panel.style.maxWidth = panelW + 'px';
                    panel.style.left     = anchorRect.left + 'px';
                    panel.style.display  = 'block';

                    if (spaceBelow >= 80 || spaceBelow >= spaceAbove) {
                        panel.dataset.tlDir   = 'down';
                        panel.style.top       = (itemRect.bottom + 2) + 'px';
                        panel.style.bottom    = 'auto';
                        panel.style.maxHeight = Math.min(280, Math.max(60, spaceBelow)) + 'px';
                    } else {
                        panel.dataset.tlDir   = 'up';
                        panel.style.top       = 'auto';
                        panel.style.bottom    = (window.innerHeight - itemRect.top + 2) + 'px';
                        panel.style.maxHeight = Math.min(280, Math.max(60, spaceAbove)) + 'px';
                    }

                    itemEl.dataset.tlOpen = '1';
                    const a = itemEl.querySelector('.tl-arrow');
                    if (a) a.textContent = '▼';
                }
            };

            // 외부 클릭 시 패널 닫기 (발주 버튼 포함)
            document.addEventListener('click', function(e) {
                const panel = document.getElementById('tl-parts-panel');
                if (!panel) return;
                if (!e.target.closest('.tl-delivery-item') && !e.target.closest('.tl-order-btn') && !e.target.closest('#tl-parts-panel')) {
                    panel.style.display = 'none';
                    document.querySelectorAll('.tl-delivery-item[data-tl-open="1"]').forEach(el => {
                        el.dataset.tlOpen = '0';
                        const a = el.querySelector('.tl-arrow');
                        if (a) a.textContent = '▶';
                    });
                    document.querySelectorAll('.tl-order-btn[data-tl-open="1"]').forEach(b => {
                        b.dataset.tlOpen = '0';
                        b.style.background = '#37352f';
                    });
                }

            // spot-tip: hover 시 fixed 좌표 동적 계산
            document.addEventListener('mouseover', function(e) {
                const wrap = e.target.closest('.tl-spot-wrap');
                if (!wrap) return;
                const tip = wrap.querySelector('.tl-spot-tip');
                if (!tip) return;
                const r = wrap.getBoundingClientRect();
                tip.style.left      = (r.left + r.width / 2) + 'px';
                tip.style.top       = (r.top - 6) + 'px';
                tip.style.transform = 'translate(-50%, -100%)';
            });
        })();

        // ── 날짜카드 1장 HTML 생성 (무한스크롤 엔진에서 호출) ──────────────

        // ── 휴일 카드 활성화 ─────────────────────────────────────────────────
        // ── 휴일 카드 닫기 (작업불러오기 해제 후 닫음) ──────────────────────
        // ── 작업불러오기: 납기 로직상 이 날짜에 배정됐어야 할 공정을 강제 이동 ─

        // ── 작업불러오기 해제: 스냅샷으로 복원 ─────────────────────────────

        // SortableJS onEnd 공통 핸들러

        // renderProcessTimeline: 타임라인 섹션 표시/숨김 + TL 엔진 초기화/갱신
        function renderProcessTimeline() {
            const cards = confirmedOrders.filter(o => o.amtTimeline === true && o.amtRegistered !== true && !o.amtConfirmedCancel);
            const section = document.getElementById('order-timeline-section');
            const tlVisible = appMode === 'order' || appMode === 'process';
            // 탭이 맞을 때는 항상 섹션 표시 (빈 상태 안내 포함)
            if (section) section.style.display = tlVisible ? 'block' : 'none';
            if (!tlVisible) return;
            // 데이터 없으면 빈 상태 안내 표시
            const container = document.getElementById('process-timeline-container');
            if (!container) return;
            if (cards.length === 0) {
                container.innerHTML = '<div style="padding:40px 16px;text-align:center;font-size:13px;font-weight:700;color:#b0aeaa;font-style:italic;">발주서 탭에서 항목을 선택 후<br>타임라인 등록 버튼을 눌러주세요.</div>';
                return;
            }

            // 첫 초기화 or 리셋
            if (TL.renderedDates.length === 0) {
                TL.init();
            } else {
                // 데이터 변경 시 카드 내용만 갱신
                TL.refreshCards();
            }
        }

        // 타임라인 발주일 → 발주서 팝업

        // + 1일 추가 버튼
        // ===== /공정 일정 타임라인 =====

        // 공정별 독립 난이도 업데이트: processKey = '재단'|'엣지'|'보링'|'NC'
        function updateProcessDifficulty(idNum, cardKey, processKey, val) {
            const card = processCards[idNum];
            if (!card) return;
            if (!card.processData[cardKey]) card.processData[cardKey] = {};
            if (!card.processData[cardKey].difficulties) card.processData[cardKey].difficulties = { 재단:1, 엣지:1, 보링:1, NC:1 };
            card.processData[cardKey].difficulties[processKey] = parseInt(val) || 1;
            renderProcessCards();
        }

        function updateProcessQty(idNum, val) {
            const card = processCards[idNum];
            if (!card) return;
            // 발주수량(완성품 세트수) 변경 → 부속 세트수량은 renderProcessCards에서 unitCons×qty로 자동 계산
            card.qty = Math.max(1, parseInt(val) || 1);
            renderProcessCards();
        }

        function removeProcessCard(idNum) {
            delete processCards[idNum];
            renderProcessCards();
        }

        function clearProcessCards() {
            processCards = {};
            timelineExtraDates = [];   // 추가 날짜도 초기화
            renderProcessCards();
