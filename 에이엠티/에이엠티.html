                const reason = document.querySelector('input[name="_pdReason"]:checked')?.value;
                if (!reason) { showToastMessage('수량 변경 사유를 선택해주세요.'); return; }
                document.getElementById('_partDoneModal').remove();
                tlMarkPartDone(d.docId, d.cardKey, d.procKey, d.date, d.btn, d.partName, actualQty, reason);
            } else {
                document.getElementById('_partDoneModal').remove();
                // 수량 변경 없으면 actualQty 저장 안 함 → 이전 공정 changedBy 유지
                tlMarkPartDone(d.docId, d.cardKey, d.procKey, d.date, d.btn, d.partName, null, null);
            }
            window._pdConfirmData = null;
        };

        window.tlMarkPartDone = async function(docId, cardKey, procKey, doneDate, btn, partName, actualQty, reason) {
            if (!docId) return;
            const { doc, updateDoc } = window.fbFirestore;
            const appId = "vivivic-4b7ef";
            try {
                if (btn) { btn.disabled = true; btn.textContent = '...'; }
                // ── 시작 여부 검증 ──
                const _ord = confirmedOrders.find(o => (o.docId || String(o.idNum)) === docId);
                if (!_ord?.partStarted?.[cardKey]?.[procKey]) {
                    showToastMessage('▶ 시작 후 완료할 수 있습니다.');
                    if (btn) { btn.disabled = false; btn.textContent = '완료'; }
                    return;
                }
                const _startMs = _ord?.partStarted?.[cardKey]?.[procKey]?.startMs;
                const actualMinutes = _startMs ? Math.round((Date.now() - _startMs) / 6000) / 10 : null;
                const docRef = doc(window.db, 'artifacts', appId, 'public', 'data', 'confirmed_orders', docId);
                await updateDoc(docRef, {
                    [`partCompletions.${cardKey}.${procKey}`]: {
                        done: true,
                        date: doneDate || new Date().toISOString().slice(0, 10),
                        partName: partName || '',
                        ...(actualMinutes != null ? { actualMinutes } : {}),
                        ...(actualQty    != null ? { actualQty }    : {}),
                        ...(reason               ? { reason }       : {})
                    }
                });
                // DOM 즉시 업데이트 (onSnapshot 수신 전 시각적 피드백)
                const card = btn?.closest('.wo-boring-placed-card, .wo-boring-part-card, .tl-delivery-item');
                if (card) {
                    card.style.opacity = '0.6';
                    card.setAttribute('draggable', 'false');
                    card.dataset.done = '1';
                    card.removeAttribute('ondragstart');

                    const btnWrap = btn.parentElement;
                    const _diffTxt = actualMinutes != null
                        ? ` <span style="font-size:8px;color:#60a5fa;">(실${actualMinutes.toFixed(1)}분)</span>` : '';
                    if (btnWrap) btnWrap.innerHTML = `<span style="font-size:9px;font-weight:900;color:#22c55e;">✓ 완료</span>${_diffTxt}`;
                }
                // ── 보드 즉시 재렌더 (스케줄 당기기) ──
                const _sk = (doneDate || new Date().toISOString().slice(0, 10)) + '-' + procKey;
                requestAnimationFrame(() => {
                    if (typeof _woRenderBoard === 'function') _woRenderBoard(_sk);
                    if (typeof _woRenderPool  === 'function') _woRenderPool(_sk);
                });
                const _diffMsg = actualMinutes != null ? ` (실제 ${actualMinutes.toFixed(1)}분)` : '';
                showToastMessage(`[${procKey}] 완료 처리됐습니다.${_diffMsg}`);
            } catch (err) {
                console.error('완료 처리 실패:', err);
                showToastMessage('완료 처리 실패');
                if (btn) { btn.disabled = false; btn.textContent = '완료'; }

        // 오늘로 이동 버튼
        function tlScrollToToday() {
            const today = toLocalDateStr(new Date());
            if (!TL.renderedDates.includes(today)) {
                TL.centerDate = today;
                TL.renderedDates = [];
                document.getElementById('process-timeline-container').innerHTML = '';

        // 패널 위치를 열린 tl-delivery-item 기준으로 실시간 동기화 (스크롤/드래그 추적)
        // 발주 버튼 클릭 → body 공유 패널에 해당 배치 상품 목록 표시
        window.tlToggleOrderPanel = function(btnEl) {
            const panel = document.getElementById('tl-parts-panel');
            if (!panel) return;

            const batchId = btnEl.dataset.batch;
            const isOpen  = btnEl.dataset.tlOpen === '1';

            // 모든 발주 버튼 닫기
            document.querySelectorAll('.tl-order-btn[data-tl-open="1"]').forEach(b => {
                b.dataset.tlOpen = '0';
                b.style.background = '#b0aeaa';
            });
            panel.style.display = 'none';
            panel.innerHTML = '';

            if (!isOpen) {
                // 숨겨진 패널 src에서 HTML 복사
                const src = document.getElementById(`tl-order-panel-${batchId}`);
                if (!src) return;
                panel.innerHTML = src.innerHTML;

                const cardEl     = btnEl.closest('[data-card-date]');
                const anchorRect = (cardEl || btnEl).getBoundingClientRect();
                const btnRect    = btnEl.getBoundingClientRect();
                const panelW     = Math.round(anchorRect.width);
                const spaceBelow = window.innerHeight - btnRect.bottom - 4;
                const spaceAbove = btnRect.top - 4;

                panel.style.width    = panelW + 'px';
                panel.style.minWidth = panelW + 'px';
                panel.style.maxWidth = panelW + 'px';
                panel.style.left     = anchorRect.left + 'px';
                panel.style.display  = 'block';

                if (spaceBelow >= 80 || spaceBelow >= spaceAbove) {
                    panel.dataset.tlDir = 'down';
                    panel.style.top     = (btnRect.bottom + 2) + 'px';
                    panel.style.bottom  = 'auto';
                    panel.style.maxHeight = Math.min(320, Math.max(60, spaceBelow)) + 'px';
                } else {
                    panel.dataset.tlDir = 'up';
                    panel.style.top     = 'auto';
                    panel.style.bottom  = (window.innerHeight - btnRect.top + 2) + 'px';
                    panel.style.maxHeight = Math.min(320, Math.max(60, spaceAbove)) + 'px';
                }

                btnEl.dataset.tlOpen  = '1';
                btnEl.style.background = '#787774';
            }
        };

        // ── 공정 흐름 뷰 (더블클릭) ─────────────────────────────────────────
        // 선택된 idNum의 모든 카드를 강조하고, 관련 없는 중간 날짜카드를 접어서 한 화면에 표시
        // 같은 카드 더블클릭 → 해제 (원상복구)

        let _tlFlowActive = false;   // 현재 흐름 뷰 활성 여부
        let _tlFlowIdNum  = null;    // 현재 선택된 docId (Firebase 문서 ID)
        let _tlCollapsed  = [];      // 접힌 [{ wrapEl, dateStr, dayCount }] 목록

        function _tlRestoreCollapsed() {
            _tlCollapsed.forEach(({ wrapEl, placeholder }) => {
                // placeholder 제거
                if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                // 카드 원상복구
                gsap.to(wrapEl, {
                    minWidth: TL.CARD_W, maxWidth: TL.CARD_W, opacity: 1,
                    duration: 0.28, ease: 'power2.inOut',
                    onComplete() { wrapEl.style.display = ''; }
                });
            });
            _tlCollapsed = [];
        }

        function _tlCollapseMiddleDates(relatedDates) {
            // relatedDates: 관련 날짜 배열 (오름차순 정렬됨)
            if (relatedDates.length < 2) return;

            const track = document.getElementById('tl-infinite-track');
            if (!track) return;

            const first = relatedDates[0];
            const last  = relatedDates[relatedDates.length - 1];

            // first~last 사이에서 관련 없는 날짜 구간 찾기
            const allDates = TL.renderedDates;
            const firstIdx = allDates.indexOf(first);
            const lastIdx  = allDates.indexOf(last);
            if (firstIdx < 0 || lastIdx < 0) return;

            // 중간 날짜 중 관련 없는 것들을 연속 구간으로 묶기
            let gapStart = -1;
            const gaps = []; // [{from, to}] 인덱스 기준

            for (let i = firstIdx + 1; i < lastIdx; i++) {
                const d = allDates[i];
                if (!relatedDates.includes(d)) {
                    if (gapStart < 0) gapStart = i;
                } else {
                    if (gapStart >= 0) { gaps.push({ from: gapStart, to: i - 1 }); gapStart = -1; }
                }
            }
            if (gapStart >= 0) gaps.push({ from: gapStart, to: lastIdx - 1 });

            // 각 구간 접기
            gaps.forEach(({ from, to }) => {
                const dayCount = to - from + 1;
                // 구간 내 첫 번째 카드 wrapEl만 남기고 나머지 숨김 + placeholder
                const wrapEls = [];
                for (let i = from; i <= to; i++) {
                    const d = allDates[i];
                    const wrapEl = track.querySelector(`[data-tl-date="${d}"]`);
                    if (wrapEl) wrapEls.push(wrapEl);
                }
                if (!wrapEls.length) return;

                // placeholder: "▸ N일" 배지 (첫 번째 wrapEl 앞에 삽입)
                const placeholder = document.createElement('div');
                placeholder.className = 'tl-collapse-badge';
                placeholder.style.cssText = `
                    display:flex; align-items:center; justify-content:center;
                    min-width:32px; max-width:32px; flex-shrink:0;
                    background:#f1f1ef; border-radius:8px;
                    font-size:8px; font-weight:800; color:#b0aeaa;
                    writing-mode:vertical-rl; cursor:default;
                    overflow:hidden;
                `;
                placeholder.textContent = `▸${dayCount}일`;
                wrapEls[0].parentNode.insertBefore(placeholder, wrapEls[0]);

                // GSAP로 카드들 너비 → 0 애니메이션
                gsap.to(wrapEls, {
                    minWidth: 0, maxWidth: 0, opacity: 0,
                    duration: 0.28, ease: 'power2.inOut',
                    onComplete() { wrapEls.forEach(w => w.style.display = 'none'); }
                });

                wrapEls.forEach(wrapEl => {
                    _tlCollapsed.push({ wrapEl, placeholder });
                });
            });
        }

        // ── 비활성 주말 날짜카드 활성화 / 비활성화 ────────────────────────
        // deactivate=true 이면 해제(비활성화), 기본은 활성화
        // ── 비활성 주말 날짜카드 활성화 / 비활성화 ─────────────────────────────
        // deactivate=true 이면 해제(비활성화), 기본값 false 이면 활성화
        // 활성화: 해당 주말 날짜에 공정 섹션을 생성하고 배치 로직을 실행해 상품카드를 배치
        // 비활성화: 해당 날짜 제거 → 전체 카드 재배치 (기존 공정카드들이 평일로 재이동)
        // ── 비활성 주말 날짜카드 활성화 / 비활성화 ─────────────────────────────
        // deactivate=true : 비활성화 → 공정 섹션 제거, 카드들이 toValidDate 기준 평일로 자동 재배치
        // deactivate 생략  : 활성화  → 공정 섹션 생성, 배치 로직 실행으로 해당 주말에 상품카드 배치
        window.tlActivateWeekend = function(dateStr, deactivate) {
            if (deactivate) {
                TL.activatedWeekendDates.delete(dateStr);

                // 비활성 주말 → 직전 활성 날짜로 snap (기존)
                const snapActive = (d) => {
                    if (TL.activatedWeekendDates.has(d)) return d;
                    const dow = new Date(d + 'T00:00:00').getDay();
                    if (dow === 6) return TL._dateOffset(d, -1); // 토 → 금
                    if (dow === 0) {
                        const sat = TL._dateOffset(d, -1);
                        return TL.activatedWeekendDates.has(sat) ? sat : TL._dateOffset(d, -2); // 일 → 토(활성) or 금
                    }
                    return d;
                };
                // lb 자체가 비활성 주말일 수 있으므로 다음 유효 날짜로 전진
                const snapForward = (lb) => {
                    let d = lb;
                    for (let i = 0; i < 7; i++) {
                        if (TL.activatedWeekendDates.has(d)) return d; // 활성 주말
                        const dow = new Date(d + 'T00:00:00').getDay();
                        if (dow !== 0 && dow !== 6) return d; // 평일
                        d = TL._dateOffset(d, 1);
                    }
                    return lb;
                };
                // snap 후 lowerBound 미만이면 → 전진 snap으로 다음 유효날 확보
                const snapWithFloor = (d, lowerBound) => {
                    const snapped = snapActive(d);
                    return snapped >= lowerBound ? snapped : snapForward(lowerBound);
                };

                // 오늘 KST (루프 외 1회)
                const _todaySnap = (() => { const d = new Date(Date.now() + 9*60*60*1000); return d.toISOString().slice(0,10); })();
                const _itemOrderDate = (item) => {
                    if (item.batchId) {
                        const kst = new Date(item.batchId + 9*60*60*1000);
                        return `${kst.getUTCFullYear()}-${String(kst.getUTCMonth()+1).padStart(2,'0')}-${String(kst.getUTCDate()).padStart(2,'0')}`;
                    }
                    if (item.orderCode && item.orderCode.length >= 8) {
                        const s = item.orderCode.replace(/-/g,'').slice(0,8);
                        return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
                    }
                    return null;
                };

                confirmedOrders.forEach(item => {
                    // ── 재활성화 복원용 백업 저장 (procOverrides + partMoveLog 딥카피) ──
                    if (!item._weekendProcBackup) item._weekendProcBackup = {};
                    item._weekendProcBackup[dateStr] = {
                        deliveryDate: item.deliveryDate,
                        procOverrides: item.procOverrides ? { ...item.procOverrides } : null,
                        partMoveLog: item.partMoveLog ? JSON.parse(JSON.stringify(item.partMoveLog)) : null
                    };

                    const isWkend = (d) => d && TL.activatedWeekendDates.has(d);
                    const _od = _itemOrderDate(item);
                    const _lb = (_od && _od > _todaySnap) ? _od : _todaySnap;

                    // snap — 납기 포함
                    if (item.deliveryDate) {
                        const dow = new Date(item.deliveryDate + 'T00:00:00').getDay();
                        const isInactive = (dow === 0 || dow === 6) && !TL.activatedWeekendDates.has(item.deliveryDate);
                        if (isInactive) item.deliveryDate = snapWithFloor(item.deliveryDate, _lb);
                    }
                    if (item.procOverrides) {
                        ['보링','엣지','NC','재단'].forEach(pk => {
                            const d = item.procOverrides[pk];
                            if (!d) return;
                            const dow = new Date(d + 'T00:00:00').getDay();
                            const isInactive = (dow === 0 || dow === 6) && !TL.activatedWeekendDates.has(d);
                            if (isInactive) item.procOverrides[pk] = snapWithFloor(d, _lb);
                        });
                    }

                    // ── 개별 부속 배치(partMoveLog) 날짜 스냅 ─────────────────
                    if (item.partMoveLog) {
                        Object.values(item.partMoveLog).forEach(batches => {
                            if (!Array.isArray(batches)) return;
                            batches.forEach(batch => {
                                ['재단','엣지','NC','보링','납기'].forEach(pk => {
                                    const d = batch[pk];
                                    if (!d) return;
                                    const dow = new Date(d + 'T00:00:00').getDay();
                                    const isInactive = (dow === 0 || dow === 6) && !TL.activatedWeekendDates.has(d);
                                    if (isInactive) batch[pk] = snapWithFloor(d, _lb);
                                });
                            });
                        });
                    }

                    // 역행 클램핑 (활성 주말 보호 제거: 활성 주말 배치 카드도 상한 초과 시 클램핑)
                    const d납기 = item.deliveryDate;
                    if (!item.procOverrides) return;
                    if (item.procOverrides['보링'] && item.procOverrides['보링'] > d납기) item.procOverrides['보링'] = d납기;
                    if (item.procOverrides['엣지'] && item.procOverrides['엣지'] > (item.procOverrides['보링'] || d납기)) item.procOverrides['엣지'] = item.procOverrides['보링'] || d납기;
                    if (item.procOverrides['NC']   && item.procOverrides['NC']   > d납기) item.procOverrides['NC'] = d납기;
                    const _e비활 = item.procOverrides['엣지'] || d납기;
                    const _n비활 = item.procOverrides['NC']   || d납기;
                    const wall재단비활 = _e비활 < _n비활 ? _e비활 : _n비활;
                    if (item.procOverrides['재단'] && item.procOverrides['재단'] > wall재단비활) item.procOverrides['재단'] = wall재단비활;
                });
            } else {
                TL.activatedWeekendDates.add(dateStr);

                // ── 재활성화: 비활성화 당시 백업 복원 → 원래 날짜로 카드 귀환 ──
                confirmedOrders.forEach(item => {
                    if (item._weekendProcBackup && item._weekendProcBackup[dateStr]) {
                        const bk = item._weekendProcBackup[dateStr];
                        item.deliveryDate  = bk.deliveryDate;
                        item.procOverrides = bk.procOverrides ? { ...bk.procOverrides } : item.procOverrides;
                        // 개별 부속 배치도 원본 복원
                        item.partMoveLog   = bk.partMoveLog ? JSON.parse(JSON.stringify(bk.partMoveLog)) : item.partMoveLog;
                        delete item._weekendProcBackup[dateStr];
                    }
                });

                // 활성화 시에도 역행 클램핑 적용 (활성 주말 보호 제거, Math.min → 문자열 비교)
                confirmedOrders.forEach(item => {
                    if (!item.procOverrides) return;
                    const d납기 = item.deliveryDate;
                    if (item.procOverrides['보링'] && item.procOverrides['보링'] > d납기) item.procOverrides['보링'] = d납기;
                    if (item.procOverrides['엣지'] && item.procOverrides['엣지'] > (item.procOverrides['보링'] || d납기)) item.procOverrides['엣지'] = item.procOverrides['보링'] || d납기;
                    if (item.procOverrides['NC']   && item.procOverrides['NC']   > d납기) item.procOverrides['NC'] = d납기;
                    const _e활 = item.procOverrides['엣지'] || d납기;
                    const _n활 = item.procOverrides['NC']   || d납기;
                    const wall재단활 = _e활 < _n활 ? _e활 : _n활;
                    if (item.procOverrides['재단'] && item.procOverrides['재단'] > wall재단활) item.procOverrides['재단'] = wall재단활;
                });
            }
            // refreshCards 가 전체 날짜카드를 재생성(공정섹션 포함) 후 배치 로직까지 실행
            TL.refreshCards();
        };

        // ── 날짜카드 확대 오버레이 ──────────────────────────────────────
        // ── 날짜카드 확장 (공정작업지시서 5컬럼) ──────────────────────────
        window._tlDcDate = null;

        // 공통: 섹션별 아이템 가져오기
        window._tlDcGetItems = function(dateStr) {
            const SECS = [
                { key:'납기', color:'#b0aeaa', tc:'#fff', isDlv:true  },
                { key:'보링', color:'#227C9D', tc:'#fff', isDlv:false },
                { key:'엣지', color:'#17C3B2', tc:'#fff', isDlv:false },
                { key:'NC',   color:'#FF9C75', tc:'#fff', isDlv:false },
                { key:'재단', color:'#90BBC6', tc:'#fff', isDlv:false },
            ];
            const pending = confirmedOrders.filter(o => o.amtTimeline===true && o.amtRegistered!==true && !o.amtConfirmedCancel);
            const map = {};
            SECS.forEach(sec => {
                const el = document.querySelector(`.tl-process-section[data-date="${dateStr}"][data-process="${sec.key}"]`);
                const items = [];
                if (el) {
                    const seen = new Set();
                    el.querySelectorAll('.tl-delivery-item').forEach(c => {
                        const docId = c.dataset.docid || '';
                        const idNum = parseInt(c.dataset.idnum);
                        const key = docId || idNum;
                        if (!key || seen.has(key)) return;
                        seen.add(key);
                        const it = docId
                            ? pending.find(o => o.docId === docId)
                            : pending.find(o => o.idNum === idNum);
                        if (it) items.push(it);
                    });
                }
                map[sec.key] = { ...sec, items };
            });
            return map;
        };

        // ── 날짜·공정 기준 부속 실제 수량 계산 헬퍼 ──────────────────────────
        // dateStr 날짜에 procKey 공정으로 실제 배정된 수량을 반환.
        // - 원래 날짜(orderDate === dateStr): 전체qty - 다른 날짜로 이동된qty
        // - 이동된 날짜(orderDate !== dateStr): 이 날짜로 이동된qty만
        // - 반환값 0 → 해당일에 작업 없음 → 표시 안 함
        window._tlDcDisplayQty = function(item, cKey, procKey, totalQty, dateStr) {
            const orderDate = procKey === '납기' ? item.deliveryDate : item.procOverrides?.[procKey];
            const batches   = item.partMoveLog?.[cKey] || [];
            if (!dateStr || dateStr === orderDate) {
                // 원래 공정일 — 이동된 수량 차감
                const movedAway = batches.reduce((s,b) => s + (b[procKey] && b[procKey] !== orderDate ? b.qty : 0), 0);
                return Math.max(0, totalQty - movedAway);
            } else {
                // 이동된 날짜 — 이 날짜로 이동된 수량만
                return batches.reduce((s,b) => s + (b[procKey] === dateStr ? b.qty : 0), 0);
            }
        };

        // 부속 목록 HTML (미니카드용 — 타임라인 스타일 + 날짜 싱크)
        window._tlDcPartRows = function(item, procKey) {
            const h = currentFullData[0];
            if (!h || currentFullData.length < 2) return '<div style="font-size:9px;color:#b0aeaa;">부속 없음</div>';
            const PC      = { '재단':'#90BBC6', '엣지':'#17C3B2', 'NC':'#FF9C75', '보링':'#227C9D' };
            const pcColor = PC[procKey] || '#b0aeaa';
            const dateStr = window._tlDcDate;
            const orderDate = procKey === '납기' ? item.deliveryDate : item.procOverrides?.[procKey];
            const isMoved   = dateStr && dateStr !== orderDate;
            let html = '';

            Object.entries(item.partInfoMap || {}).forEach(([cKey, pData]) => {
                if (!pData || pData.isDeleted) return;
                const ri  = parseInt(cKey.split('-')[2]);
                const row = currentFullData[ri];
                if (!row || normalizeValue(row[h.indexOf('공급처')]) !== 'AMT') return;
                const nm     = row[h.indexOf('부속명')] || '-';
                const uc     = parseFloat(row[h.indexOf('세트별소모량')]) || 1;
                const totalQ = pData.qty || Math.round(uc * (item.orderQty || 1));
                const pt     = calcProcessTime(row, totalQ, {}, h);

                // 공정 무관 부속 제외
                let totalProcMin = 0;
                if (procKey === '납기') {
                    totalProcMin = (pt.재단||0) + (pt.엣지||0) + (pt.보링||0) + (pt.NC||0);
                } else {
                    totalProcMin = pt[procKey] ?? 0;
                    if (totalProcMin <= 0) return;
                }

                // 이 날짜에 실제 배정된 수량
                const displayQty = window._tlDcDisplayQty(item, cKey, procKey, totalQ, dateStr);
                if (displayQty <= 0) return; // 이 날짜에 작업 없음 → 표시 안 함

                // 수량 비율로 공정시간 조정
                const ratio   = totalQ > 0 ? displayQty / totalQ : 1;
                const procMin = totalProcMin * ratio;

                // 공정 스팟
                let spotsHtml = '';
                if (procKey === '납기') {
                    spotsHtml = [{k:'재단',t:(pt.재단||0)*ratio,c:PC.재단},{k:'엣지',t:(pt.엣지||0)*ratio,c:PC.엣지},{k:'보링',t:(pt.보링||0)*ratio,c:PC.보링},{k:'NC',t:(pt.NC||0)*ratio,c:PC.NC}]
                        .filter(x=>x.t>0).map(x=>`<span class="tl-spot-wrap"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${x.c};"></span><span class="tl-spot-tip">${x.k} ${x.t.toFixed(1)}분</span></span>`).join('');
                } else {
                    spotsHtml = `<span class="tl-spot-wrap"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${pcColor};"></span><span class="tl-spot-tip">${procKey} ${procMin.toFixed(1)}분</span></span>`;
                }

                html += `<div style="display:flex;align-items:center;gap:3px;padding:3px 0;border-bottom:1px solid #f0eeec;">
                    <span style="flex:1;font-size:9px;font-weight:700;color:#37352f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${nm}</span>
                    <span style="display:flex;gap:2px;align-items:center;flex-shrink:0;">${spotsHtml}</span>
                    <span style="font-size:8px;font-weight:700;color:#787774;white-space:nowrap;flex-shrink:0;">${procMin.toFixed(1)}분</span>
                    ${isMoved?`<span style="font-size:8px;color:#787774;font-weight:700;white-space:nowrap;flex-shrink:0;">이동</span>`:''}
                    <span style="font-size:8px;font-weight:800;color:#37352f;white-space:nowrap;flex-shrink:0;">${displayQty}EA</span>
                </div>`;
            });
            return html || '<div style="font-size:9px;color:#b0aeaa;padding:2px 0;">부속 없음</div>';
        };

        // 부속 목록 HTML (풀뷰용 — 공정시간 포함)
        window._tlDcFullPartRows = function(item, procKey) {
            const h = currentFullData[0];
            if (!h || currentFullData.length < 2) return '<div style="padding:6px;color:#b0aeaa;font-size:10px;">부속 없음</div>';
            let rows = '', total = 0;
            Object.entries(item.partInfoMap || {}).forEach(([cKey, pData]) => {
                if (!pData || pData.isDeleted) return;
                const ri  = parseInt(cKey.split('-')[2]);
                const row = currentFullData[ri];
                if (!row || normalizeValue(row[h.indexOf('공급처')]) !== 'AMT') return;
                const nm  = row[h.indexOf('부속명')] || '-';
                const uc  = parseFloat(row[h.indexOf('세트별소모량')]) || 1;
                const tq  = Math.round(uc * (item.orderQty||1));
                const pt  = calcProcessTime(row, uc*(item.orderQty||1), {}, h);
                let pm = 0;
                if (procKey === '납기') pm = Object.values(pt).reduce((s,v)=>s+(v||0),0);
                else { pm = pt[procKey]??0; if (pm<=0) return; }
                total += pm;
                const batches = item.partMoveLog?.[cKey] || [];
                const od = procKey==='납기' ? item.deliveryDate : item.procOverrides?.[procKey];
                const mv = batches.reduce((s,b)=>s+(b[procKey]&&b[procKey]!==od?b.qty:0),0);
                const dq = mv>0 ? Math.max(0,tq-mv) : tq;
                rows += `<div class="tl-dc-part-row"${mv>0&&dq<=0?' style="opacity:0.4;"':''}>
                    <span class="tl-dc-part-name">${nm}</span>
                    ${mv>0?`<span style="font-size:9px;color:#787774;font-weight:700;white-space:nowrap;">→이동 ${mv}EA</span>`:''}
                    ${pm>0?`<span class="tl-dc-part-time">${pm.toFixed(1)}분</span>`:''}
                    <span class="tl-dc-part-qty">${dq}EA</span>
                </div>`;
            });
            if (!rows) return '<div style="padding:6px;color:#b0aeaa;font-size:10px;">부속 없음</div>';
            return rows+(total>0?`<div style="padding:4px 0 0;text-align:right;font-size:10px;font-weight:800;color:#787774;border-top:1px solid #f0eeec;margin-top:2px;">합계 ${total.toFixed(1)}분</div>`:'');
        };

        // 5컬럼 그리드 HTML 빌드
        window._tlDcBuildGrid = function(dateStr) {
            const sMap  = window._tlDcGetItems(dateStr);
            const KEYS  = ['납기','보링','엣지','NC','재단'];
            const cols  = KEYS.map(key => {
                const sec   = sMap[key];
                const items = sec.items;
                const tcsty = `color:${sec.tc};`;
                const cards = items.map(item => {
                    const pd   = key==='납기' ? item.deliveryDate : (item.procOverrides?.[key]||null);
                    const parts = window._tlDcPartRows(item, key);
                    return `<div class="tl-dc-mini-card" onclick="tlDcToggleMiniCard(this)">
                        <div class="tl-dc-mini-card-hdr">
                            ${item.orderCode ? `<span class="order-code-badge" style="font-size:9px;">${item.orderCode}</span>` : '<span></span>'}
                            <span class="tl-dc-mini-qty">${item.orderQty}EA</span>
                        </div>
                        <div class="tl-dc-mini-name-row">
                            <span class="tl-dc-mini-name">${item.displayName}</span>
                        </div>
                        <div class="tl-dc-mini-meta">
                            <span>${key}: ${pd?pd.slice(5):'-'}</span>
                            ${item.supplier?`<span>${item.supplier}</span>`:''}
                        </div>
                        <div class="tl-dc-mini-parts">
                            <div class="tl-dc-mini-parts-hint">▼ 부속 목록</div>
                            ${parts}
                        </div>
                    </div>`;
                }).join('');
                return `<div class="tl-dc-col">
                    <div class="tl-dc-col-hdr" style="background:${sec.color};" onclick="event.stopPropagation();tlDcExpandSection('${key}')">
                        <span style="font-size:11px;font-weight:900;${tcsty}letter-spacing:0.3px;">${key}</span>

        // ── 모바일 날짜 상세 페이지 ──────────────────────────────

                return `<div class="tl-dp-section${items.length>0?' open':''}">

        window.tlCloseDetailPage = function() {
            document.getElementById('tl-detail-page').classList.remove('active');

        window.tlExpandDateCard = function(dateStr) {

            if (!info) return;
            const today = toLocalDateStr(new Date());
            const isToday     = dateStr === today;

            const dayColor = isActivated?(info.isSat?'#787774':'#37352f'):(isToday?'#787774':'#37352f');

                        ${isActivated?`<span style="font-size:11px;font-weight:700;color:${info.isSat?'#787774':'#37352f'};border:1.5px solid ${info.isSat?'#787774':'#37352f'};padding:2px 8px;border-radius:4px;">작업일</span>`:''}
                        <span style="font-size:11px;font-weight:700;color:#37352f;background:#f5f5f4;border:1px solid #e3e2e0;padding:2px 10px;border-radius:6px;letter-spacing:0.3px;">공정작업지시서</span>

        // ── 공정별 타임라인 페이지 ──────────────────────────────────────────
        window.tlOpenProcessView = function(procKey) {
            const _PC = { '보링':'#227C9D', '엣지':'#17C3B2', 'NC':'#FF9C75', '재단':'#90BBC6', '납기':'#b0aeaa' };
            const color = _PC[procKey] || '#787774';
            const dates = TL.renderedDates || [];
            const groups = [];
            dates.forEach(dateStr => {
                const sMap = window._tlDcGetItems(dateStr);
                const sec  = sMap[procKey];
                if (sec && sec.items.length > 0) groups.push({ dateStr, items: sec.items });
            });

            // 헤더
            document.getElementById('tl-pp-title').innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;">
                    <div style="width:12px;height:12px;border-radius:3px;background:${color};flex-shrink:0;"></div>
                    <span style="font-size:16px;font-weight:800;color:#37352f;">${procKey} 공정 타임라인</span>
                    <span style="font-size:11px;color:#b0aeaa;margin-left:4px;">${groups.length}일 · ${groups.reduce((s,g)=>s+g.items.length,0)}건</span>
                </div>`;

            // 바디
            const bodyEl = document.getElementById('tl-pp-body');
            if (groups.length === 0) {
                bodyEl.innerHTML = `<div class="tl-pp-empty">등록된 항목이 없습니다</div>`;
            } else {
                bodyEl.innerHTML = groups.map(({ dateStr, items }) => {
                    const info = parseDateCard(dateStr);
                    const itemsHtml = items.map(item =>
                        `<div class="tl-pp-item">
                            <span class="tl-pp-item-name">${item.displayName||''}</span>
                            <span class="tl-pp-item-qty">${item.orderQty||0}EA</span>
                        </div>`
                    ).join('');
                    return `<div class="tl-pp-date-group">
                        <div class="tl-pp-date-hdr" style="background:${color}18;">
                            <span style="font-size:24px;font-weight:900;color:${color};line-height:1;">${info.day}</span>
                            <div style="display:flex;flex-direction:column;gap:1px;">
                                <span style="font-size:12px;font-weight:700;color:#787774;">${info.month}월 ${info.weekday}요일</span>
                                <span style="font-size:10px;color:#b0aeaa;">${dateStr}</span>
                            </div>
                            <span style="margin-left:auto;font-size:11px;font-weight:700;background:${color};color:#fff;padding:2px 9px;border-radius:10px;">${items.length}건</span>
                        </div>

                    </div>`;
                }).join('');
            }

            document.getElementById('tl-process-page').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.tlCloseProcessPage = function() {
            document.getElementById('tl-process-page').classList.remove('active');
            document.body.style.overflow = '';
        };

        // ── 공정작업지시서 헬퍼 함수들 ──────────────────────────────────

        // 미니카드 클릭 → 부속 토글
        window.tlDcToggleMiniCard = function(card) {
            const parts = card.querySelector('.tl-dc-mini-parts');
            if (!parts) return;
            const open = card.classList.toggle('open');
            parts.style.display = open ? '' : 'none';
        };

        // 섹션 헤더 클릭 → 전체 페이지로 확장
        window.tlDcExpandSection = function(procKey) {
            const dateStr = window._tlDcDate;
            if (!dateStr) return;
            const panel = document.querySelector('#tl-datecard-expand .tl-dc-panel');
            if (!panel) return;
            const sMap = window._tlDcGetItems(dateStr);
            const sec  = sMap[procKey];
            if (!sec) return;

            const _PC = { '보링':'#227C9D', '엣지':'#17C3B2', 'NC':'#FF9C75', '재단':'#90BBC6' };
            const _pcColor = _PC[procKey] || '#787774';
            const _fh = currentFullData[0];

            const cardsHtml = sec.items.map(item => {
                const pd     = procKey==='납기' ? item.deliveryDate : (item.procOverrides?.[procKey]||null);
                const procLabel = procKey==='납기' ? '납기일' : procKey+' 작업일';
                let actBtn;
                if (sec.isDlv) {
                    // ── 모든 부속의 마지막 공정 완료 여부 확인 ──────────────
                    let _partCount = 0, _doneCount = 0;
                    Object.entries(item.partInfoMap || {}).forEach(([_ck, _pd]) => {
                        if (!_pd || _pd.isDeleted) return;
                        if (!_fh) return;
                        const _ri  = parseInt(_ck.split('-')[2]);
                        const _row = currentFullData[_ri];
                        if (!_row || normalizeValue(_row[_fh.indexOf('공급처')]) !== 'AMT') return;
                        const _pt    = calcProcessTime(_row, 1, {}, _fh);
                        const _comps = item.partCompletions?.[_ck] || {};
                        let _lastDone  = false;
                        if ((_pt['보링'] || 0) > 0)                              _lastDone = !!_comps['보링'];
                        else if ((_pt['엣지'] || 0) > 0 || (_pt['NC'] || 0) > 0) _lastDone = !!(_comps['엣지'] || _comps['NC']);
                        else                                                       _lastDone = !!_comps['재단'];
                        _partCount++;
                        if (_lastDone) _doneCount++;
                    });
                    const _allDone = _partCount > 0 && _doneCount === _partCount;
                    actBtn = _allDone
                        ? `<button class="tl-dc-btn-delivery" onclick="event.stopPropagation();tlDcStartDelivery(${item.idNum},this)">🚚 배송출발</button>`
                        : `<span style="font-size:9px;font-weight:700;color:#b0aeaa;">⏳ 공정 ${_doneCount}/${_partCount} 완료</span>`;
                } else {
                    actBtn = `<button class="tl-dc-btn-workorder" onclick="event.stopPropagation();tlDcIssueWorkOrder('${item.docId||''}','${procKey}',this)">📋 작업지시서 발행</button>`;
                }

                // 상품카드 총 공정작업시간 계산
                let _totalMin = 0;
                if (_fh) {
                    Object.entries(item.partInfoMap || {}).forEach(([_ck, _pd]) => {
                        if (!_pd || _pd.isDeleted) return;
                        const _ri = parseInt(_ck.split('-')[2]);
                        const _row = currentFullData[_ri];
                        if (!_row || normalizeValue(_row[_fh.indexOf('공급처')]) !== 'AMT') return;
                        const _uc = parseFloat(_row[_fh.indexOf('세트별소모량')]) || 1;
                        const _pq = Math.round(_uc * (item.orderQty || 1));
                        const _pt = calcProcessTime(_row, _pq, {}, _fh);
                        if (procKey === '납기') _totalMin += (_pt.재단||0) + (_pt.엣지||0) + (_pt.보링||0) + (_pt.NC||0);
                        else _totalMin += _pt[procKey] || 0;
                    });
                }
                const _timeChip = _totalMin > 0
                    ? `<span style="margin-left:8px;font-weight:900;color:${_pcColor};">⏱ ${_totalMin.toFixed(1)}분</span>`
                    : '';

                return `<div class="tl-dc-full-card" data-idnum="${item.idNum}" data-prockey="${procKey}">
                    ${item.orderCode ? `<div style="margin-bottom:2px;"><span class="order-code-badge">${item.orderCode}</span></div>` : ''}
                    <div class="tl-dc-full-card-name-row" onclick="tlDcToggleFullCard(${item.idNum},this)">
                        <span class="tl-dc-full-name">${item.displayName}</span>
                        <span class="tl-dc-full-qty">${item.orderQty} EA</span>
                    </div>
                    <div class="tl-dc-full-meta">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        ${procLabel}: <strong style="color:#37352f;margin-left:2px;">${pd||'-'}</strong>
                        ${procKey!=='납기'&&item.deliveryDate ? `<span style="margin-left:8px;">납기: ${item.deliveryDate}</span>` : ''}
                        ${item.supplier ? `<span style="margin-left:8px;color:#b0aeaa;">${item.supplier}</span>` : ''}
                        ${_timeChip}
                    </div>
                    <div class="tl-dc-full-parts-area" id="dc-parts-${item.idNum}">
                        <div id="dc-parts-inner-${item.idNum}"></div>
                        <div class="tl-dc-delivery-area"></div>
                    </div>
                    <div class="tl-dc-full-act-row">${actBtn}</div>
                </div>`;
            }).join('');

            const grid = panel.querySelector('.tl-dc-5col-grid');
            if (grid) grid.remove();
            const div = document.createElement('div');
            div.className = 'tl-dc-single-sec';

            if (procKey === '보링') {
                // ── 보링 전용: 기계 배정 보드 ──────────────────────────────
                const sk = dateStr + '-보링';
                const boringParts = [];
                let totalMin = 0;
                if (_fh && currentFullData.length >= 2) {
                    sec.items.forEach(item => {
                        Object.entries(item.partInfoMap || {}).forEach(([cKey, pData]) => {
                            if (!pData || pData.isDeleted) return;
                            const ri  = parseInt(cKey.split('-')[2]);
                            const row = currentFullData[ri];
                            if (!row || normalizeValue(row[_fh.indexOf('공급처')]) !== 'AMT') return;
                            const nm  = row[_fh.indexOf('부속명')] || '-';
                            const uc  = parseFloat(row[_fh.indexOf('세트별소모량')]) || 1;
                            const tq  = Math.round(uc * (item.orderQty || 1));
                            const pt  = calcProcessTime(row, uc * (item.orderQty || 1), {}, _fh);
                            const pm  = pt['보링'] ?? 0;
                            if (pm <= 0) return;
                            const batches = item.partMoveLog?.[cKey] || [];
                            const od = item.procOverrides?.['보링'];
                            const mv = batches.reduce((s, b) => s + (b['보링'] && b['보링'] !== od ? b.qty : 0), 0);
                            const dq = mv > 0 ? Math.max(0, tq - mv) : tq;
                            totalMin += pm * (dq / (tq || 1));
                            const uid       = (item.docId || String(item.idNum)) + '_' + cKey;
                            const orderKey  = item.docId || String(item.idNum);
                            const plateName = row[_fh.indexOf('원장명')] || '';
                            const finish    = row[_fh.indexOf('마감')]   || '';
                            const rw        = parseFloat(row[_fh.indexOf('재단W')]) || 0;
                            const rd        = parseFloat(row[_fh.indexOf('재단D')]) || 0;
                            boringParts.push({ nm, pm, dq, cKey: uid, orderCode: item.orderCode || '', orderKey, orderName: item.displayName || item.orderCode || '', plateName, finish, rw, rd, deliveryDate: item.deliveryDate || '' });
                        });
                    });
                }
                // ── 상태: 기계별 [{cKey, startSlot}] 배열 구조 (startSlot = 0..31 슬롯 인덱스)
                const _MAC3 = ['1호기','2호기','멀티보링'];
                // ── 상태: 기계별 순서 배열 [cKey, cKey, ...] (절대위치, 30분 슬롯 없음)
                const _normKeys = arr => {
                    if (!arr || !Array.isArray(arr)) return [];
                    if (!arr.length) return [];
                    if (typeof arr[0] === 'string') return arr; // 이미 cKey 문자열
                    if (arr[0] && arr[0].cKey) {               // [{cKey,startSlot}] → 정렬 후 cKey만 추출
                        return arr.slice().sort((a,b)=>(a.startSlot||0)-(b.startSlot||0)).map(x=>x.cKey);
                    }
                    return [];
                };
                if (!window._woBoring[sk]) {
                    // 작업시간 균형 자동배치 (LPT + 최소분리 보정), 멀티보링 기본배정 제외
                    const _bBal = _woAutoBalance(boringParts, ['1호기','2호기']);
                    window._woBoring[sk] = {
                        '1호기':   _bBal['1호기']?.keys   || [],
                        '2호기':   _bBal['2호기']?.keys   || [],
                        '멀티보링': [],
                        pool: [],
                    };
                } else {
                    // 이전 구조(딕셔너리/객체 슬롯) → [cKey] 배열로 마이그레이션
                    _MAC3.forEach(mac => {
                        const m = window._woBoring[sk][mac];
                        if (!m) { window._woBoring[sk][mac] = []; return; }
                        if (Array.isArray(m)) {
                            window._woBoring[sk][mac] = _normKeys(m);
                        } else if (typeof m === 'object') {
                            const arr = [];
                            Object.entries(m).forEach(([slot, keys]) => {
                                const si = typeof slot === 'string' && slot.includes(':')
                                    ? parseInt(slot) * 2 + (slot.endsWith(':30') ? 1 : 0)
                                    : parseInt(slot) || 0;
                                (keys || []).forEach(k => arr.push({cKey: k, startSlot: si}));
                            });
                            window._woBoring[sk][mac] = _normKeys(arr);
                        }
                    });
                    // 신규 부속 pool에 추가
                    const existing = new Set();
                    _MAC3.forEach(mac => (window._woBoring[sk][mac] || []).forEach(k => existing.add(k)));
                    (window._woBoring[sk].pool || []).forEach(k => existing.add(k));
                    boringParts.forEach(p => { if (!existing.has(p.cKey)) window._woBoring[sk].pool.push(p.cKey); });
                }
                window._woBoringParts[sk] = boringParts;

                // pool 초기 HTML (grid는 requestAnimationFrame 후 _woRenderBoard로 채움)
                const poolInit = (window._woBoring[sk].pool || []).map(k => {
                    const p = boringParts.find(pp => pp.cKey === k);
                    return p ? _woCardHtml(p, sk) : '';
                }).join('');
                div.innerHTML = `
                    <div class="tl-dc-single-hdr" style="border-bottom:2px solid #e3e2e0;flex-shrink:0;">
                        <button class="tl-dc-back-btn" onclick="tlDcBackToGrid()">← 전체보기</button>
                        <span style="display:inline-block;width:6px;height:24px;background:${_pcColor};border-radius:3px;flex-shrink:0;"></span>
                        <span style="font-size:17px;font-weight:900;color:#37352f;letter-spacing:-0.3px;">보링</span>
                        <span style="font-size:11px;font-weight:700;color:${_pcColor};">기계 배정 · ${sec.items.length}건</span>
                        <span style="margin-left:auto;font-size:10px;font-weight:700;color:#787774;">⏱ 총 ${totalMin.toFixed(1)}분</span>
                    </div>
                    <div style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;">
                        <div id="wo-boring-scroller-${sk}" style="flex:1;min-height:0;overflow-y:auto;overflow-x:auto;padding:0 16px 12px;overscroll-behavior:contain;">
                        <div class="wo-boring-board" id="wo-boring-grid-${sk}"></div>
                        <div style="margin-top:10px;">
                            <div style="font-size:9px;font-weight:700;color:${_pcColor};margin-bottom:4px;">미배정 부속</div>
                            <div class="wo-boring-pool" id="zone-pool-${sk}"
                                ondragover="woBoardDragOver(event)"
                                ondrop="woBoardDrop(event,'pool',null,'${sk}')"

                    ${basicHtml || '<div class="col-span-full py-4 text-center text-[#787774] italic text-[11px]">해당 공정 부속 없음</div>'}
                </div>
                ${totalHtml}
            </div>`;
        };

        // 배송시작 → 배송 카드 토글
        window.tlDcStartDelivery = function(idNum, btnEl) {
            // 풀뷰(.tl-dc-full-card) 또는 미니뷰(.tl-dc-order-card) 모두 지원
            const cardEl = btnEl.closest('.tl-dc-full-card') || btnEl.closest('.tl-dc-order-card');

            // 풀뷰에서는 parts-area 안의 delivery-area 사용; 먼저 parts-area 열기

                area.innerHTML = '';

            const h = currentFullData[0];
            let partsRows = '';
            if (h) {
                Object.entries(item.partInfoMap || {}).forEach(([cKey, pData]) => {
                    if (!pData || pData.isDeleted) return;
                    const ri  = parseInt(cKey.split('-')[2]);
                    const row = currentFullData[ri];
                    if (!row || normalizeValue(row[h.indexOf('공급처')]) !== 'AMT') return;
                    const nm  = row[h.indexOf('부속명')] || '-';
                    const uc  = parseFloat(row[h.indexOf('세트별소모량')]) || 1;
                    const tq  = Math.round(uc * (item.orderQty || 1));
                    const batches = item.partMoveLog?.[cKey] || [];
                    const mv = batches.reduce((s,b)=>s+(b['납기']&&b['납기']!==item.deliveryDate?b.qty:0),0);
                    const dq = mv>0 ? Math.max(0,tq-mv) : tq;
                    partsRows += `<div class="tl-dc-part-row">
                        <span class="tl-dc-part-name">${nm}</span>
                        <span class="tl-dc-part-qty">${dq}EA</span>
